<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sudoku Premium Sky</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* --- БАЗОВЫЕ НАСТРОЙКИ --- */
    :root {
      --font-stack: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);

      /* Цветовая палитра */
      --glass-base: rgba(18, 20, 40, 0.65);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-highlight: rgba(255, 255, 255, 0.05);
      --primary-glow: rgba(56, 189, 248, 0.6);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --accent-color: #38bdf8;
      /* Sky Blue */

      --cell-border: rgba(255, 255, 255, 0.08);
      --cell-active-bg: rgba(56, 189, 248, 0.25);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: var(--font-stack);
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Чтобы фон не скроллился */
      background-color: #0f172a;
      color: var(--text-main);
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Beautiful B&W Sky Background */
    .bg-sky {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background-color: #1e293b;
      /* Fallback color */
      background-image: url('./photo-1536514498073-50e69d39c6cf.avif');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      filter: grayscale(100%) contrast(1.1) brightness(1.1);
    }

    /* Затемняющий слой поверх фото для читаемости */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.4) 0%, rgba(15, 23, 42, 0.8) 100%);
      z-index: -1;
      backdrop-filter: blur(2px);
    }

    /* --- PREMIUM GLASS UTILS --- */
    .glass-panel {
      background: var(--glass-base);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      border-radius: 24px;
      /* Тонкий блик сверху */
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .glass-button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .glass-button:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.15);
    }

    .accent-button {
      background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
      color: white;
      border: none;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
      font-weight: 700;
    }

    .accent-button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
    }

    /* --- LAYOUT --- */
    #app-container {
      width: 100%;
      max-width: 450px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      /* Учитываем верхнюю планку Telegram (минимум 44px для кнопок) */
      padding: max(44px, var(--safe-area-top)) 20px max(24px, var(--safe-area-bottom)) 20px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 12px 16px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--accent-color);
      box-shadow: 0 0 15px var(--primary-glow);
      object-fit: cover;
    }

    .user-info div {
      line-height: 1.2;
    }

    #username {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    .stats-text {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-align: right;
      line-height: 1.5;
    }

    /* Controls */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      gap: 8px;
    }

    .select-wrapper {
      position: relative;
    }

    .select-styled {
      appearance: none;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 8px 32px 8px 16px;
      border-radius: 12px;
      font-family: var(--font-stack);
      font-weight: 600;
      font-size: 14px;
    }

    .timer-badge {
      font-family: 'Outfit', monospace;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 20px;
      color: #fff;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
    }

    /* --- GRID (Центральный элемент) --- */
    .grid-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      min-height: 0;
      /* Important for flex shrinking */
      margin-bottom: 12px;
    }

    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      background-color: rgba(0, 0, 0, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      overflow: hidden;
      /* Square grid - height determines size */
      height: 100%;
      aspect-ratio: 1/1;
      max-width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(8px, 3.5vmin, 24px);
      position: relative;
      cursor: pointer;
      border-right: 1px solid var(--cell-border);
      border-bottom: 1px solid var(--cell-border);
      transition: background 0.15s ease;
      min-height: 0;
      overflow: hidden;
    }

    /* Убираем внешние границы ячеек */
    .cell:nth-child(9n) {
      border-right: none;
    }

    .cell:nth-child(n+73) {
      border-bottom: none;
    }

    /* Жирные линии 3x3 (Светящиеся) */
    .cell:nth-child(3n) {
      border-right: 1px solid rgba(255, 255, 255, 0.3);
    }

    .cell:nth-child(9n) {
      border-right: none;
    }

    .cell:nth-child(n+19):nth-child(-n+27),
    .cell:nth-child(n+46):nth-child(-n+54) {
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* Состояния ячеек */
    .cell-content {
      z-index: 2;
      pointer-events: none;
    }

    .cell.given {
      color: #fff;
      font-weight: 800;
    }

    .cell.user-input {
      color: #7dd3fc;
      font-weight: 500;
      text-shadow: 0 0 8px rgba(125, 211, 252, 0.6);
    }

    .cell.error {
      color: #fb7185 !important;
      background: rgba(251, 113, 133, 0.15);
      animation: shake 0.4s;
    }

    .cell.highlight {
      background-color: rgba(56, 189, 248, 0.15);
    }

    .cell.area-highlight {
      background-color: rgba(255, 255, 255, 0.03);
    }

    .cell.active-cell {
      background-color: var(--cell-active-bg);
      box-shadow: inset 0 0 0 2px var(--accent-color);
    }

    .cell.hinted {
      background-color: rgba(255, 215, 0, 0.25);
      animation: flash 0.6s;
    }

    /* --- KEYPAD --- */
    .keypad-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      width: 100%;
      margin-bottom: auto;
    }

    @media (min-width: 380px) {
      .keypad-container {
        grid-template-columns: repeat(10, 1fr);
        gap: 8px;
      }
    }

    .num-btn {
      aspect-ratio: 1/1;
      border-radius: 14px;
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.03);
    }

    .num-btn.selected {
      background: var(--accent-color);
      color: #000;
      box-shadow: 0 0 15px var(--primary-glow);
      border-color: transparent;
    }

    .num-btn.disabled {
      opacity: 0.15;
      pointer-events: none;
    }

    /* --- BOTTOM ACTIONS --- */
    .actions-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
    }

    .action-btn {
      flex: 1;
      height: 56px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* --- MODALS & OVERLAYS --- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: rgba(15, 23, 42, 0.95);
      width: 90%;
      max-width: 400px;
      border-radius: 32px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
      transform: scale(0.9) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-overlay.active .modal-card {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 26px;
      font-weight: 800;
      color: white;
    }

    .close-btn {
      font-size: 32px;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 0.8;
      transition: color 0.2s;
    }

    .close-btn:hover {
      color: white;
    }

    /* --- LEADERBOARD FIX --- */
    .rank-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .rank-row:last-child {
      border-bottom: none;
    }

    .rank-cell {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Medals */
    .rank-1 {
      background: linear-gradient(135deg, #FFD700 0%, #FDB931 100%);
      color: #4a3b00;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
      font-size: 16px;
    }

    .rank-2 {
      background: linear-gradient(135deg, #E0E0E0 0%, #BDBDBD 100%);
      color: #3d3d3d;
      box-shadow: 0 0 10px rgba(192, 192, 192, 0.4);
      font-size: 16px;
    }

    .rank-3 {
      background: linear-gradient(135deg, #CD7F32 0%, #A0522D 100%);
      color: #3d220b;
      box-shadow: 0 0 10px rgba(205, 127, 50, 0.4);
      font-size: 16px;
    }

    .player-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .player-name {
      font-weight: 600;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-date {
      font-size: 11px;
      color: var(--text-muted);
    }

    .player-score {
      font-weight: 800;
      color: var(--accent-color);
      font-feature-settings: 'tnum';
    }

    /* Loader */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.6s ease;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: var(--accent-color);
      border-radius: 50%;
      animation: rotation 1s linear infinite;
    }

    /* Animations */
    @keyframes rotation {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-4px);
      }

      75% {
        transform: translateX(4px);
      }
    }

    @keyframes flash {
      0% {
        background: var(--accent-color);
      }

      100% {
        background: transparent;
      }
    }

    /* === COMPACT MOBILE STYLES (375x667 and similar) === */
    @media (max-height: 700px) {
      #app-container {
        padding: max(40px, var(--safe-area-top)) 12px 12px 12px;
      }

      .header-bar {
        margin-bottom: 8px;
        padding: 8px 12px;
        border-radius: 16px;
      }

      .avatar-img {
        width: 36px;
        height: 36px;
      }

      #username {
        font-size: 14px;
      }

      .user-info>div:last-child {
        font-size: 11px;
      }

      .stats-text {
        font-size: 10px;
        line-height: 1.3;
      }

      .controls-bar {
        margin-bottom: 8px;
      }

      .select-styled {
        padding: 6px 24px 6px 12px;
        font-size: 12px;
        border-radius: 10px;
      }

      .timer-badge {
        font-size: 16px;
      }

      .icon-btn {
        width: 32px;
        height: 32px;
        border-radius: 10px;
      }

      .icon-btn svg {
        width: 18px;
        height: 18px;
      }

      .grid-wrapper {
        margin-bottom: 10px;
      }

      .sudoku-grid {
        border-radius: 14px;
      }

      .cell {
        font-size: clamp(18px, 5.5vw, 24px);
      }

      /* Compact keypad - square buttons in one row */
      .keypad-container {
        gap: 4px;
        grid-template-columns: repeat(10, 1fr);
      }

      .num-btn {
        aspect-ratio: 1/1;
        border-radius: 8px;
        font-size: 14px;
      }

      .actions-bar {
        margin-top: 8px;
        gap: 8px;
      }

      .action-btn {
        height: 42px;
        border-radius: 14px;
        font-size: 14px;
      }

      #message {
        height: 16px;
        font-size: 12px;
        margin-top: 6px;
      }
    }

    /* Extra compact for very small screens */
    @media (max-height: 600px) {
      #app-container {
        padding: max(36px, var(--safe-area-top)) 10px 10px 10px;
      }

      .header-bar {
        margin-bottom: 6px;
        padding: 6px 10px;
      }

      .avatar-img {
        width: 30px;
        height: 30px;
      }

      .controls-bar {
        margin-bottom: 6px;
      }

      .grid-wrapper {
        margin-bottom: 6px;
      }

      .num-btn {
        font-size: 12px;
      }

      .actions-bar {
        margin-top: 6px;
      }

      .action-btn {
        height: 38px;
      }

      #message {
        height: 14px;
        font-size: 11px;
        margin-top: 4px;
      }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="bg-sky"></div>

  <div id="loading-screen">
    <div class="loader"></div>
    <div style="margin-top: 24px; font-weight: 800; font-size: 20px; letter-spacing: 1px; color:white;">SUDOKU SKY</div>
  </div>

  <div id="app-container">

    <div class="header-bar glass-panel">
      <div class="user-pill">
        <img id="user-avatar" src="" class="avatar-img" alt="User">
        <div class="user-info">
          <div id="username">Guest</div>
          <div style="font-size: 12px; color: var(--text-muted);">Score: <span id="user-score"
              style="color: var(--accent-color); font-weight: 700;">0</span></div>
        </div>
      </div>
      <div class="stats-text">
        <div>Easy: <span id="easy-record" style="color:white">--:--</span></div>
        <div>Med: <span id="medium-record" style="color:white">--:--</span></div>
        <div>Hard: <span id="hard-record" style="color:white">--:--</span></div>
      </div>
    </div>

    <div class="controls-bar">
      <div class="select-wrapper">
        <select id="difficulty" class="select-styled glass-button">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div class="timer-badge" id="timer">00:00</div>

      <div style="display:flex; gap: 8px;">
        <button id="rating-button" class="icon-btn glass-button"><svg xmlns="http://www.w3.org/2000/svg" width="22"
            height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
            <path d="M4 22h16"></path>
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path>
          </svg></button>
        <button id="settings-button" class="icon-btn glass-button"><svg xmlns="http://www.w3.org/2000/svg" width="22"
            height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg></button>
      </div>
    </div>

    <div class="grid-wrapper">
      <div id="grid" class="sudoku-grid glass-panel"></div>
    </div>

    <div id="number-row" class="keypad-container"></div>

    <div class="actions-bar">
      <button id="undo-button" class="action-btn glass-button" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 14L4 9l5-5" />
          <path d="M4 9h10c4.418 0 8 3.582 8 8" />
        </svg>
      </button>
      <button id="hint-button" class="action-btn glass-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path
            d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z" />
          <path d="M9 21h6" />
        </svg>
        <span id="hint-count-display">3/3</span>
      </button>
      <button id="check" class="action-btn accent-button">
        Done

  <script>
    /* --- LOGIC PRESERVED & UI ENHANCED --- */
    const firebaseConfig = { apiKey: "AIzaSyBkYQ7tRMrZ-mghBnkJ_EvuzHpjs_p8hOY", authDomain: "sudo-9fbfc.firebaseapp.com", projectId: "sudo-9fbfc", storageBucket: "sudo-9fbfc.appspot.com", messagingSenderId: "927814106972", appId: "1:927814106972:web:71e0773453f9d16f598b99" };

    const db = firebase.firestore();

    let grid = [], solution = [], givenCells = new Set(), timerInterval, startTime = 0;

    let currentUser = { id: null, username: 'Guest', avatar: 'https://t.me/i/userpic/320/default.jpg', score: 0, bestTimes: { easy: null, medium: null, hard: null } };
    let currentRatingType = 'score', currentRatingDifficulty = 'easy';

    const el = (id) => document.getElementById(id);

    // --- SOUND SYSTEM ---
    const DEFAULT_SOUND_URL = 'https://github.com/codex-cdx/sudo/raw/refs/heads/main/%D0%9F%D0%BB%D0%B0%D0%BC%D0%B1.mp3';
    let clickSound = new Audio(DEFAULT_SOUND_URL);

    // Load custom sound from localStorage if exists
    function loadCustomSound() {

      if (customSoundData) {

    function playSound() {

    }

    async function startRecording() {
      if (isRecording) return;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        // Check for supported mime types (audio/mp4 is better for iOS)
        const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        audioChunks = [];
        isRecording = true;

        el('record-sound-btn').textContent = '🔴 Recording...';
        el('record-sound-btn').style.background = 'rgba(239, 68, 68, 0.3)';
        el('recording-status').textContent = 'Recording... (max 2 sec)';

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(track => track.stop());
          isRecording = false;

          const blob = new Blob(audioChunks, { type: mimeType });
          const reader = new FileReader();

          reader.onloadend = () => {
            const result = reader.result;
            // Don't save yet, show trim editor first
            showTrimEditor(blob);

            el('record-sound-btn').textContent = '🎤 Record';
            el('record-sound-btn').style.background = '';
            el('recording-status').textContent = 'Recording complete. Trim it below:';

            // Auto-enable sound if off
            if (!isSoundEnabled) {
              isSoundEnabled = true;
              el('sound-toggle').textContent = "ON";
            }
          };

          reader.readAsDataURL(blob);
        };

        mediaRecorder.start();
        setTimeout(() => {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
          }
        }, 2000);

      } catch (err) {
        el('recording-status').textContent = '⚠ Microphone access denied';
        el('recording-status').style.color = '#fb7185';
        console.error('Recording error:', err);
      }
    }

    function clearCustomSound() {
      localStorage.removeItem('sudoku_custom_sound');
      clickSound.src = DEFAULT_SOUND_URL;
      clickSound.load();
      el('clear-sound-btn').classList.add('hidden');
      el('test-sound-btn').classList.add('hidden');
      el('trim-editor').classList.add('hidden');
      el('recording-status').textContent = 'Default sound restored';
    }

    // --- WAVEFORM & TRIMMING ---
    async function showTrimEditor(blob) {
      const arrayBuffer = await blob.arrayBuffer();
      originalAudioBuffer = await audioContext.decodeAudioData(arrayBuffer);

      el('trim-editor').classList.remove('hidden');
      drawWaveform(originalAudioBuffer);

      el('trim-start').value = 0;
      el('trim-end').value = 100;
    }

    function drawWaveform(buffer) {
      const canvas = el('waveform');
      const ctx = canvas.getContext('2d');
      const data = buffer.getChannelData(0);
      const step = Math.ceil(data.length / canvas.width);
      const amp = canvas.height / 2;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#38bdf8';

      for (let i = 0; i < canvas.width; i++) {
        let min = 1.0, max = -1.0;
        for (let j = 0; j < step; j++) {
          const datum = data[(i * step) + j];
          if (datum < min) min = datum;
          if (datum > max) max = datum;
        }
        ctx.fillRect(i, (1 + min) * amp, 1, Math.max(1, (max - min) * amp));
      }
    }

    async function saveTrimmedAudio() {
      if (!originalAudioBuffer) return;

      const startPct = parseInt(el('trim-start').value) / 100;
      const endPct = parseInt(el('trim-end').value) / 100;

      const startOffset = Math.floor(startPct * originalAudioBuffer.length);
      const endOffset = Math.floor(endPct * originalAudioBuffer.length);
      const frameCount = Math.max(1, endOffset - startOffset);

      const trimmedBuffer = audioContext.createBuffer(
        originalAudioBuffer.numberOfChannels,
        frameCount,
        originalAudioBuffer.sampleRate
      );

      for (let i = 0; i < originalAudioBuffer.numberOfChannels; i++) {
        const data = originalAudioBuffer.getChannelData(i).slice(startOffset, endOffset);
        trimmedBuffer.copyToChannel(data, i);
      }

      const wavBlob = audioBufferToWav(trimmedBuffer);
      const reader = new FileReader();
      reader.onloadend = () => {
        const result = reader.result;
        localStorage.setItem('sudoku_custom_sound', result);
        clickSound.src = result;
        clickSound.load();
        el('trim-editor').classList.add('hidden');
        el('clear-sound-btn').classList.remove('hidden');
        el('test-sound-btn').classList.remove('hidden');
        el('recording-status').textContent = '✓ Trimmed sound saved!';
        el('recording-status').style.color = '#22c55e';
      };
      reader.readAsDataURL(wavBlob);
    }

    function audioBufferToWav(buffer) {
      const numOfChan = buffer.numberOfChannels,
        length = buffer.length * numOfChan * 2 + 44,
        bufferArr = new ArrayBuffer(length),
        view = new DataView(bufferArr);
      let channels = [], i, sample, offset = 0, pos = 0;

      function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
      function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

      setUint32(0x46464952); // "RIFF"
      setUint32(length - 8); // file length - 8
      setUint32(0x45564157); // "WAVE"
      setUint32(0x20746d66); // "fmt " chunk
      setUint32(16); // length = 16
      setUint16(1); // PCM (uncompressed)
      setUint16(numOfChan);
      setUint32(buffer.sampleRate);
      setUint32(buffer.sampleRate * 2 * numOfChan); // avg. bytes/sec
      setUint16(numOfChan * 2); // block-align
      setUint16(16); // 16-bit
      setUint32(0x61746164); // "data" - chunk
      setUint32(length - pos - 4); // chunk length

      for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

      while (pos < length) {
        for (i = 0; i < numOfChan; i++) {
          sample = Math.max(-1, Math.min(1, channels[i][offset]));
          sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
          view.setInt16(pos, sample, true);
          pos += 2;
        }
        offset++;
      }
      return new Blob([bufferArr], { type: 'audio/wav' });
    }

    function formatTime(s) { if (s == null) return '--:--'; return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`; }

    function toggleModal(modalId, show) {
      const m = el(modalId);
      if (show) { m.classList.remove('hidden'); requestAnimationFrame(() => m.classList.add('active')); }
      else { m.classList.remove('active'); setTimeout(() => m.classList.add('hidden'), 300); }
    }

    // --- GRID ---
    function createGrid() {
      elements.grid.innerHTML = '';
      grid = Array(9).fill().map(() => Array(9).fill(0));
      givenCells.clear();
      for (let i = 0; i < 81; i++) {
        const d = document.createElement('div');
        d.className = 'cell';
        const span = document.createElement('span');
        span.className = 'cell-content';
        d.appendChild(span);
        d.addEventListener('click', (e) => { e.stopPropagation(); handleCellClick(Math.floor(i / 9), i % 9); });
        elements.grid.appendChild(d);
      }
    }

    function createKeypad() {
      elements.numberRow.innerHTML = '';
      for (let i = 1; i <= 9; i++) {
        const btn = document.createElement('button');
        btn.className = 'num-btn glass-button';
        btn.textContent = i;
        btn.dataset.val = i;
        btn.onclick = () => { playSound(); selectTool(i); };
        elements.numberRow.appendChild(btn);
      }
      const eraseBtn = document.createElement('button');
      eraseBtn.className = 'num-btn glass-button';
      eraseBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13v-16z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>';
      eraseBtn.dataset.val = 'erase';
      eraseBtn.onclick = () => { playSound(); selectTool('erase'); };
      elements.numberRow.appendChild(eraseBtn);
    }

    function handleCellClick(r, c) {
      playSound();
      if (isGameFinished) return;
      if (activeTool) {
        if (givenCells.has(`${r},${c}`)) return;
        if (activeTool === 'erase') performAction(0, r, c);
        else performAction(activeTool, r, c);
      } else {
        selectCell(r, c);
      }
    }

    function selectCell(r, c) {
      if (isGameFinished) return;
      clearHighlights();
      activeCell = [r, c];
      const cells = document.querySelectorAll('.cell');

      cells.forEach((cell, idx) => {
        const cr = Math.floor(idx / 9), cc = idx % 9;
        const sameRow = cr === r;
        const sameCol = cc === c;
        const sameBox = Math.floor(cr / 3) === Math.floor(r / 3) && Math.floor(cc / 3) === Math.floor(c / 3);
        if (sameRow || sameCol || sameBox) cell.classList.add('area-highlight');
      });

      cells[r * 9 + c].classList.add('active-cell');
      const val = grid[r][c];
      if (val !== 0 && highlightEnabled) highlightSimilar(val);
    }

    function selectTool(val) {
      if (isGameFinished) return;
      if (activeTool === val) activeTool = null;
      else activeTool = val;

      document.querySelectorAll('.num-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.val == activeTool);
      });

      activeCell = null;
      clearHighlights();
      if (activeTool && activeTool !== 'erase' && highlightEnabled) highlightSimilar(activeTool);
    }

    function highlightSimilar(val) {
      document.querySelectorAll('.cell').forEach((c, idx) => {
        const r = Math.floor(idx / 9), col = idx % 9;
        if (grid[r][col] === val) c.classList.add('highlight');
      });
    }

    function clearHighlights() {
      document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-cell', 'area-highlight', 'highlight'));
    }

    function performAction(val, r, c) {
      const prev = grid[r][c];
      if (prev === val) return;

      undoStack.push({ r, c, prev, val });
      grid[r][c] = val;

      const cell = document.querySelectorAll('.cell')[r * 9 + c];
      cell.querySelector('.cell-content').textContent = val === 0 ? '' : val;
      cell.classList.remove('error', 'hinted');
      cell.classList.toggle('user-input', val !== 0);

      updateUI();
      if (highlightEnabled) { clearHighlights(); if (val !== 0) highlightSimilar(val); }
    }

    function updateUI() {
      elements.undoBtn.disabled = undoStack.length === 0;
      el('hint-count-display').textContent = `${3 - hintCount}/3`;
      el('hint-button').disabled = hintCount >= 3;

      const counts = Array(10).fill(0);
      grid.flat().forEach(v => counts[v]++);
      document.querySelectorAll('.num-btn').forEach(btn => {
        const val = parseInt(btn.dataset.val);
        if (val && counts[val] >= 9) {
          btn.classList.add('disabled');
          if (activeTool === val) selectTool(null);
        } else {
          btn.classList.remove('disabled');
        }
      });
    }

    function undo() {
      playSound();
      if (!undoStack.length) return;
      const last = undoStack.pop();
      grid[last.r][last.c] = last.prev;
      const cell = document.querySelectorAll('.cell')[last.r * 9 + last.c];
      cell.querySelector('.cell-content').textContent = last.prev || '';
      cell.classList.remove('error');
      cell.classList.toggle('user-input', last.prev !== 0);
      updateUI();
      selectCell(last.r, last.c);
    }

    // --- GAME LOGIC ---
    function generatePuzzle(diff) {
      // Simple solver/generator for demo
      function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]] } }
      function solve(b) {
        for (let i = 0; i < 81; i++) {
          if (b[Math.floor(i / 9)][i % 9] === 0) {
            for (let n = 1; n <= 9; n++) {
              if (isValid(b, Math.floor(i / 9), i % 9, n)) {
                b[Math.floor(i / 9)][i % 9] = n;
                if (solve(b)) return true;
                b[Math.floor(i / 9)][i % 9] = 0;
              }
            }
            return false;
          }
        }
        return true;
      }
      function isValid(b, r, c, n) {
        for (let i = 0; i < 9; i++) if (b[r][i] === n || b[i][c] === n || b[3 * Math.floor(r / 3) + Math.floor(i / 3)][3 * Math.floor(c / 3) + i % 3] === n) return false;
        return true;
      }

      const base = Array(9).fill().map(() => Array(9).fill(0));
      const firstRow = [1, 2, 3, 4, 5, 6, 7, 8, 9]; shuffle(firstRow);
      base[0] = firstRow;
      solve(base);
      solution = base.map(r => [...r]);

      grid = base.map(r => [...r]);
      const attempts = { easy: 30, medium: 45, hard: 55 }[diff] || 30; // removed cells
      let removed = 0;
      while (removed < attempts) {
        let r = Math.floor(Math.random() * 9), c = Math.floor(Math.random() * 9);
        if (grid[r][c] !== 0) { grid[r][c] = 0; removed++; }
      }

      const cells = document.querySelectorAll('.cell');
      givenCells.clear();
      for (let i = 0; i < 81; i++) {
        const val = grid[Math.floor(i / 9)][i % 9];
        const cell = cells[i];
        cell.className = 'cell';
        cell.querySelector('.cell-content').textContent = val || '';
        if (val !== 0) {
          givenCells.add(`${Math.floor(i / 9)},${i % 9}`);
          cell.classList.add('given');
        }
      }
      updateUI();
    }

    function startGame() {
      isGameFinished = false;
      undoStack = [];
      hintCount = 0;
      clearInterval(timerInterval);
      startTime = Date.now();
      timerInterval = setInterval(() => {
        elements.timer.textContent = formatTime(Math.floor((Date.now() - startTime) / 1000));
      }, 1000);

      elements.checkBtn.disabled = false;
      elements.checkBtn.textContent = 'Done';
      elements.message.textContent = '';

      createGrid();
      createKeypad();
      generatePuzzle(elements.difficulty.value);
      toggleModal('settings-modal', false);
    }

    function checkGame() {
      playSound();
      if (isGameFinished) return;

      let error = false;
      let full = true;

      const cells = document.querySelectorAll('.cell');
      cells.forEach((c, idx) => {
        const r = Math.floor(idx / 9), col = idx % 9;
        const val = grid[r][col];
        if (val === 0) full = false;
        else if (val !== solution[r][col]) {
          c.classList.add('error');
          error = true;
        }
      });

      if (error) elements.message.textContent = "Oops! Mistakes found.";
      else if (!full) elements.message.textContent = "Board not full.";
      else {
        isGameFinished = true;
        clearInterval(timerInterval);
        const time = Math.floor((Date.now() - startTime) / 1000);
        const pts = calculatePoints(time, hintCount);
        saveWin(time, pts);
      }
    }

    function getHint() {
      playSound();
      if (hintCount >= 3 || isGameFinished) return;

      const candidates = [];
      for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) {
        if (!givenCells.has(`${r},${c}`) && grid[r][c] !== solution[r][c]) candidates.push([r, c]);
      }
      if (!candidates.length) return;

      hintCount++;
      const [r, c] = candidates[Math.floor(Math.random() * candidates.length)];
      performAction(solution[r][c], r, c);
      const cell = document.querySelectorAll('.cell')[r * 9 + c];
      cell.classList.add('hinted');
      updateUI();
    }

    function calculatePoints(time, hints) {
      const base = { easy: 100, medium: 250, hard: 500 }[elements.difficulty.value];
      return Math.max(10, base - (time / 2) - (hints * 50));
    }

    // --- USER & LEADERBOARD ---
    async function initUser() {
      try {
        await auth.signInAnonymously();
        let uid = auth.currentUser.uid;
        let userData = { username: 'Guest', avatar: 'https://cdn-icons-png.flaticon.com/512/847/847969.png' };

        if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
          const tgUser = window.Telegram.WebApp.initDataUnsafe.user;
          uid = String(tgUser.id);
          userData.username = tgUser.username || tgUser.first_name;
          if (tgUser.photo_url) userData.avatar = tgUser.photo_url;
        }

        currentUser.id = uid;
        currentUser.username = userData.username;
        currentUser.avatar = userData.avatar;

        elements.username.textContent = currentUser.username;
        elements.userAvatar.src = currentUser.avatar;

        const doc = await usersCollection.doc(uid).get();
        if (doc.exists) {
          const data = doc.data();
          currentUser.score = data.score || 0;
          currentUser.bestTimes = data.bestTimes || { easy: null, medium: null, hard: null };
        } else {
          await usersCollection.doc(uid).set({ ...userData, score: 0, bestTimes: {} });
        }

        elements.userScore.textContent = Math.floor(currentUser.score);
        updateRecordDisplay();
      } catch (e) { console.error("Auth error", e); }

      setTimeout(() => {
        elements.loadingScreen.style.opacity = '0';
        setTimeout(() => elements.loadingScreen.style.display = 'none', 600);
      }, 1000);
    }

    async function saveWin(time, pts) {
      currentUser.score += pts;
      elements.userScore.textContent = Math.floor(currentUser.score);
      const diff = elements.difficulty.value;

      let newRecord = false;
      if (!currentUser.bestTimes[diff] || time < currentUser.bestTimes[diff]) {
        currentUser.bestTimes[diff] = time;
        newRecord = true;
      }

      updateRecordDisplay();

      if (currentUser.id) {
        usersCollection.doc(currentUser.id).set({
          score: currentUser.score,
          bestTimes: currentUser.bestTimes,
          username: currentUser.username,
          avatar: currentUser.avatar
        }, { merge: true });

        recordsCollection.add({
          userId: currentUser.id,
          username: currentUser.username,
          avatar: currentUser.avatar,
          difficulty: diff,
          time: time,
          date: new Date().toISOString()
        });
      }

      el('win-modal-message').innerHTML = `Difficulty: <b style="color:white">${diff}</b><br>Time: <span style="font-feature-settings: 'tnum';">${formatTime(time)}</span><br>Score: <span style="color:var(--accent-color)">+${Math.floor(pts)}</span>${newRecord ? '<br><br>🏆 <b>New Record!</b>' : ''}`;
      toggleModal('win-modal', true);
    }

    function updateRecordDisplay() {
      el('easy-record').textContent = formatTime(currentUser.bestTimes.easy);
      el('medium-record').textContent = formatTime(currentUser.bestTimes.medium);
      el('hard-record').textContent = formatTime(currentUser.bestTimes.hard);
    }

    // --- LEADERBOARD FIX ---
    async function loadLeaderboard() {
      const list = el('rating-list');
      list.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.6;">Loading...</div>';

      let query;
      if (currentRatingType === 'score') {
        query = usersCollection.orderBy('score', 'desc').limit(20);
      } else {
        query = recordsCollection.where('difficulty', '==', currentRatingDifficulty).orderBy('time', 'asc').limit(20);
      }

      try {
        const snap = await query.get();
        list.innerHTML = '';
        if (snap.empty) {
          list.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.6;">No records yet</div>';
          return;
        }

        snap.forEach((doc, idx) => {
          const d = doc.data();
          const rank = idx + 1;

          let rankClass = "rank-cell";
          let rankContent = rank;
          if (rank === 1) { rankClass += " rank-1"; rankContent = "1"; } // Medal icon via css or just color
          if (rank === 2) { rankClass += " rank-2"; rankContent = "2"; }
          if (rank === 3) { rankClass += " rank-3"; rankContent = "3"; }

          const row = document.createElement('div');
          row.className = 'rank-row';

          // Fixed structure for better alignment
          row.innerHTML = `
            <div class="${rankClass}">${rankContent}</div>
            <img src="${d.avatar || 'https://cdn-icons-png.flaticon.com/512/847/847969.png'}" style="width:36px; height:36px; border-radius:50%; border:1px solid rgba(255,255,255,0.2);">
            <div class="player-info">
              <div class="player-name">${d.username || 'Unknown'}</div>
            </div>
            <div class="player-score">${currentRatingType === 'score' ? Math.floor(d.score) : formatTime(d.time)}</div>
          `;
          list.appendChild(row);
        });
      } catch (e) { list.textContent = "Error loading data"; console.error(e); }
    }

    // --- INIT ---
    document.addEventListener('DOMContentLoaded', () => {
      elements.newGameBtn.onclick = startGame;
      elements.checkBtn.onclick = checkGame;
      elements.hintBtn.onclick = getHint;
      elements.undoBtn.onclick = undo;
      el('settings-button').onclick = () => toggleModal('settings-modal', true);
      el('rating-button').onclick = () => { toggleModal('rating-modal', true); loadLeaderboard(); };
      el('win-modal-close-btn').onclick = () => toggleModal('win-modal', false);

      document.querySelectorAll('.close-btn').forEach(b => {
        b.onclick = () => toggleModal(b.dataset.target, false);
      });
      document.querySelectorAll('.modal-overlay').forEach(o => {
        o.onclick = (e) => { if (e.target === o) toggleModal(o.id, false); };
      });

      el('sound-toggle').onclick = (e) => {
        isSoundEnabled = !isSoundEnabled;
        e.target.textContent = isSoundEnabled ? "ON" : "OFF";
      };
      el('highlightToggle').onclick = (e) => {
        highlightEnabled = !highlightEnabled;
        e.target.textContent = highlightEnabled ? "ON" : "OFF";
        if (!highlightEnabled) clearHighlights();
      };

      // Custom sound recording handlers
      el('record-sound-btn').onclick = startRecording;
      el('clear-sound-btn').onclick = clearCustomSound;
      el('save-trim-btn').onclick = saveTrimmedAudio;

      const sSlider = el('trim-start');
      const eSlider = el('trim-end');
      sSlider.oninput = () => { if (parseInt(sSlider.value) >= parseInt(eSlider.value)) sSlider.value = eSlider.value - 1; };
      eSlider.oninput = () => { if (parseInt(eSlider.value) <= parseInt(sSlider.value)) eSlider.value = parseInt(sSlider.value) + 1; };

      el('cancel-trim-btn').onclick = () => {
        el('trim-editor').classList.add('hidden');
        el('recording-status').textContent = 'Trim cancelled.';
      };
      el('test-sound-btn').onclick = async () => {
        if (el('trim-editor').classList.contains('hidden')) {
          clickSound.currentTime = 0;
          clickSound.play().catch(() => { });
        } else {
          // Play preview of trimmed section
          const startPct = parseInt(el('trim-start').value) / 100;
          const endPct = parseInt(el('trim-end').value) / 100;
          const duration = originalAudioBuffer.duration;

          const source = audioContext.createBufferSource();
          source.buffer = originalAudioBuffer;
          source.connect(audioContext.destination);
          source.start(0, startPct * duration, (endPct - startPct) * duration);
        }
      };

      // Load custom sound on startup
      loadCustomSound();

      document.querySelectorAll('.rating-tab').forEach(t => {
        t.onclick = () => {
          currentRatingType = t.dataset.type;
          document.querySelectorAll('.rating-tab').forEach(x => { x.classList.remove('active'); x.style.background = 'transparent'; x.style.color = 'var(--text-muted)'; });
          t.classList.add('active');
          t.style.background = 'rgba(255,255,255,0.1)';
          t.style.color = 'white';
          el('difficulty-tabs').classList.toggle('hidden', currentRatingType !== 'time');
          loadLeaderboard();
        }
      });
      document.querySelectorAll('.diff-tab').forEach(t => {
        t.onclick = () => {
          currentRatingDifficulty = t.dataset.d;
          document.querySelectorAll('.diff-tab').forEach(x => { x.classList.remove('active'); x.style.background = 'rgba(255,255,255,0.05)'; });
          t.classList.add('active');
          t.style.background = 'var(--accent-color)';
          loadLeaderboard();
        }
      });

      // Default active tab styles
      document.querySelector('.rating-tab.active').style.background = 'rgba(255,255,255,0.1)';
      document.querySelector('.rating-tab.active').style.color = 'white';

      initUser();
      startGame();
    });
  </script>
</body>
