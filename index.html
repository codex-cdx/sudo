<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sudoku Glass</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    /* --- Шрифты и База --- */
    :root {
      --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      
      /* Default Theme (iOS Dark Glass) */
      --app-bg: #000000;
      --glass-panel: rgba(30, 30, 30, 0.65);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-blur: 25px;
      
      --accent-color: #0A84FF; /* iOS Blue */
      --accent-hover: #007AFF;
      --text-main: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.6);
      
      --cell-bg: rgba(255, 255, 255, 0.05);
      --cell-active: rgba(10, 132, 255, 0.2);
      --cell-highlight: rgba(10, 132, 255, 0.1);
      --grid-gap-color: rgba(255, 255, 255, 0.1);
      
      --btn-bg: rgba(255, 255, 255, 0.1);
      --btn-text: #FFFFFF;
      
      --error-color: #FF453A; /* iOS Red */
      --success-color: #32D74B; /* iOS Green */
      --warn-color: #FFD60A;
      
      --given-num: #FFFFFF;
      --user-num: #0A84FF;
      
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 10px;
    }

    /* Темы */
    body[data-theme="light"] {
      --app-bg: #F2F2F7;
      --glass-panel: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(0, 0, 0, 0.05);
      --text-main: #000000;
      --text-secondary: rgba(60, 60, 67, 0.6);
      --cell-bg: rgba(0, 0, 0, 0.03);
      --cell-active: rgba(0, 122, 255, 0.15);
      --given-num: #000000;
      --grid-gap-color: rgba(0, 0, 0, 0.1);
      --btn-bg: rgba(0, 0, 0, 0.05);
      --btn-text: #000000;
    }

    body[data-theme="purple"] {
      --accent-color: #BF5AF2;
      --accent-hover: #AF52DE;
      --user-num: #BF5AF2;
      --cell-active: rgba(191, 90, 242, 0.2);
    }

    body[data-theme="gold"] {
      --accent-color: #FFD60A;
      --accent-hover: #FFC800;
      --user-num: #FFD60A;
      --cell-active: rgba(255, 214, 10, 0.2);
      --btn-text: #ffffff;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    
    body {
      font-family: var(--font-main);
      background-color: var(--app-bg);
      color: var(--text-main);
      margin: 0;
      height: 100dvh; /* Dynamic viewport height */
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* --- Анимированный фон (Blobs) --- */
    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.6;
      animation: float 10s infinite ease-in-out;
    }
    .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--accent-color); animation-delay: 0s; }
    .blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: #5E5CE6; animation-delay: -5s; }
    .blob-3 { top: 40%; left: 40%; width: 40vw; height: 40vw; background: #30D158; opacity: 0.3; animation-delay: -2s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* --- Glass Components --- */
    .glass {
      background: var(--glass-panel);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
    }

    .glass-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: 1px solid var(--glass-border);
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .glass-btn:active { transform: scale(0.95); opacity: 0.8; }
    .glass-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    
    .btn-primary {
      background: var(--accent-color);
      color: #fff;
      border: none;
      box-shadow: 0 4px 15px color-mix(in srgb, var(--accent-color) 40%, transparent);
    }
    .btn-primary:active { background: var(--accent-hover); }

    /* --- Loading Screen --- */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--app-bg);
      z-index: 9999;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      transition: opacity 0.5s ease-out;
    }
    .loader {
      width: 48px; height: 48px;
      border: 5px solid var(--text-secondary);
      border-bottom-color: var(--accent-color);
      border-radius: 50%;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* --- Layout & Grid --- */
    #game-container {
      width: 100%; max-width: 500px;
      height: 100%; max-height: 100dvh;
      display: flex; flex-direction: column;
      padding: 1rem;
      position: relative; z-index: 10;
    }

    .header-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.5rem;
      padding: 0.75rem;
      border-radius: var(--radius-lg);
    }

    .grid-wrapper {
      flex-grow: 1;
      display: flex; justify-content: center; align-items: center;
      padding: 10px 0;
    }

    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 1px;
      background-color: var(--grid-gap-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      width: 100%;
      aspect-ratio: 1/1;
      border: 2px solid var(--glass-border);
      position: relative;
    }

    /* Толстые линии сетки через псевдоэлементы или спец классы */
    .sudoku-grid {
      padding: 2px;
    }
    .cell {
      background: var(--cell-bg);
      position: relative;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(1rem, 5vw, 1.8rem);
      transition: background 0.15s;
    }
    
    /* Границы блоков 3x3 */
    .cell:nth-child(3n) { border-right: 1px solid rgba(255,255,255,0.05); } 
    .cell:nth-child(9n) { border-right: none; }
    .cell:nth-child(n+19):nth-child(-n+27),
    .cell:nth-child(n+46):nth-child(-n+54) {
      border-bottom: 1px solid rgba(255,255,255,0.05); /* Тонкая линия внутри */
    }

    /* Визуальные разделители блоков (наложенная сетка) */
    .grid-overlay {
      position: absolute; inset: 0; pointer-events: none;
      display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
      border-radius: var(--radius-md);
      z-index: 5;
    }
    .block-border {
      border: 2px solid var(--glass-border);
      box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.1);
    }

    .cell-content { font-weight: 500; }
    .cell.given .cell-content { color: var(--given-num); font-weight: 700; }
    .cell.user-input .cell-content { color: var(--user-num); }
    .cell.error .cell-content { color: var(--error-color) !important; animation: shake 0.3s; }
    
    .cell.active-cell { background: var(--cell-active); box-shadow: inset 0 0 0 2px var(--accent-color); z-index: 2; border-radius: 4px;}
    .cell.highlight { background: var(--cell-highlight); }
    .cell.area-highlight { background: rgba(255,255,255,0.03); }
    .cell.hinted { background: var(--success-color) !important; color: #000 !important; transition: all 0.5s; }

    /* --- Controls Area --- */
    .controls-area {
      display: flex; flex-direction: column; gap: 0.75rem;
      margin-bottom: env(safe-area-inset-bottom, 20px);
    }

    .tools-bar {
      display: flex; justify-content: space-between; gap: 0.5rem;
    }
    .tool-btn {
      flex: 1; height: 44px; border-radius: var(--radius-sm); font-size: 0.9rem;
    }

    .numpad {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem;
    }
    .num-btn {
      aspect-ratio: 1.2/1; border-radius: var(--radius-sm); font-size: 1.5rem; font-weight: 400;
    }
    .num-btn.selected { background: var(--accent-color); color: white; border-color: transparent; }

    /* --- Modals --- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
      z-index: 50; opacity: 0; visibility: hidden; transition: all 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }
    
    .modal-content {
      width: 90%; max-width: 400px; max-height: 85vh;
      padding: 1.5rem; border-radius: var(--radius-lg);
      transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow-y: auto;
    }
    .modal-overlay.open .modal-content { transform: scale(1); }

    /* --- Animations --- */
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    /* Utilities */
    .text-accent { color: var(--accent-color); }
    .text-sm { font-size: 0.875rem; }
    .font-bold { font-weight: 700; }
    .hidden { display: none !important; }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

    /* Leaderboard Styles */
    .rank-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; border-bottom: 1px solid var(--glass-border);
    }
    .rank-item:last-child { border-bottom: none; }
    .rank-badge {
      width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: 0.8rem; font-weight: bold;
    }
    .rank-1 { background: #FFD700; color: #000; }
    .rank-2 { background: #C0C0C0; color: #000; }
    .rank-3 { background: #CD7F32; color: #000; }
  </style>
</head>
<body>

  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div id="loading-screen">
    <div class="loader"></div>
    <div style="margin-top: 20px; font-weight: 500; font-size: 1.2rem; color: var(--text-main);">Sudoku</div>
  </div>

  <div id="game-container">
    
    <div class="glass header-bar">
      <div class="flex items-center gap-3">
        <div class="relative">
          <img id="user-avatar" src="https://t.me/i/userpic/320/default.jpg" class="w-10 h-10 rounded-full border border-white/20 object-cover" alt="Ava">
          <div class="absolute -bottom-1 -right-1 bg-gray-800 text-[10px] px-1.5 py-0.5 rounded-full border border-white/10" id="difficulty-badge">Easy</div>

        <div class="flex flex-col">
          <span id="username" class="text-sm font-bold truncate max-w-[100px]">Guest</span>

            <svg class="w-3 h-3 text-accent" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>

    <div class="controls-area">

           Undo
         </button>

           <svg class="w-5 h-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
           Erase
         </button>
         <button id="hint-button" class="glass-btn tool-btn">
           <svg class="w-5 h-5 mr-1 text-accent" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.34.208-.646.477-.859a4 4 0 10-4.954 0c.27.213.462.519.476.859h4.002z"/></svg>
           <span id="hint-count-display">3</span>

            Check

      </div>

      <div class="numpad" id="number-row">
        </div>
    </div>
  </div>

  <div id="menu-modal" class="modal-overlay">
    <div class="modal-content glass">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Меню</h2>
        <button class="close-modal text-2xl opacity-70 hover:opacity-100">&times;</button>
      </div>

      <div class="space-y-4">
        <div>
          <label class="text-sm text-secondary block mb-2">Сложность</label>
          <div class="flex bg-black/20 p-1 rounded-xl">

            <button class="diff-select flex-1 py-2 text-sm rounded-lg transition-colors opacity-60" data-val="medium">Mid</button>

          </div>

        </div>

        <hr class="border-white/10 my-4">

        <div>
           <label class="text-sm text-secondary block mb-2">Тема</label>
           <div class="flex gap-3 justify-center">
             <div class="w-8 h-8 rounded-full cursor-pointer border-2 border-white theme-opt" style="background:#222" data-theme="dark"></div>
             <div class="w-8 h-8 rounded-full cursor-pointer border-2 border-transparent theme-opt" style="background:#eee" data-theme="light"></div>
             <div class="w-8 h-8 rounded-full cursor-pointer border-2 border-transparent theme-opt bg-purple-500" data-theme="purple"></div>
             <div class="w-8 h-8 rounded-full cursor-pointer border-2 border-transparent theme-opt bg-yellow-400" data-theme="gold"></div>
           </div>
        </div>

        <hr class="border-white/10 my-4">

        <div class="grid grid-cols-2 gap-3">
          <button id="rating-btn" class="glass-btn py-3 rounded-xl">🏆 Рейтинг</button>
          <button id="history-btn" class="glass-btn py-3 rounded-xl">📜 История</button>
          <button id="tutorial-btn" class="glass-btn py-3 rounded-xl">🎓 Обучение</button>
          <button id="sound-btn" class="glass-btn py-3 rounded-xl">🔊 Звук</button>
        </div>
      </div>
    </div>
  </div>

  <div id="content-modal" class="modal-overlay">
    <div class="modal-content glass">
      <div class="flex justify-between items-center mb-4">
        <h2 id="modal-title" class="text-xl font-bold">Заголовок</h2>
        <button class="close-content-modal text-2xl">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="win-modal" class="modal-overlay">
    <div class="modal-content glass text-center">
      <div class="text-6xl mb-4">🎉</div>
      <h2 class="text-2xl font-bold mb-2">Победа!</h2>
      <p id="win-details" class="text-secondary mb-6 text-sm"></p>
      <button class="glass-btn btn-primary w-full py-3 rounded-xl font-bold close-win-modal">Круто!</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

  <script>
    /* --- LOGIC PRESERVED & ADAPTED --- */

    // 1. Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBkYQ7tRMrZ-mghBnkJ_EvuzHpjs_p8hOY",
      authDomain: "sudo-9fbfc.firebaseapp.com",
      projectId: "sudo-9fbfc",
      storageBucket: "sudo-9fbfc.appspot.com",
      messagingSenderId: "927814106972",
      appId: "1:927814106972:web:71e0773453f9d16f598b99"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const usersCollection = db.collection('users');
    const recordsCollection = db.collection('timeRecords');

    // 2. Global State
    let grid = [], solution = [], givenCells = new Set();
    let timerInterval, startTime = 0;
    let activeCell = null; // [row, col]
    let activeTool = null; // number or 'erase'
    let isGameFinished = false;
    let hintCount = 0;
    let undoStack = [];
    let isSoundEnabled = localStorage.getItem('sudoku-sound') !== 'false';
    let currentDifficulty = 'easy';
    
    let currentUser = { 
        id: null, 
        username: 'Guest', 
        avatar: 'https://t.me/i/userpic/320/default.jpg', 
        score: 0, 
        bestTimes: { easy: null, medium: null, hard: null } 
    };

    const CLICK_SOUND = new Audio('https://github.com/codex-cdx/sudo/raw/refs/heads/main/%D0%9F%D0%BB%D0%B0%D0%BC%D0%B1.mp3');
    
    // 3. UI Helpers
    const playSound = () => {
        if (!isSoundEnabled) return;
        CLICK_SOUND.currentTime = 0;
        CLICK_SOUND.play().catch(() => {});
        // Telegram Haptic
        if(window.Telegram?.WebApp?.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
        }
    };

    const formatTime = (s) => {
        if (s == null) return '--:--';
        return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
    };

    // 4. Game Logic (Core)
    function createGrid() {
        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = '';
        // Create 81 cells
        for(let i=0; i<81; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.index = i;
            cell.innerHTML = '<span class="cell-content"></span>';
            cell.addEventListener('click', (e) => handleCellClick(i));
            gridEl.appendChild(cell);
        }
        grid = Array(9).fill().map(() => Array(9).fill(0));
    }

    function generatePuzzle(diff) {
        // Simple generation logic preserved
        let board = Array(9).fill().map(() => Array(9).fill(0));
        fillBoard(board);
        solution = board.map(r => [...r]);
        
        let attempts = diff === 'easy' ? 30 : diff === 'medium' ? 45 : 55; // Holes to make
        while (attempts > 0) {
            let row = Math.floor(Math.random() * 9);
            let col = Math.floor(Math.random() * 9);
            if (board[row][col] !== 0) {
                board[row][col] = 0;
                attempts--;
            }
        }
        
        grid = board;
        givenCells.clear();
        for(let r=0; r<9; r++) 
            for(let c=0; c<9; c++) 
                if(grid[r][c] !== 0) givenCells.add(`${r},${c}`);
        
        renderGrid();
    }

    function fillBoard(board) {
        // Backtracking filler
        for(let i=0; i<81; i++) {
            let r = Math.floor(i/9), c = i%9;
            if(board[r][c] === 0) {
                let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                for(let num of nums) {
                    if(isSafe(board, r, c, num)) {
                        board[r][c] = num;
                        if(fillBoard(board)) return true;
                        board[r][c] = 0;
                    }
                }
                return false;
            }
        }
        return true;
    }

    function isSafe(board, row, col, num) {
        for(let x=0; x<9; x++) if(board[row][x] === num || board[x][col] === num) return false;
        let startRow = row - row%3, startCol = col - col%3;
        for(let i=0; i<3; i++) for(let j=0; j<3; j++) if(board[i+startRow][j+startCol] === num) return false;
        return true;
    }

    function renderGrid(resetT = true) {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, i) => {
            const r = Math.floor(i/9), c = i%9;
            const val = grid[r][c];
            const content = cell.querySelector('.cell-content');
            content.textContent = val === 0 ? '' : val;
            
            cell.className = 'cell'; // Reset classes
            if(givenCells.has(`${r},${c}`)) cell.classList.add('given');
            else if(val !== 0) cell.classList.add('user-input');
        });
        updateNumberPad();
        if(resetT) startTimer();
    }

    // 5. Interaction Logic
    function handleCellClick(index) {
        playSound();
        if (isGameFinished) return;
        const r = Math.floor(index/9), c = index%9;

        // If tool selected (Number or Erase)
        if (activeTool) {
            if (givenCells.has(`${r},${c}`)) return; // Can't edit givens
            
            const prev = grid[r][c];
            const newVal = activeTool === 'erase' ? 0 : activeTool;
            
            if (prev !== newVal) {
                undoStack.push({r, c, prev, new: newVal});
                grid[r][c] = newVal;
                const cell = document.querySelectorAll('.cell')[index];
                const content = cell.querySelector('.cell-content');
                content.textContent = newVal === 0 ? '' : newVal;
                cell.classList.remove('error');
                cell.classList.toggle('user-input', newVal !== 0);
                
                checkHighlights(r, c);
                updateUndoBtn();
                updateNumberPad();
            }
            return;
        }

        // Just select
        selectCell(r, c);
    }

    function selectCell(r, c) {
        activeCell = [r, c];
        // Visual updates
        document.querySelectorAll('.cell').forEach(el => el.classList.remove('active-cell', 'area-highlight', 'highlight'));
        
        const index = r*9 + c;
        const cells = document.querySelectorAll('.cell');
        cells[index].classList.add('active-cell');

        // Highlight Row, Col, Box
        for(let i=0; i<81; i++) {
            let tr = Math.floor(i/9), tc = i%9;
            let sameBox = Math.floor(tr/3) === Math.floor(r/3) && Math.floor(tc/3) === Math.floor(c/3);
            if (tr === r || tc === c || sameBox) cells[i].classList.add('area-highlight');
        }

        // Highlight same numbers
        const val = grid[r][c];
        if (val !== 0) {
            for(let i=0; i<81; i++) {
                let tr = Math.floor(i/9), tc = i%9;
                if(grid[tr][tc] === val) cells[i].classList.add('highlight');
            }
        }
    }
    
    // Checks highlights after a move without changing selection
    function checkHighlights(r, c) {
        if(activeCell && activeCell[0] === r && activeCell[1] === c) {
             selectCell(r, c);
        }
        // Also if we just placed a number, highlight all instances of it temporarily? 
        // Let's stick to standard selection logic.
    }

    function handleNumberPad(num) {
        playSound();
        if(activeCell) {
            // Apply number to selected cell
            const [r, c] = activeCell;
            if(givenCells.has(`${r},${c}`)) return;
            
            const prev = grid[r][c];
            if(prev !== num) {
                undoStack.push({r, c, prev, new: num});
                grid[r][c] = num;
                const cell = document.querySelectorAll('.cell')[r*9+c];
                cell.querySelector('.cell-content').textContent = num;
                cell.classList.add('user-input');
                cell.classList.remove('error');
                updateUndoBtn();
                updateNumberPad();
                selectCell(r, c); // Re-highlight
            }
        } else {
            // Select tool
            if(activeTool === num) {
                activeTool = null;
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
            } else {
                activeTool = num;
                activeCell = null; // Deselect cell when picking tool
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-cell', 'area-highlight'));
                
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
                document.getElementById('erase-button').classList.remove('btn-primary'); // Remove highlight from eraser
                const btn = document.querySelector(`.num-btn[data-num="${num}"]`);
                if(btn) btn.classList.add('selected');
                
                // Highlight all instances of this number
                document.querySelectorAll('.cell').forEach(el => el.classList.remove('highlight'));
                 for(let i=0; i<81; i++) {
                    let tr = Math.floor(i/9), tc = i%9;
                    if(grid[tr][tc] === num) document.querySelectorAll('.cell')[i].classList.add('highlight');
                }
            }
        }
    }

    function updateNumberPad() {
        const counts = Array(10).fill(0);
        grid.forEach(row => row.forEach(n => counts[n]++));
        
        const pad = document.getElementById('number-row');
        pad.innerHTML = '';
        for(let i=1; i<=9; i++) {
            const btn = document.createElement('button');
            btn.className = 'glass-btn num-btn';
            btn.textContent = i;
            btn.dataset.num = i;
            if(counts[i] >= 9) btn.disabled = true;
            if(activeTool === i) btn.classList.add('selected');
            btn.onclick = () => handleNumberPad(i);
            pad.appendChild(btn);
        }
    }

    // 6. Utility Functions (Undo, Erase, Hint, Check)
    document.getElementById('undo-button').addEventListener('click', () => {
        playSound();
        if(undoStack.length === 0) return;
        const action = undoStack.pop();
        grid[action.r][action.c] = action.prev;
        const cell = document.querySelectorAll('.cell')[action.r*9 + action.c];
        cell.querySelector('.cell-content').textContent = action.prev || '';
        if(action.prev === 0) cell.classList.remove('user-input');
        updateUndoBtn();
        updateNumberPad();
        if(activeCell) selectCell(activeCell[0], activeCell[1]);
    });

    function updateUndoBtn() {
        document.getElementById('undo-button').disabled = undoStack.length === 0;
    }

    document.getElementById('erase-button').addEventListener('click', function() {
        playSound();
        if(activeCell) {
             const [r, c] = activeCell;
             if(!givenCells.has(`${r},${c}`)) {
                 undoStack.push({r, c, prev: grid[r][c], new: 0});
                 grid[r][c] = 0;
                 const cell = document.querySelectorAll('.cell')[r*9+c];
                 cell.querySelector('.cell-content').textContent = '';
                 cell.classList.remove('user-input', 'error');
                 updateUndoBtn();
                 updateNumberPad();
             }
        } else {
            // Toggle tool mode
            if(activeTool === 'erase') {
                activeTool = null;
                this.classList.remove('btn-primary');
            } else {
                activeTool = 'erase';
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('btn-primary');
            }
        }
    });

    document.getElementById('hint-button').addEventListener('click', () => {
        playSound();
        if(hintCount >= 3 || isGameFinished) return;
        
        // Find a mistake or empty cell
        let targets = [];
        for(let r=0; r<9; r++) for(let c=0; c<9; c++) {
            if(givenCells.has(`${r},${c}`)) continue;
            if(grid[r][c] === 0 || grid[r][c] !== solution[r][c]) targets.push([r,c]);
        }
        
        if(targets.length === 0) return;
        
        const [tr, tc] = targets[Math.floor(Math.random() * targets.length)];
        grid[tr][tc] = solution[tr][tc];
        
        const cell = document.querySelectorAll('.cell')[tr*9+tc];
        cell.querySelector('.cell-content').textContent = solution[tr][tc];
        cell.classList.add('hinted', 'user-input');
        cell.classList.remove('error');
        
        hintCount++;
        document.getElementById('hint-count-display').textContent = `${3 - hintCount}`;
        if(hintCount >= 3) document.getElementById('hint-button').disabled = true;
    });

    document.getElementById('check-btn').addEventListener('click', () => {
        playSound();
        if(isGameFinished) return;
        
        let errors = 0;
        let filled = 0;
        const cells = document.querySelectorAll('.cell');
        
        for(let r=0; r<9; r++) for(let c=0; c<9; c++) {
            if(grid[r][c] !== 0) filled++;
            if(grid[r][c] !== 0 && !givenCells.has(`${r},${c}`) && grid[r][c] !== solution[r][c]) {
                cells[r*9+c].classList.add('error');
                errors++;
            }
        }
        
        if(filled === 81 && errors === 0) {
            handleWin();
        } else if (errors === 0 && filled < 81) {
             // Incomplete but correct so far
             if(window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
        } else {
             if(window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
        }
    });

    function handleWin() {
        isGameFinished = true;
        clearInterval(timerInterval);
        const timeSpent = Math.floor((Date.now() - startTime)/1000);
        
        // Score calc
        let base = currentDifficulty === 'easy' ? 100 : currentDifficulty === 'medium' ? 250 : 500;
        let score = Math.max(10, base - (hintCount * 50) + (base - timeSpent));
        
        currentUser.score += score;
        document.getElementById('user-score').textContent = currentUser.score;
        saveUserData();
        saveTimeRecord(currentDifficulty, timeSpent);
        
        document.getElementById('win-details').innerHTML = `Сложность: ${currentDifficulty.toUpperCase()}<br>Время: ${formatTime(timeSpent)}<br>Очки: +${score}`;
        document.getElementById('win-modal').classList.add('open');
        
        if(window.Telegram?.WebApp) {
            window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
        }
    }

    // 7. Data & User
    async function initUser() {
        try {
            await auth.signInAnonymously();
            
            // Telegram Check
            if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
                const tgUser = window.Telegram.WebApp.initDataUnsafe.user;
                currentUser.id = String(tgUser.id);
                currentUser.username = tgUser.username || tgUser.first_name || 'Player';
                if(tgUser.photo_url) currentUser.avatar = tgUser.photo_url;
            } else {
                currentUser.id = auth.currentUser.uid;
            }

            document.getElementById('username').textContent = currentUser.username;
            document.getElementById('user-avatar').src = currentUser.avatar;

            // Load Data
            const doc = await usersCollection.doc(currentUser.id).get();
            if(doc.exists) {
                const d = doc.data();
                currentUser.score = d.score || 0;
                currentUser.bestTimes = d.bestTimes || currentUser.bestTimes;
            } else {
                saveUserData();
            }
            document.getElementById('user-score').textContent = currentUser.score;
            
        } catch(e) { console.error(e); }
    }

    async function saveUserData() {
        if(!currentUser.id) return;
        await usersCollection.doc(currentUser.id).set({
            username: currentUser.username,
            avatar: currentUser.avatar,
            score: currentUser.score,
            bestTimes: currentUser.bestTimes
        }, {merge: true});
    }

    async function saveTimeRecord(diff, time) {
        // Save global record
        await recordsCollection.add({
            userId: currentUser.id,
            username: currentUser.username,
            avatar: currentUser.avatar,
            difficulty: diff,
            time: time,
            date: new Date().toISOString()
        });
        
        // Update personal best
        if(!currentUser.bestTimes[diff] || time < currentUser.bestTimes[diff]) {
            currentUser.bestTimes[diff] = time;
            saveUserData();
        }
    }

    function startTimer() {
        clearInterval(timerInterval);
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const el = Math.floor((Date.now() - startTime)/1000);
            document.getElementById('timer').textContent = formatTime(el);
        }, 1000);
    }

    // 8. Modals & Menus logic
    const menuModal = document.getElementById('menu-modal');
    const contentModal = document.getElementById('content-modal');
    
    document.getElementById('menu-btn').onclick = () => { playSound(); menuModal.classList.add('open'); };
    document.querySelector('.close-modal').onclick = () => { playSound(); menuModal.classList.remove('open'); };
    document.querySelector('.close-content-modal').onclick = () => { playSound(); contentModal.classList.remove('open'); };
    document.querySelector('.close-win-modal').onclick = () => { playSound(); document.getElementById('win-modal').classList.remove('open'); menuModal.classList.add('open'); };

    // New Game / Difficulty
    document.querySelectorAll('.diff-select').forEach(btn => {
        btn.onclick = () => {
            playSound();
            document.querySelectorAll('.diff-select').forEach(b => {
                b.style.opacity = '0.6'; 
                b.style.backgroundColor = 'rgba(255,255,255,0.1)';
            });
            btn.style.opacity = '1';
            btn.style.backgroundColor = 'var(--accent-color)';
            currentDifficulty = btn.dataset.val;
        };
    });
    // Set default diff visual
    document.querySelector('[data-val="easy"]').click();

    document.getElementById('new-game-btn').onclick = () => {
        playSound();
        menuModal.classList.remove('open');
        isGameFinished = false;
        undoStack = [];
        hintCount = 0;
        activeTool = null;
        document.getElementById('hint-button').disabled = false;
        document.getElementById('hint-count-display').textContent = '3';
        document.getElementById('difficulty-badge').textContent = currentDifficulty.charAt(0).toUpperCase() + currentDifficulty.slice(1);
        
        createGrid();
        generatePuzzle(currentDifficulty);
    };

    // Theming
    document.querySelectorAll('.theme-opt').forEach(t => {
        t.onclick = () => {
            playSound();
            document.body.dataset.theme = t.dataset.theme === 'dark' ? '' : t.dataset.theme; // '' is default dark
            localStorage.setItem('sudoku-theme', t.dataset.theme);
        };
    });
    const savedTheme = localStorage.getItem('sudoku-theme');
    if(savedTheme && savedTheme !== 'dark') document.body.dataset.theme = savedTheme;

    // Leaderboard Render
    document.getElementById('rating-btn').onclick = async () => {
        playSound();
        const body = document.getElementById('modal-body');
        document.getElementById('modal-title').textContent = "Топ игроков";
        body.innerHTML = '<div class="text-center p-4">Загрузка...</div>';
        contentModal.classList.add('open');
        
        const snap = await usersCollection.orderBy('score', 'desc').limit(20).get();
        body.innerHTML = '<div class="flex flex-col gap-2"></div>';
        const list = body.querySelector('div');
        
        let i = 1;
        snap.forEach(doc => {
            const u = doc.data();
            const div = document.createElement('div');
            div.className = 'rank-item';
            div.innerHTML = `
                <div class="rank-badge ${i===1?'rank-1':i===2?'rank-2':i===3?'rank-3':'bg-white/10'}">${i}</div>
                <img src="${u.avatar}" class="w-8 h-8 rounded-full">
                <div class="flex-1 font-bold">${u.username}</div>
                <div class="text-accent">${u.score}</div>
            `;
            list.appendChild(div);
            i++;
        });
    };

    // Tutorial Render (Simplified logic from original)
    document.getElementById('tutorial-btn').onclick = () => {
         playSound();
         document.getElementById('modal-title').textContent = "Как играть";
         document.getElementById('modal-body').innerHTML = `
            <div class="p-2 space-y-4">
                <p>1. Каждая строка должна содержать цифры 1-9.</p>
                <p>2. Каждый столбец должен содержать цифры 1-9.</p>
                <p>3. Каждый квадрат 3x3 должен содержать цифры 1-9.</p>
                <div class="glass p-3 rounded-lg text-sm text-secondary">
                   Совет: Нажмите на клетку, затем на цифру внизу. Или выберите цифру (инструмент) и нажимайте на клетки.
                </div>
            </div>
         `;
         contentModal.classList.add('open');
    };
    
    // History
    document.getElementById('history-btn').onclick = () => {
        playSound();
        document.getElementById('modal-title').textContent = "Мои рекорды";
        const t = currentUser.bestTimes;
        document.getElementById('modal-body').innerHTML = `
            <div class="space-y-3 p-2">
                <div class="glass p-3 rounded flex justify-between"><span>Easy</span> <span class="font-bold text-accent">${formatTime(t.easy)}</span></div>
                <div class="glass p-3 rounded flex justify-between"><span>Medium</span> <span class="font-bold text-accent">${formatTime(t.medium)}</span></div>
                <div class="glass p-3 rounded flex justify-between"><span>Hard</span> <span class="font-bold text-accent">${formatTime(t.hard)}</span></div>
            </div>
        `;
        contentModal.classList.add('open');
    };

    // Sound toggle
    document.getElementById('sound-btn').onclick = () => {
        isSoundEnabled = !isSoundEnabled;
        localStorage.setItem('sudoku-sound', isSoundEnabled);
        playSound();
        alert(isSoundEnabled ? "Звук включен" : "Звук выключен");
    };

    // --- Init ---
    window.onload = async () => {
        if(window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.enableClosingConfirmation();
        }
        createGrid();
        
        // Hide loader
        await initUser();
        generatePuzzle('easy');
        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        }, 1000);
    };

  </script>
</body>
</html>
