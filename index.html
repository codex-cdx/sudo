<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sudoku Premium X</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

  <style>
    /* --- RESET & CORE --- */
    :root {
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
      
      /* Default: Dark Glass */
      --bg-grad: radial-gradient(circle at 50% 0%, #1a2a3a 0%, #000000 100%);
      --glass-bg: rgba(25, 25, 25, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      
      --txt-main: #ffffff;
      --txt-sec: #8e8e93;
      --accent: #0A84FF;
      --accent-glow: rgba(10, 132, 255, 0.5);
      
      --grid-border: rgba(255, 255, 255, 0.15);
      --cell-bg: rgba(255, 255, 255, 0.03);
      --cell-active: rgba(10, 132, 255, 0.25);
      
      --given-col: #ffffff;
      --user-col: #64d2ff;
      --err-col: #ff453a;
    }

    body[data-theme="light"] {
      --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --glass-bg: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
      --txt-main: #1d1d1f;
      --txt-sec: #6e6e73;
      --accent: #007AFF;
      --accent-glow: rgba(0, 122, 255, 0.3);
      --grid-border: rgba(0, 0, 0, 0.1);
      --cell-bg: rgba(255, 255, 255, 0.4);
      --cell-active: rgba(0, 122, 255, 0.2);
      --given-col: #000000;
      --user-col: #007AFF;
    }

    body[data-theme="neon"] {
      --bg-grad: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
      --glass-bg: rgba(20, 10, 30, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #d946ef;
      --accent-glow: rgba(217, 70, 239, 0.6);
      --user-col: #f0abfc;
      --cell-active: rgba(217, 70, 239, 0.2);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; padding: 0;
      font-family: var(--font-stack);
      background: var(--bg-grad);
      color: var(--txt-main);
      height: 100vh; height: 100dvh;
      overflow: hidden;
      display: flex; flex-direction: column;
      user-select: none; -webkit-user-select: none;
      transition: background 0.5s ease;
    }

    /* --- UTILS --- */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
    }
    .btn {
      border: none; outline: none; cursor: pointer;
      font-family: inherit; font-weight: 600;
      transition: transform 0.1s, background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn:active { transform: scale(0.96); }
    .hidden { display: none !important; }

    /* --- LAYOUT --- */
    #app {
      flex: 1;
      display: flex; flex-direction: column;
      padding: max(10px, var(--safe-top)) 16px max(10px, var(--safe-bottom)) 16px;
      max-width: 500px; margin: 0 auto; width: 100%;
      position: relative;
    }

    /* HEADER */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; border-radius: 20px;
      margin-bottom: 12px;
    }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
    .stats-mini { font-size: 11px; text-align: right; color: var(--txt-sec); line-height: 1.4; }
    .stats-mini span { color: var(--txt-main); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* CONTROLS */
    .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .diff-select {
      background: var(--cell-bg); color: var(--txt-main);
      border: 1px solid var(--glass-border);
      padding: 6px 12px; border-radius: 12px;
      font-size: 14px; outline: none; appearance: none;
    }
    .timer {
      font-variant-numeric: tabular-nums; font-weight: 700; font-size: 18px;
      letter-spacing: 0.5px; text-shadow: 0 0 10px var(--glass-shadow);
    }
    .tools { display: flex; gap: 8px; }
    .tool-btn { width: 36px; height: 36px; border-radius: 10px; color: var(--txt-main); }

    /* GRID WRAPPER (Auto Scale) */
    .board-container {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; min-height: 0; margin-bottom: 10px;
    }
    
    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      /* Use aspect ratio to keep it square, but cap at height */
      aspect-ratio: 1/1;
      height: 100%; max-height: 100%;
      width: auto; max-width: 100%;
      
      background: var(--grid-border);
      gap: 1px; /* The borders */
      border: 2px solid var(--grid-border);
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    /* CELLS */
    .cell {
      background: var(--cell-bg);
      position: relative;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(14px, 5.5vw, 24px);
      cursor: pointer;
    }
    /* Thicker lines via pseudo logic requires precise nth-child or extra markup. 
       Using border trick on specific cells for 3x3 blocks */
    .cell:nth-child(3n) { border-right: 1px solid var(--grid-line); } /* Helper class handled in JS or simplified here */
    
    /* Optimized Grid Borders for 3x3 Look */
    .cell { margin: 0; transition: background 0.1s; }
    .cell.given { font-weight: 800; color: var(--given-col); }
    .cell.user { font-weight: 500; color: var(--user-col); }
    .cell.error { color: var(--err-col) !important; animation: shake 0.4s; }
    .cell.active { background: var(--cell-active); box-shadow: inset 0 0 0 2px var(--accent); z-index: 2; }
    .cell.highlight { background: rgba(255,255,255,0.06); }
    .cell.same-num { background: var(--accent-glow); color: #fff; text-shadow: 0 0 4px rgba(0,0,0,0.5); }
    
    /* 3x3 Separators overlay */
    .grid-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; border-radius: 12px; z-index: 5;
    }
    .grid-line-v { position: absolute; top:0; bottom:0; width: 2px; background: var(--txt-sec); opacity: 0.3; }
    .grid-line-h { position: absolute; left:0; right:0; height: 2px; background: var(--txt-sec); opacity: 0.3; }

    /* KEYPAD */
    .keypad {
      display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px;
      margin-bottom: 12px;
    }
    .num-key {
      aspect-ratio: 0.85; /* Slightly taller on mobile? No, square is better */
      aspect-ratio: 1;
      border-radius: 10px;
      font-size: 20px; color: var(--txt-main);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
    }
    .num-key:active { background: rgba(255,255,255,0.2); }
    .num-key.mode-active { background: var(--accent); border-color: transparent; box-shadow: 0 0 10px var(--accent-glow); }
    .num-key.completed { opacity: 0.2; pointer-events: none; }

    /* ACTIONS */
    .bottom-actions { display: flex; gap: 12px; height: 50px; }
    .action-big {
      flex: 1; border-radius: 14px;
      font-size: 15px; letter-spacing: 0.5px;
      color: var(--txt-main);
    }
    .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }

    /* --- IPHONE 8 / SE OPTIMIZATIONS --- */
    /* Когда высота экрана маленькая, сжимаем все что не игровое поле */
    @media (max-height: 700px) {
      .header { padding: 8px; margin-bottom: 6px; }
      .avatar { width: 32px; height: 32px; }
      .controls { margin-bottom: 6px; }
      .timer { font-size: 16px; }
      .keypad { gap: 4px; margin-bottom: 8px; }
      .num-key { font-size: 18px; border-radius: 8px; }
      .bottom-actions { height: 42px; }
      #app { padding-top: 5px; padding-bottom: 10px; }
    }
    
    /* Super small fix for Keypad width */
    @media (max-width: 360px) {
      .keypad { grid-template-columns: repeat(5, 1fr); }
      .num-key { aspect-ratio: 1.5; } 
    }

    /* --- MODALS --- */
    .modal-wrap {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-wrap.active { opacity: 1; pointer-events: auto; }
    .modal {
      width: 90%; max-width: 380px; max-height: 85vh;
      background: #1c1c1e; /* Solid dark for contrast or heavy glass */
      background: var(--bg-grad);
      border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 24px;
      display: flex; flex-direction: column;
      transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .modal-wrap.active .modal { transform: scale(1); }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .modal-title { font-size: 22px; font-weight: 700; }
    .close-icon { padding: 5px; cursor: pointer; opacity: 0.7; }

    /* RATING LIST FIX */
    .leaderboard-list {
      flex: 1; overflow-y: auto;
      margin: 10px -10px; padding: 0 10px;
    }
    .lb-row {
      display: grid;
      grid-template-columns: 30px 40px 1fr 60px; /* Rank | Avatar | Name | Score */
      align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 14px;
    }
    .lb-rank { font-weight: 700; color: var(--accent); text-align: center; }
    .lb-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #333; }
    .lb-name { 
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
      font-weight: 500; min-width: 0; /* Critical for flex/grid truncation */
    }
    .lb-score { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }
    
    /* ANIMATIONS */
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
    @keyframes pop { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
    .pop-in { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    
    /* SKELETON LOADER */
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    @keyframes shimmer { 0%{background-position: 200% 0} 100%{background-position: -200% 0} }

  </style>
</head>

    <div class="board-container">

  <div id="modal-settings" class="modal-wrap" onclick="closeModal(event, 'settings')">

        <button class="btn glass" onclick="setTheme('light')" style="height:40px; background:#f0f0f0; color:#000">Light</button>
        <button class="btn glass" onclick="setTheme('neon')" style="height:40px; background:#24243e; color:#d946ef">Neon</button>
      </div>
      <div style="display:flex; justify-content:space-between; padding:10px 0; border-top:1px solid rgba(255,255,255,0.1)">

  <div id="modal-win" class="modal-wrap">
    <div class="modal" style="text-align:center; align-items:center;">
      <h2 style="font-size:32px; color:var(--accent); margin:0 0 10px;">Excellent!</h2>
      <div id="win-details" style="margin-bottom:20px; font-size:16px; line-height:1.6; color:var(--txt-sec);"></div>
      <button class="btn btn-primary action-big" style="width:100%" onclick="closeModal(null, 'win'); newGame();">Play Again</button>
    </div>
  </div>

  <script>
    // --- CONFIG & STATE ---
    const firebaseConfig = { apiKey: "AIzaSyBkYQ7tRMrZ-mghBnkJ_EvuzHpjs_p8hOY", authDomain: "sudo-9fbfc.firebaseapp.com", projectId: "sudo-9fbfc", storageBucket: "sudo-9fbfc.appspot.com", messagingSenderId: "927814106972", appId: "1:927814106972:web:71e0773453f9d16f598b99" };
    try { firebase.initializeApp(firebaseConfig); } catch(e){}
    const db = firebase.firestore();
    
    // Telegram Integration
    const tg = window.Telegram?.WebApp;
    if(tg) { 
      tg.ready(); 
      tg.expand(); 
      document.body.style.backgroundColor = tg.themeParams.bg_color; // Fallback
    }
    const haptic = (style) => {
      if(tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred(style || 'light');
    };

    let state = {
      grid: [], solution: [], given: new Set(),
      selected: null, // {r, c}
      history: [],
      hints: 3,
      timer: 0, timerId: null,
      mode: null, // 'pencil' logic handled directly by overwrite
      isPaused: false,
      user: { id: 'guest', name: 'Guest', avatar: 'https://i.imgur.com/7wQjV5Y.png', score: 0, records: {} }
    };

    // --- DOM CACHE ---
    const $ = (id) => document.getElementById(id);
    const els = {
      grid: $('grid'), keypad: $('keypad'), timer: $('timer'),
      diff: $('difficulty'), hintBtn: $('btn-hint'),
      uName: $('u-name'), uAvatar: $('u-avatar'), uScore: $('u-score')
    };

    // --- CORE GAME ENGINE ---
    function init() {
      // 1. Setup Grid
      els.grid.innerHTML = '';
      for(let i=0; i<81; i++) {
        const d = document.createElement('div');
        d.className = 'cell';
        d.onclick = (e) => { e.stopPropagation(); selectCell(Math.floor(i/9), i%9); };
        els.grid.appendChild(d);
      }
      // 2. Setup Keypad
      els.keypad.innerHTML = '';
      for(let i=1; i<=9; i++) {
        const b = document.createElement('button');
        b.className = 'btn num-key';
        b.textContent = i;
        b.onclick = () => fillNumber(i);
        els.keypad.appendChild(b);
      }
      const erase = document.createElement('button');
      erase.className = 'btn num-key';
      erase.innerHTML = '⌫'; // Backspace icon
      erase.onclick = () => fillNumber(0);
      els.keypad.appendChild(erase);

      // 3. Auth & Start
      authUser().then(() => {
        newGame();
      });
      
      // 4. Restore Theme
      document.body.dataset.theme = localStorage.getItem('theme') || 'dark';
    }

    function newGame() {
      haptic('medium');
      clearInterval(state.timerId);
      state.timer = 0;
      state.hints = 3;
      state.history = [];
      state.selected = null;
      els.hintBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> 3/3`;
      els.hintBtn.disabled = false;
      
      // Generate Logic (Simplified for brevity but functional)
      const diff = els.diff.value;
      const [grid, sol] = generateSudoku(diff);
      state.grid = grid;
      state.solution = sol;
      
      state.given = new Set();
      const cells = document.querySelectorAll('.cell');
      cells.forEach((c, i) => {
        const r = Math.floor(i/9), col = i%9;
        const val = grid[r][col];
        c.className = 'cell pop-in';
        c.textContent = val || '';
        if(val) {
          c.classList.add('given');
          state.given.add(`${r},${col}`);
        }
      });
      
      state.timerId = setInterval(() => {
        state.timer++;
        const m = String(Math.floor(state.timer/60)).padStart(2,'0');
        const s = String(state.timer%60).padStart(2,'0');
        els.timer.innerText = `${m}:${s}`;
      }, 1000);
      
      updateKeypadStatus();
    }

    function selectCell(r, c) {
      state.selected = {r, c};
      haptic('light');
      
      // Highlight Logic
      const idx = r*9+c;
      const cells = document.querySelectorAll('.cell');
      const val = state.grid[r][c];
      
      cells.forEach(ce => ce.className = ce.className.replace(/ active| highlight| same-num/g, ''));
      
      // Highlight row/col/box area
      cells.forEach((ce, i) => {
        const cr = Math.floor(i/9), cc = i%9;
        if(cr===r || cc===c || (Math.floor(cr/3)===Math.floor(r/3) && Math.floor(cc/3)===Math.floor(c/3))) {
          ce.classList.add('highlight');
        }
        if(val && state.grid[cr][cc] === val) ce.classList.add('same-num');
      });
      
      cells[idx].classList.add('active');
    }

    function fillNumber(num) {
      if(!state.selected) return;
      const {r, c} = state.selected;
      if(state.given.has(`${r},${c}`)) { haptic('error'); return; }
      
      const old = state.grid[r][c];
      if(old === num) return;
      
      haptic('light');
      state.history.push({r, c, old});
      state.grid[r][c] = num;
      
      const cell = document.querySelectorAll('.cell')[r*9+c];
      cell.textContent = num || '';
      cell.classList.remove('error', 'user');
      if(num) cell.classList.add('user');
      
      // Check immediate error (Standard gameplay style)
      if(num && num !== state.solution[r][c]) {
        cell.classList.add('error');
        haptic('error');
      } else {
         // Update same-number highlighting
         selectCell(r, c);
         checkWin();
      }
      updateKeypadStatus();
    }

    function undo() {
      if(!state.history.length) return;
      haptic('medium');
      const last = state.history.pop();
      state.grid[last.r][last.c] = last.old;
      const cell = document.querySelectorAll('.cell')[last.r*9+last.c];
      cell.textContent = last.old || '';
      cell.classList.remove('error', 'user');
      if(last.old) cell.classList.add('user');
      selectCell(last.r, last.c);
    }

    function takeHint() {
      if(state.hints <= 0) return;
      // Find empty cell
      let empty = [];
      for(let r=0;r<9;r++) for(let c=0;c<9;c++) if(state.grid[r][c]===0) empty.push({r,c});
      
      if(!empty.length) return; // Full but maybe errors?
      
      state.hints--;
      els.hintBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> ${state.hints}/3`;
      if(state.hints===0) els.hintBtn.disabled = true;
      
      const t = empty[Math.floor(Math.random()*empty.length)];
      // Push to history so undo works on hints too
      state.history.push({r:t.r, c:t.c, old:0}); 
      state.grid[t.r][t.c] = state.solution[t.r][t.c];
      
      const cell = document.querySelectorAll('.cell')[t.r*9+t.c];
      cell.textContent = state.grid[t.r][t.c];
      cell.classList.add('given'); // Treat hint as given
      state.given.add(`${t.r},${t.c}`);
      
      selectCell(t.r, t.c);
      haptic('success');
    }

    function checkWin() {
      // Simple check: is grid full and error free?
      let full = true;
      for(let r=0;r<9;r++) for(let c=0;c<9;c++) {
        if(state.grid[r][c] === 0 || state.grid[r][c] !== state.solution[r][c]) {
          full = false; break;
        }
      }
      
      if(full) {
        clearInterval(state.timerId);
        haptic('success');
        
        // Calculate Score
        const base = {easy: 500, medium: 1000, hard: 2000}[els.diff.value];
        const penalty = state.timer * 2; // -2 pts per second
        const finalScore = Math.max(100, base - penalty + (state.hints * 100));
        
        state.user.score += finalScore;
        saveProgress(finalScore);
        
        $('win-details').innerHTML = `Difficulty: <b>${els.diff.value.toUpperCase()}</b><br>Time: ${els.timer.innerText}<br>Score: +${finalScore}`;
        $('modal-win').classList.add('active');
        $('modal-win').style.pointerEvents = 'auto';
        $('modal-win').style.opacity = 1;
      }
    }

    function updateKeypadStatus() {
       const counts = Array(10).fill(0);
       state.grid.forEach(row => row.forEach(n => counts[n]++));
       document.querySelectorAll('.num-key').forEach((btn, i) => {
         const num = i+1; // i=0 is '1'
         if(num < 10 && counts[num] >= 9) btn.classList.add('completed');
         else btn.classList.remove('completed');
       });
    }

    // --- DATA ---
    async function authUser() {
      // Guest or TG User
      if(tg && tg.initDataUnsafe?.user) {
         const u = tg.initDataUnsafe.user;
         state.user.id = String(u.id);
         state.user.name = u.username || u.first_name;
         if(u.photo_url) state.user.avatar = u.photo_url;
      }
      
      els.uName.innerText = state.user.name;
      els.uAvatar.src = state.user.avatar;
      
      try {
        const doc = await db.collection('users').doc(state.user.id).get();
        if(doc.exists) {
          const d = doc.data();
          state.user.score = d.score || 0;
          state.user.records = d.records || {};
          updateStatsUI();
        }
      } catch(e) { console.log('Offline mode'); }
    }

    async function saveProgress(roundScore) {
      els.uScore.innerText = state.user.score;
      const d = els.diff.value;
      if(!state.user.records[d] || state.timer < state.user.records[d]) {
        state.user.records[d] = state.timer;
      }
      updateStatsUI();
      
      try {
        await db.collection('users').doc(state.user.id).set({
          name: state.user.name,
          avatar: state.user.avatar,
          score: state.user.score,
          records: state.user.records
        }, { merge: true });
        
        await db.collection('history').add({
          uid: state.user.id,
          name: state.user.name,
          avatar: state.user.avatar,
          score: roundScore,
          time: state.timer,
          diff: d,
          date: new Date()
        });
      } catch(e){}
    }
    
    function updateStatsUI() {
      els.uScore.innerText = state.user.score;
      const fmt = (t) => t ? `${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}` : '--:--';
      $('rec-easy').innerText = fmt(state.user.records.easy);
      $('rec-hard').innerText = fmt(state.user.records.hard);
    }

    // --- LEADERBOARD & MODALS ---
    window.openModal = (name) => {
      const m = $(`modal-${name}`);
      m.classList.add('active');
      haptic('light');
    };
    window.closeModal = (e, name) => {
      if(e && e.target !== e.currentTarget) return;
      $(`modal-${name}`).classList.remove('active');
    };
    window.setTheme = (t) => {
      document.body.dataset.theme = t;
      localStorage.setItem('theme', t);
      haptic('light');
    };

    window.openRating = async () => {
      openModal('rating');
      const list = $('lb-content');
      // Skeleton loader
      list.innerHTML = Array(5).fill('<div class="lb-row"><div class="skeleton" style="height:20px; width:20px"></div><div class="skeleton" style="height:30px; width:30px; border-radius:50%"></div><div class="skeleton" style="height:20px; flex:1"></div></div>').join('');
      
      try {
        const snap = await db.collection('users').orderBy('score', 'desc').limit(20).get();
        list.innerHTML = '';
        snap.forEach((doc, idx) => {
           const d = doc.data();
           list.innerHTML += `
             <div class="lb-row">
               <div class="lb-rank">${idx+1}</div>
               <img src="${d.avatar}" class="lb-avatar">
               <div class="lb-name">${d.name}</div>
               <div class="lb-score">${d.score}</div>
             </div>
           `;
        });
      } catch(e) { list.innerHTML = '<div style="text-align:center; padding:20px; color:var(--txt-sec)">Failed to load</div>'; }
    };

    // --- SUDOKU GEN (Minified) ---
    function generateSudoku(diff) {
      // 1. Base
      const b = Array(9).fill().map(()=>Array(9).fill(0));
      const fill = (r,c) => {
        if(c===9) { c=0; r++; if(r===9) return true; }
        if(b[r][c]!==0) return fill(r,c+1);
        const nums = [1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
        for(let n of nums) {
          if(chk(b,r,c,n)) { b[r][c]=n; if(fill(r,c+1)) return true; b[r][c]=0; }
        }
        return false;
      };
      const chk = (g,r,c,n) => {
        for(let i=0;i<9;i++) if(g[r][i]===n||g[i][c]===n||g[3*Math.floor(r/3)+Math.floor(i/3)][3*Math.floor(c/3)+i%3]===n) return false;
        return true;
      };
      fill(0,0);
      const sol = b.map(r=>[...r]);
      
      // 2. Remove
      const attempts = {easy:30, medium:45, hard:58}[diff];
      let k = attempts;
      while(k>0) {
        let r=Math.floor(Math.random()*9), c=Math.floor(Math.random()*9);
        if(b[r][c]!==0) { b[r][c]=0; k--; }
      }
      return [b, sol];
    }

    init();
  </script>
