<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sudoku Premium Glass</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    /* =========================================
       CORE STYLES & VARIABLES
       =========================================
    */
    :root {
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --safe-area-top: env(safe-area-inset-top, 20px);
      --safe-area-bottom: env(safe-area-inset-bottom, 20px);
      --app-height: 100vh;
    }

    body {
      font-family: var(--font-stack);
      margin: 0;
      padding: 0;
      overflow: hidden; /* Prevent body scroll, handle inside app-container */
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.8s ease;
      background-attachment: fixed;
    }

    /* =========================================
       THEME CONFIGURATION (Sky & Glass)
       =========================================
    */
    
    /* THEME 1: Night Sky (Default) - Глубокое ночное небо */
    body[data-theme="darkGlass"] {
      /* Красивый градиент неба */
      --bg-gradient: linear-gradient(to top, #30cfd0 0%, #330867 100%);
      
      /* Настройки стекла */
      --glass-bg: rgba(20, 20, 35, 0.45);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      --glass-blur: blur(20px) saturate(180%);

      /* Текст и цвета */
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --primary-accent: #00d2ff; /* Cyan Neon */
      --primary-hover: #3a7bd5;
      
      /* Сетка */
      --cell-bg: rgba(255, 255, 255, 0.03);
      --grid-line: rgba(255, 255, 255, 0.2);
      
      /* Состояния */
      --highlight-bg: rgba(0, 210, 255, 0.2);
      --highlight-text: #ffffff;
      --active-cell-bg: rgba(0, 210, 255, 0.35);
      --error-text: #ff6b6b;
      --given-text: #ffffff;
      --user-text: #7ee8fa;
      --area-highlight: rgba(255, 255, 255, 0.08);
      --modal-bg: rgba(16, 16, 24, 0.85);
    }

    /* THEME 2: Sunset Sky (Light) - Закатное небо */
    body[data-theme="lightGlass"] {
      --bg-gradient: linear-gradient(120deg, #a18cd1 0%, #fbc2eb 100%);
      
      --glass-bg: rgba(255, 255, 255, 0.35);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      --glass-blur: blur(25px) saturate(200%);

      --text-main: #2d3436;
      --text-muted: #636e72;
      --primary-accent: #6c5ce7;
      --primary-hover: #5649c0;

      --cell-bg: rgba(255, 255, 255, 0.2);
      --grid-line: rgba(108, 92, 231, 0.2);

      --highlight-bg: rgba(108, 92, 231, 0.2);
      --highlight-text: #2d3436;
      --active-cell-bg: rgba(108, 92, 231, 0.35);
      --error-text: #d63031;
      --given-text: #2d3436;
      --user-text: #6c5ce7;
      --area-highlight: rgba(255, 255, 255, 0.4);
      --modal-bg: rgba(255, 255, 255, 0.75);
    }

    /* THEME 3: Aurora (Midnight) - Северное сияние */
    body[data-theme="midnight"] {
      --bg-gradient: linear-gradient(to right, #434343 0%, black 100%);
      /* Добавим псевдо-элемент для сияния в JS/HTML если нужно, но градиент тоже ок */
      --bg-gradient: radial-gradient(circle at 50% 0%, #4facfe 0%, #00f2fe 100%); /* Переопределил на яркое */
      --bg-gradient: linear-gradient(to top, #09203f 0%, #537895 100%); /* Deep Ocean */

      --glass-bg: rgba(0, 0, 0, 0.5);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 10px 40px rgba(0,0,0,0.5);
      --glass-blur: blur(30px);

      --text-main: #ecf0f1;
      --text-muted: #bdc3c7;
      --primary-accent: #ff9ff3;
      --primary-hover: #f368e0;

      --cell-bg: rgba(0, 0, 0, 0.3);
      --grid-line: rgba(255, 255, 255, 0.1);

      --highlight-bg: rgba(255, 159, 243, 0.25);
      --highlight-text: #fff;
      --active-cell-bg: rgba(255, 159, 243, 0.4);
      --error-text: #ff4757;
      --given-text: #ecf0f1;
      --user-text: #ff9ff3;
      --area-highlight: rgba(255, 255, 255, 0.05);
      --modal-bg: rgba(19, 15, 64, 0.9);
    }

    body {
      background: var(--bg-gradient);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* =========================================
       GLASSMORPHISM CLASSES
       =========================================
    */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      /* Glossy shine overlay */
      position: relative;
      overflow: hidden;
    }
    
    /* Add a subtle top shine */
    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
    }

    .glass-button {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    
    .glass-button:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.25);
    }

    .accent-button {
      background: var(--primary-accent);
      color: #fff; /* Always white text on accent */
      border: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }
    
    .accent-button::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: 0.5s;
    }
    .accent-button:hover::after { left: 100%; }
    .accent-button:active { transform: scale(0.95); opacity: 0.9; }

    /* =========================================
       LAYOUT STRUCTURE
       =========================================
    */
    #app-container {
      width: 100%;
      max-width: 480px; /* Optimal mobile width */
      height: 100vh; 
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: max(10px, var(--safe-area-top)) 16px max(10px, var(--safe-area-bottom)) 16px;
      box-sizing: border-box;
      position: relative;
      overflow-y: auto;
      scrollbar-width: none; /* Hide scrollbar Firefox */
    }
    #app-container::-webkit-scrollbar { display: none; }

    /* Header */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding: 12px 16px;
      border-radius: 20px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .avatar-img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid var(--primary-accent);
      object-fit: cover;
      box-shadow: 0 0 10px var(--primary-accent);
    }

    /* Controls */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      gap: 10px;
    }

    .select-styled {
      appearance: none;
      background: var(--glass-bg);
      color: var(--text-main);
      border: 1px solid var(--glass-border);
      padding: 10px 30px 10px 15px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      outline: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 10px top 50%;
      background-size: 10px auto;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      cursor: pointer;
    }

    .timer-badge {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 18px;
      color: var(--primary-accent);
      text-shadow: 0 0 10px rgba(0,0,0,0.2);
      padding: 8px 16px;
      background: var(--cell-bg);
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      letter-spacing: 1px;
    }

    /* =========================================
       GRID STYLES
       =========================================
    */
    .grid-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      margin-bottom: 20px;
      flex-shrink: 0; 
    }

    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 1px; /* Gap for grid lines */
      background-color: var(--glass-border); /* Color of gaps */
      border: 2px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      aspect-ratio: 1 / 1; 
      max-height: 55vh;
      max-width: 55vh;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      backdrop-filter: blur(5px);
      position: relative;
    }

    .cell {
      background-color: var(--cell-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(16px, 5.5vw, 26px);
      position: relative;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s;
      touch-action: manipulation; 
    }

    /* Grid Thick Lines via CSS classes */
    .cell:nth-child(3n) { border-right: 1px solid var(--glass-border); }
    .cell:nth-child(9n) { border-right: none; }
    .cell:nth-child(n+19):nth-child(-n+27),
    .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 1px solid var(--glass-border); }
    
    /* Extra separation logic */
    .sep-v-1 { position: absolute; left: calc(33.33% - 1px); top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.3); pointer-events: none; z-index: 10; }
    .sep-v-2 { position: absolute; left: calc(66.66% - 1px); top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.3); pointer-events: none; z-index: 10; }
    .sep-h-1 { position: absolute; top: calc(33.33% - 1px); left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.3); pointer-events: none; z-index: 10; }
    .sep-h-2 { position: absolute; top: calc(66.66% - 1px); left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.3); pointer-events: none; z-index: 10; }

    /* Cell Content & States */
    .cell-content { font-weight: 500; z-index: 2; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
    .cell.given { color: var(--given-text); font-weight: 800; }
    .cell.user-input { color: var(--user-text); font-weight: 600; text-shadow: 0 0 8px var(--primary-accent); }
    .cell.error { color: var(--error-text) !important; animation: shake 0.4s; }
    
    .cell.highlight { background-color: var(--highlight-bg); }
    .cell.area-highlight { background-color: var(--area-highlight); }
    .cell.active-cell { 
      background-color: var(--active-cell-bg); 
      box-shadow: inset 0 0 0 2px var(--primary-accent); 
      transform: scale(1.05); /* Slight pop */
      z-index: 5;
      border-radius: 4px;
    }
    .cell.hinted { background-color: rgba(255, 215, 0, 0.3); animation: flash 0.8s; }

    /* =========================================
       KEYPAD & ACTIONS
       =========================================
    */
    .keypad-container {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 8px;
      width: 100%;
      margin-bottom: 15px;
    }

    @media (max-width: 380px) {
      .keypad-container { grid-template-columns: repeat(5, 1fr); gap: 10px; }
    }

    .num-btn {
      aspect-ratio: 1/1;
      border-radius: 12px;
      font-size: 22px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      position: relative;
    }

    .num-btn.selected {
      background: var(--primary-accent);
      color: white;
      border-color: transparent;
      box-shadow: 0 0 15px var(--primary-accent);
    }
    
    .num-btn.disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }

    .actions-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto; 
      padding-top: 10px;
    }
    
    .action-btn {
      flex: 1;
      height: 54px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* =========================================
       MODALS & UTILS
       =========================================
    */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    
    .modal-card {
      background: var(--modal-bg);
      width: 85%;
      max-width: 380px;
      border-radius: 28px;
      padding: 28px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      transform: scale(0.9) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      max-height: 80vh;
      overflow-y: auto;
      color: var(--text-main);
    }
    .modal-overlay.active .modal-card { transform: scale(1) translateY(0); }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-size: 24px; font-weight: 700; background: -webkit-linear-gradient(0deg, var(--text-main), var(--primary-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .close-btn { font-size: 28px; cursor: pointer; color: var(--text-muted); line-height: 1; }

    /* Animations */
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
    @keyframes flash { 0% { background: white; } 100% { background: transparent; } }

    /* Loader */
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.6s;
    }
    .loader {
      width: 60px; height: 60px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: rotation 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite;
    }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Theme Selectors */
    .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .theme-option { 
      height: 50px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; 
      display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .theme-option.active-theme { border-color: var(--primary-accent); transform: scale(1.05); }
    
    .hidden { display: none !important; }

    /* --- LEADERBOARD FIXES --- */
    .leaderboard-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-bottom: 1px solid var(--grid-line);
      transition: background 0.2s;
    }
    .leaderboard-row:last-child { border-bottom: none; }
    .rank-num {
      font-weight: 800;
      font-size: 16px;
      min-width: 25px; /* Фиксированная ширина для выравнивания */
      text-align: center;
      color: var(--primary-accent);
    }
  </style>
</head>
<body data-theme="darkGlass">

  <div id="loading-screen">
    <div class="loader"></div>
    <div style="margin-top: 25px; font-weight: 700; color: white; font-size: 18px; letter-spacing: 1px;">SUDOKU PREMIUM</div>
  </div>

  <div id="app-container">
    
    <div class="header-bar glass-panel">
      <div class="user-pill">
        <img id="user-avatar" src="" class="avatar-img" alt="Avatar">
        <div>
          <div id="username" style="font-weight: 700; font-size: 15px;">Guest</div>
          <div style="font-size: 11px; color: var(--text-muted); margin-top: 2px;">Очки: <span id="user-score" style="color: var(--primary-accent); font-weight:700;">0</span></div>
        </div>
      </div>
      <div style="text-align: right; font-size: 11px; color: var(--text-muted); font-weight: 500;">
        <div style="margin-bottom: 2px;">Easy: <span id="easy-record" style="color:var(--text-main)">--:--</span></div>
        <div style="margin-bottom: 2px;">Med: <span id="medium-record" style="color:var(--text-main)">--:--</span></div>
        <div>Hard: <span id="hard-record" style="color:var(--text-main)">--:--</span></div>
      </div>
    </div>

    <div class="controls-bar">
      <select id="difficulty" class="select-styled">
        <option value="easy">Лёгкий</option>
        <option value="medium">Средний</option>
        <option value="hard">Сложный</option>
      </select>

      <div class="timer-badge" id="timer">00:00</div>
      
      <div style="display:flex; gap: 8px;">
        <button id="settings-button" class="icon-btn glass-button" aria-label="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <button id="rating-button" class="icon-btn glass-button" aria-label="Leaderboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
        </button>
      </div>
    </div>

    <div class="grid-wrapper">
      <div id="grid" class="sudoku-grid">
        <div class="sep-v-1"></div><div class="sep-v-2"></div>
        <div class="sep-h-1"></div><div class="sep-h-2"></div>
      </div>
    </div>

    <div id="number-row" class="keypad-container">
      </div>

    <div class="actions-bar">

    <div class="modal-card" style="text-align: center; overflow: hidden;">
      <h2 style="font-size: 32px; margin: 0 0 15px 0; background: -webkit-linear-gradient(45deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Победа!</h2>

      <button id="win-modal-close-btn" class="accent-button" style="width: 100%; padding: 14px; border-radius: 14px; font-weight: 700;">Супер!</button>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

  <script>
    /* =========================================
       LOGIC SECTION
       =========================================
    */
    const firebaseConfig = { apiKey: "AIzaSyBkYQ7tRMrZ-mghBnkJ_EvuzHpjs_p8hOY", authDomain: "sudo-9fbfc.firebaseapp.com", projectId: "sudo-9fbfc", storageBucket: "sudo-9fbfc.appspot.com", messagingSenderId: "927814106972", appId: "1:927814106972:web:71e0773453f9d16f598b99" };
    
    // Init Firebase
    try { firebase.initializeApp(firebaseConfig); } catch(e){ console.error(e); }
    const db = firebase.firestore();
    const auth = firebase.auth();
    const usersCollection = db.collection('users');
    const recordsCollection = db.collection('timeRecords');

    // State
    let grid = [], solution = [], givenCells = new Set(), timerInterval, startTime=0;
    let activeCell = null, activeTool = null, highlightEnabled = true, undoStack = [];
    let hintCount = 0, isGameFinished = false, isSoundEnabled = true;
    let currentUser = { id: null, username: 'Guest', avatar: 'https://t.me/i/userpic/320/default.jpg', score: 0, bestTimes: { easy: null, medium: null, hard: null } };
    let currentRatingType = 'score', currentRatingDifficulty = 'easy';

    // DOM Elements
    const el = (id) => document.getElementById(id);
    const elements = {
      grid: el('grid'), numberRow: el('number-row'), difficulty: el('difficulty'),
      newGameBtn: el('newGame'), checkBtn: el('check'), undoBtn: el('undo-button'),
      hintBtn: el('hint-button'), timer: el('timer'), message: el('message'),
      userAvatar: el('user-avatar'), username: el('username'), userScore: el('user-score'),
      loadingScreen: el('loading-screen'), winModal: el('win-modal'),
      settingsModal: el('settings-modal'), ratingModal: el('rating-modal'),
      recentModal: el('recent-games-modal'), tutorialModal: el('tutorial-modal')
    };

    // Sound
    const clickSound = new Audio('https://github.com/codex-cdx/sudo/raw/refs/heads/main/%D0%9F%D0%BB%D0%B0%D0%BC%D0%B1.mp3');
    function playSound() { if(isSoundEnabled) { clickSound.currentTime = 0; clickSound.play().catch(()=>{}); } }

    // Helpers
    function formatTime(s) { if(s==null) return '--:--'; return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
    function toggleModal(modalId, show) { 
      const m = el(modalId); 
      if(show) { m.classList.remove('hidden'); requestAnimationFrame(()=>m.classList.add('active')); }
      else { m.classList.remove('active'); setTimeout(()=>m.classList.add('hidden'), 300); }
    }

    // --- GRID LOGIC ---
    function createGrid() {
      // Re-insert separators
      elements.grid.innerHTML = '<div class="sep-v-1"></div><div class="sep-v-2"></div><div class="sep-h-1"></div><div class="sep-h-2"></div>';
      grid = Array(9).fill().map(()=>Array(9).fill(0));
      givenCells.clear();
      for(let i=0; i<81; i++) {
        const d = document.createElement('div');
        d.className = 'cell';
        d.dataset.idx = i;
        const span = document.createElement('span');
        span.className = 'cell-content';
        d.appendChild(span);
        d.addEventListener('click', (e) => { e.stopPropagation(); handleCellClick(Math.floor(i/9), i%9); });
        elements.grid.appendChild(d);
      }
    }

    function createKeypad() {
      elements.numberRow.innerHTML = '';
      for(let i=1; i<=9; i++) {
        const btn = document.createElement('button');
        btn.className = 'num-btn glass-button';
        btn.textContent = i;
        btn.dataset.val = i;
        btn.onclick = () => { playSound(); selectTool(i); };
        elements.numberRow.appendChild(btn);
      }
      const eraseBtn = document.createElement('button');
      eraseBtn.className = 'num-btn glass-button';
      // Erase Icon
      eraseBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13v-16z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>';
      eraseBtn.dataset.val = 'erase';
      eraseBtn.onclick = () => { playSound(); selectTool('erase'); };
      elements.numberRow.appendChild(eraseBtn);
    }

    // --- GAMEPLAY INTERACTIONS ---
    function handleCellClick(r, c) {
      playSound();
      if(isGameFinished) return;
      if(activeTool) {
        const cellVal = grid[r][c];
        if(givenCells.has(`${r},${c}`)) return; // Immutable
        if(activeTool === 'erase') performAction(0, r, c);
        else performAction(activeTool, r, c);
      } else {
        selectCell(r, c);
      }
    }

    function selectCell(r, c) {
      if(isGameFinished) return;
      clearHighlights();
      activeCell = [r, c];
      const cells = document.querySelectorAll('.cell');
      
      cells.forEach((cell, idx) => {
        const cr = Math.floor(idx/9), cc = idx%9;
        const sameRow = cr === r;
        const sameCol = cc === c;
        const sameBox = Math.floor(cr/3) === Math.floor(r/3) && Math.floor(cc/3) === Math.floor(c/3);
        if(sameRow || sameCol || sameBox) cell.classList.add('area-highlight');
      });

      const target = cells[r*9+c];
      target.classList.add('active-cell');

      const val = grid[r][c];
      if(val !== 0 && highlightEnabled) highlightSimilar(val);
    }

    function selectTool(val) {
      if(isGameFinished) return;
      if(activeTool === val) activeTool = null; // Toggle off
      else activeTool = val;
      
      document.querySelectorAll('.num-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.val == activeTool);
      });

      activeCell = null;
      clearHighlights();
      if(activeTool && activeTool !== 'erase' && highlightEnabled) highlightSimilar(activeTool);
    }

    function highlightSimilar(val) {
      document.querySelectorAll('.cell').forEach((c, idx) => {
        const r = Math.floor(idx/9), col = idx%9;
        if(grid[r][col] === val) c.classList.add('highlight');
      });
    }

    function clearHighlights() {
      document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-cell', 'area-highlight', 'highlight'));
    }

    function performAction(val, r, c) {
      const prev = grid[r][c];
      if(prev === val) return;
      
      undoStack.push({r, c, prev, val});
      grid[r][c] = val;
      
      const cell = document.querySelectorAll('.cell')[r*9+c];
      cell.querySelector('.cell-content').textContent = val === 0 ? '' : val;
      cell.classList.remove('error', 'hinted');
      cell.classList.toggle('user-input', val !== 0);
      
      updateUI();
      if(highlightEnabled) { clearHighlights(); if(val!==0) highlightSimilar(val); }
    }

    function updateUI() {
      elements.undoBtn.disabled = undoStack.length === 0;
      el('hint-count-display').textContent = `${3-hintCount}/3`;
      el('hint-button').disabled = hintCount >= 3;
      
      // Check limits for keypad
      const counts = Array(10).fill(0);
      grid.flat().forEach(v => counts[v]++);
      document.querySelectorAll('.num-btn').forEach(btn => {
         const val = parseInt(btn.dataset.val);
         if(val && counts[val] >= 9) {
             btn.classList.add('disabled');
             if(activeTool === val) selectTool(null);
         } else {
             btn.classList.remove('disabled');
         }
      });
    }

    function undo() {
      playSound();
      if(!undoStack.length) return;
      const last = undoStack.pop();
      grid[last.r][last.c] = last.prev;
      const cell = document.querySelectorAll('.cell')[last.r*9+last.c];
      cell.querySelector('.cell-content').textContent = last.prev || '';
      cell.classList.remove('error');
      cell.classList.toggle('user-input', last.prev !== 0);
      updateUI();
      selectCell(last.r, last.c);
    }

    // --- GENERATOR ---
    function generatePuzzle(diff) {
      function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} }
      function solve(b) {
        for(let i=0;i<81;i++){
          if(b[Math.floor(i/9)][i%9]===0){
             for(let n=1;n<=9;n++){
               if(isValid(b,Math.floor(i/9),i%9,n)){
                 b[Math.floor(i/9)][i%9]=n;
                 if(solve(b))return true;
                 b[Math.floor(i/9)][i%9]=0;
               }
             }
             return false;
          }
        }
        return true;
      }
      function isValid(b,r,c,n){
        for(let i=0;i<9;i++) if(b[r][i]===n||b[i][c]===n||b[3*Math.floor(r/3)+Math.floor(i/3)][3*Math.floor(c/3)+i%3]===n)return false;
        return true;
      }
      
      const base = Array(9).fill().map(()=>Array(9).fill(0));
      const firstRow = [1,2,3,4,5,6,7,8,9]; shuffle(firstRow);
      base[0] = firstRow;
      solve(base);
      solution = base.map(r=>[...r]);

      grid = base.map(r=>[...r]);
      const attempts = {easy:35, medium:45, hard:55}[diff] || 35; // Slightly reduced removed cells for better mobile experience
      let removed = 0;
      while(removed < attempts) {
        let r=Math.floor(Math.random()*9), c=Math.floor(Math.random()*9);
        if(grid[r][c]!==0) { grid[r][c]=0; removed++; }
      }
      
      const cells = document.querySelectorAll('.cell');
      givenCells.clear();
      for(let i=0; i<81; i++) {
        const val = grid[Math.floor(i/9)][i%9];
        const cell = cells[i];
        cell.className = 'cell'; // Reset classes
        cell.querySelector('.cell-content').textContent = val || '';
        if(val!==0) {
          givenCells.add(`${Math.floor(i/9)},${i%9}`);
          cell.classList.add('given');
        }
      }
      updateUI();
    }

    // --- GAME CONTROL ---
    function startGame() {
      isGameFinished = false;
      undoStack = [];
      hintCount = 0;
      clearInterval(timerInterval);
      startTime = Date.now();
      timerInterval = setInterval(() => {
        elements.timer.textContent = formatTime(Math.floor((Date.now()-startTime)/1000));
      }, 1000);
      
      elements.checkBtn.disabled = false;
      elements.checkBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Готово</span>';
      elements.message.textContent = '';
      
      createGrid();
      createKeypad();
      generatePuzzle(elements.difficulty.value);
      toggleModal('settings-modal', false);
    }

    function checkGame() {
      playSound();
      if(isGameFinished) return;
      
      let error = false;
      let full = true;
      
      const cells = document.querySelectorAll('.cell');
      cells.forEach((c, idx) => {
        const r = Math.floor(idx/9), col = idx%9;
        const val = grid[r][col];
        if(val === 0) full = false;
        else if(val !== solution[r][col]) {
           c.classList.add('error');
           error = true;
        }
      });

      if(error) elements.message.textContent = "Найдена ошибка!";
      else if(!full) elements.message.textContent = "Поле не заполнено.";
      else {
        isGameFinished = true;
        clearInterval(timerInterval);
        const time = Math.floor((Date.now()-startTime)/1000);
        const pts = calculatePoints(time, hintCount);
        saveWin(time, pts);
      }
    }

    function getHint() {
      playSound();
      if(hintCount >= 3 || isGameFinished) return;
      
      const candidates = [];
      for(let r=0;r<9;r++) for(let c=0;c<9;c++) {
        if(!givenCells.has(`${r},${c}`) && grid[r][c] !== solution[r][c]) candidates.push([r,c]);
      }
      if(!candidates.length) return;
      
      hintCount++;
      const [r,c] = candidates[Math.floor(Math.random()*candidates.length)];
      performAction(solution[r][c], r, c);
      const cell = document.querySelectorAll('.cell')[r*9+c];
      cell.classList.add('hinted');
      updateUI();
    }

    function calculatePoints(time, hints) {
      const base = {easy:100, medium:250, hard:500}[elements.difficulty.value];
      return Math.max(10, base - (time/2) - (hints*50));
    }

    // --- DATA & USERS ---
    async function initUser() {
      try {
        await auth.signInAnonymously();
        let uid = auth.currentUser.uid;
        let userData = { username: 'Guest', avatar: currentUser.avatar };
        
        if(window.Telegram?.WebApp?.initDataUnsafe?.user) {
          const tgUser = window.Telegram.WebApp.initDataUnsafe.user;
          uid = String(tgUser.id);
          userData.username = tgUser.username || tgUser.first_name;
          if(tgUser.photo_url) userData.avatar = tgUser.photo_url;
        }
        
        currentUser.id = uid;
        currentUser.username = userData.username;
        currentUser.avatar = userData.avatar;
        
        elements.username.textContent = currentUser.username;
        elements.userAvatar.src = currentUser.avatar;

        const doc = await usersCollection.doc(uid).get();
        if(doc.exists) {
          const data = doc.data();
          currentUser.score = data.score || 0;
          currentUser.bestTimes = data.bestTimes || {easy:null, medium:null, hard:null};
        } else {
          await usersCollection.doc(uid).set({ ...userData, score:0, bestTimes: {} });
        }
        
        elements.userScore.textContent = Math.floor(currentUser.score);
        updateRecordDisplay();
      } catch(e) { console.error("Auth error", e); }
      
      setTimeout(() => {
        elements.loadingScreen.style.opacity = '0';
        setTimeout(()=> elements.loadingScreen.style.display='none', 500);
      }, 1000);
    }

    async function saveWin(time, pts) {
      currentUser.score += pts;
      elements.userScore.textContent = Math.floor(currentUser.score);
      const diff = elements.difficulty.value;
      
      let newRecord = false;
      if(!currentUser.bestTimes[diff] || time < currentUser.bestTimes[diff]) {
        currentUser.bestTimes[diff] = time;
        newRecord = true;
      }
      
      updateRecordDisplay();
      
      if(currentUser.id) {
        usersCollection.doc(currentUser.id).set({
          score: currentUser.score,
          bestTimes: currentUser.bestTimes,
          username: currentUser.username,
          avatar: currentUser.avatar
        }, {merge:true});
        
        recordsCollection.add({
          userId: currentUser.id,
          username: currentUser.username,
          avatar: currentUser.avatar,
          difficulty: diff,
          time: time,
          date: new Date().toISOString()
        });
      }
      
      el('win-modal-message').innerHTML = `Сложность: <b>${diff.toUpperCase()}</b><br>Время: ${formatTime(time)}<br>Очки: +${Math.floor(pts)}${newRecord ? '<br><br>🏆 <b>НОВЫЙ РЕКОРД!</b>' : ''}`;
      toggleModal('win-modal', true);
    }

    function updateRecordDisplay() {
      el('easy-record').textContent = formatTime(currentUser.bestTimes.easy);
      el('medium-record').textContent = formatTime(currentUser.bestTimes.medium);
      el('hard-record').textContent = formatTime(currentUser.bestTimes.hard);
    }
    
    // --- LEADERBOARD LOGIC FIXED ---
    async function loadLeaderboard() {
      const list = el('rating-list');
      list.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.6;">Загрузка...</div>';
      
      let query;
      if(currentRatingType === 'score') {
        query = usersCollection.orderBy('score', 'desc').limit(20);
      } else {
        query = recordsCollection.where('difficulty', '==', currentRatingDifficulty).orderBy('time', 'asc').limit(20);
      }
      
      try {
        const snap = await query.get();
        list.innerHTML = '';
        snap.forEach((doc, idx) => {
          const d = doc.data();
          // Создаем элемент с фиксированной шириной номера
          const row = document.createElement('div');
          row.className = 'leaderboard-row';
          row.innerHTML = `
            <div class="rank-num">${idx+1}</div>
            <img src="${d.avatar}" style="width:36px; height:36px; border-radius:50%; border:1px solid var(--glass-border);">
            <div style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500;">${d.username}</div>
            <div style="font-weight:700; color:var(--text-main);">${currentRatingType === 'score' ? Math.floor(d.score) : formatTime(d.time)}</div>
          `;
          list.appendChild(row);
        });
        if(snap.empty) list.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.6;">Пока пусто</div>';
      } catch(e) { list.innerHTML = '<div style="text-align:center; padding:20px; color:var(--error-text);">Ошибка загрузки</div>'; console.error(e); }
    }

    // --- EVENTS ---
    document.addEventListener('DOMContentLoaded', () => {
      elements.newGameBtn.onclick = startGame;
      elements.checkBtn.onclick = checkGame;
      elements.hintBtn.onclick = getHint;
      elements.undoBtn.onclick = undo;
      el('settings-button').onclick = () => toggleModal('settings-modal', true);
      el('rating-button').onclick = () => { toggleModal('rating-modal', true); loadLeaderboard(); };
      el('recent-games-button').onclick = () => { toggleModal('recent-games-modal', true); };
      el('tutorial-button').onclick = () => { toggleModal('tutorial-modal', true); };
      el('win-modal-close-btn').onclick = () => toggleModal('win-modal', false);
      
      document.querySelectorAll('.close-btn').forEach(b => {
        b.onclick = () => toggleModal(b.dataset.target, false);
      });
      document.querySelectorAll('.modal-overlay').forEach(o => {
        o.onclick = (e) => { if(e.target === o) toggleModal(o.id, false); };
      });

      // Settings Logic
      el('sound-toggle').onclick = (e) => { 
        isSoundEnabled = !isSoundEnabled; 
        e.target.textContent = isSoundEnabled ? "ВКЛ" : "ВЫКЛ"; 
        e.target.style.opacity = isSoundEnabled ? 1 : 0.5;
      };
      el('highlightToggle').onclick = (e) => { 
        highlightEnabled = !highlightEnabled; 
        e.target.textContent = highlightEnabled ? "ВКЛ" : "ВЫКЛ"; 
        e.target.style.opacity = highlightEnabled ? 1 : 0.5;
        if(!highlightEnabled) clearHighlights();
      };
      
      // Theme
      document.querySelectorAll('.theme-option').forEach(opt => {
        opt.onclick = () => {
          document.body.dataset.theme = opt.dataset.theme;
          localStorage.setItem('sudo-theme', opt.dataset.theme);
          // Highlight active theme
          document.querySelectorAll('.theme-option').forEach(x => x.classList.remove('active-theme'));
          opt.classList.add('active-theme');
        };
      });
      
      // Rating Tabs
      document.querySelectorAll('.rating-tab').forEach(t => {
         t.onclick = () => {
           currentRatingType = t.dataset.type;
           document.querySelectorAll('.rating-tab').forEach(x => x.classList.remove('active'));
           t.classList.add('active');
           el('difficulty-tabs').classList.toggle('hidden', currentRatingType !== 'time');
           loadLeaderboard();
         }
      });
      document.querySelectorAll('.diff-tab').forEach(t => {
         t.onclick = () => {
           currentRatingDifficulty = t.dataset.d;
           document.querySelectorAll('.diff-tab').forEach(x => x.classList.remove('active'));
           t.classList.add('active');
           loadLeaderboard();
         }
      });

      // Init Theme
      const savedTheme = localStorage.getItem('sudo-theme') || 'darkGlass';
      document.body.dataset.theme = savedTheme;
      document.querySelector(`.theme-option[data-theme="${savedTheme}"]`)?.classList.add('active-theme');

      // Start
      initUser();
      startGame();
    });
  </script>
</body>
</html>
