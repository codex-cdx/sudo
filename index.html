<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Glass Sudoku</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

  <style>
    /* --- FONTS & BASICS --- */
    :root {
      /* Palette Definition */
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-surface: rgba(30, 30, 30, 0.65);
      --glass-highlight: rgba(255, 255, 255, 0.12);
      --primary-color: #0A84FF; /* iOS Blue */
      --primary-glow: rgba(10, 132, 255, 0.5);
      --text-main: #FFFFFF;
      --text-muted: #8E8E93;
      --error-color: #FF453A;
      --grid-line: rgba(255, 255, 255, 0.15);
      --cell-bg: rgba(0, 0, 0, 0.2);
      --active-cell: rgba(10, 132, 255, 0.25);
      --highlight-num: rgba(10, 132, 255, 0.6);
      
      --anim-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Light Mode Override */
    body[data-theme="light"] {
      --glass-border: rgba(0, 0, 0, 0.05);
      --glass-surface: rgba(255, 255, 255, 0.65);
      --glass-highlight: rgba(0, 0, 0, 0.05);
      --primary-color: #007AFF;
      --primary-glow: rgba(0, 122, 255, 0.3);
      --text-main: #000000;
      --text-muted: #8E8E93;
      --grid-line: rgba(0, 0, 0, 0.1);
      --cell-bg: rgba(255, 255, 255, 0.4);
      --active-cell: rgba(0, 122, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      height: 100dvh; /* Dynamic Height for Mobile Browsers */
      overflow: hidden;
      color: var(--text-main);
      transition: color 0.3s ease;
    }

    /* --- BACKGROUND BLOBS (AMBIENT) --- */
    .ambient-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: radial-gradient(circle at 10% 20%, #1a1a2e, #000000);
      overflow: hidden;
    }
    
    body[data-theme="light"] .ambient-bg {
       background: radial-gradient(circle at 10% 20%, #f0f2f5, #ffffff);
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
      animation: float 10s infinite ease-in-out;
    }
    .blob-1 { width: 300px; height: 300px; background: var(--primary-color); top: -100px; left: -50px; }
    .blob-2 { width: 250px; height: 250px; background: purple; bottom: -50px; right: -50px; animation-delay: -2s; }
    .blob-3 { width: 200px; height: 200px; background: cyan; top: 40%; left: 30%; opacity: 0.2; animation-delay: -5s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, 30px); }
    }

    /* --- GLASSMORPHISM COMPONENTS --- */
    .glass-panel {
      background: var(--glass-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .glass-btn {
      background: var(--glass-highlight);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      backdrop-filter: blur(5px);
      transition: all 0.2s var(--anim-spring);
    }
    .glass-btn:active { transform: scale(0.95); background: var(--active-cell); }
    .glass-btn.active { background: var(--primary-color); color: white; border-color: transparent; box-shadow: 0 0 15px var(--primary-glow); }
    .glass-btn:disabled { opacity: 0.3; pointer-events: none; }

    /* --- LAYOUT --- */
    #app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 500px; /* Tablet constraint */
      margin: 0 auto;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
    }

    header {
      flex: 0 0 auto;
      padding: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .game-area {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      width: 100%;
    }

    /* --- SUDOKU GRID --- */
    #grid-wrapper {
      width: 100%;
      aspect-ratio: 1 / 1;
      max-height: 60vh; /* Prevent grid from being too tall on weird ratios */
      position: relative;
      padding: 4px;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      gap: 1px;
      width: 100%;
      height: 100%;
      background-color: var(--grid-line);
      border: 2px solid var(--grid-line);
      border-radius: 12px;
      overflow: hidden;
    }

    .cell {
      background-color: var(--cell-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(16px, 5vw, 24px);
      font-weight: 400;
      cursor: pointer;
      position: relative;
      transition: background-color 0.15s;
    }

    /* Thick Borders logic via margin adjustments handled in JS or pseudo-elements. 
       Easier approach: CSS nth-child */
    .cell:nth-child(3n) { border-right: 1px solid rgba(255,255,255,0.3); }
    .cell:nth-child(9n) { border-right: none; }
    .cell:nth-child(n+19):nth-child(-n+27),
    .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 1px solid rgba(255,255,255,0.3); }

    /* Theme override for borders */
    body[data-theme="light"] .cell:nth-child(3n) { border-right: 1px solid rgba(0,0,0,0.2); }
    body[data-theme="light"] .cell:nth-child(n+19):nth-child(-n+27),
    body[data-theme="light"] .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 1px solid rgba(0,0,0,0.2); }


    .cell.given { font-weight: 700; color: var(--text-main); }
    .cell.user-input { color: var(--primary-color); font-weight: 500; }
    .cell.error { color: var(--error-color); background: rgba(255, 69, 58, 0.15); }
    .cell.selected { background-color: var(--active-cell); box-shadow: inset 0 0 0 2px var(--primary-color); z-index: 10; }
    .cell.highlight { background-color: var(--highlight-num); color: white !important; }
    .cell.area { background-color: rgba(255, 255, 255, 0.05); }
    body[data-theme="light"] .cell.area { background-color: rgba(0, 0, 0, 0.05); }
    
    .cell.hint-anim { animation: pulse 0.5s ease-in-out; background-color: #32D74B !important; color: #000 !important; }

    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

    /* --- CONTROLS --- */
    .controls-area {
      flex: 0 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 10px;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(10, 1fr); /* 1-9 + Erase */
      gap: 6px;
    }

    .num-btn {
      aspect-ratio: 0.8;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 500;
      position: relative;
    }
    
    .num-btn span.count {
        font-size: 0.6rem;
        opacity: 0.6;
        position: absolute;
        bottom: 2px;
    }

    .action-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .action-btn {
      flex: 1;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 600;
    }
    
    .icon-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* --- LOADING SCREEN --- */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.5s;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: var(--primary-color);
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- MODALS (Bottom Sheet Style) --- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      z-index: 100;
      display: flex;
      align-items: flex-end; /* Bottom sheet default */
      justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }

    .modal-card {
      width: 100%; max-width: 500px;
      background: var(--glass-surface);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-top: 1px solid var(--glass-border);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      transform: translateY(100%);
      transition: transform 0.4s var(--anim-spring);
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-overlay.open .modal-card { transform: translateY(0); }
    
    /* Centered modal variant */
    .modal-overlay.centered { align-items: center; }
    .modal-overlay.centered .modal-card { border-radius: 24px; width: 90%; transform: scale(0.9); opacity: 0; }
    .modal-overlay.centered.open .modal-card { transform: scale(1); opacity: 1; }

    /* Utility */
    .hidden { display: none !important; }
    .text-accent { color: var(--primary-color); }
    
    /* Avatar & Profile */
    .profile-pill {
        display: flex; align-items: center; gap: 8px;
        background: rgba(255,255,255,0.1);
        padding: 4px 12px 4px 4px;
        border-radius: 20px;
    }
    .profile-pill img { width: 28px; height: 28px; border-radius: 50%; }

  </style>
</head>
<body>

  <script>
    /* --- CONFIG & STATE --- */
    const firebaseConfig = {
      apiKey: "AIzaSyBkYQ7tRMrZ-mghBnkJ_EvuzHpjs_p8hOY",
      authDomain: "sudo-9fbfc.firebaseapp.com",
      projectId: "sudo-9fbfc",
      storageBucket: "sudo-9fbfc.appspot.com",
      messagingSenderId: "927814106972",
      appId: "1:927814106972:web:71e0773453f9d16f598b99"
    };

    // State
    const state = {
        grid: [],
        solution: [],
        given: new Set(),
        selected: null, // {r, c}
        mode: 'input', // input, erase
        difficulty: 'easy',
        mistakes: 0,
        hints: 3,
        timer: 0,
        timerId: null,
        isPlaying: false,
        history: [], // Undo stack
        user: { id: null, name: 'Guest', avatar: '', score: 0 },
        sound: true,
        theme: 'dark'
    };

    // DOM Elements Cache
    const UI = {
        grid: document.getElementById('grid'),
        numpad: document.getElementById('numpad'),
        timer: document.getElementById('timer'),
        score: document.getElementById('user-score'),
        mistakeCount: document.getElementById('mistake-count'),
        hintBtn: document.getElementById('btn-hint'),
        hintText: document.getElementById('hint-text'),
        eraseBtn: document.getElementById('btn-erase'),
        undoBtn: document.getElementById('btn-undo'),
        loader: document.getElementById('loader'),
        modals: {
            settings: document.getElementById('modal-settings'),
            win: document.getElementById('modal-win'),
            leaderboard: document.getElementById('modal-leaderboard')
        }
    };

    // Audio
    const clickSound = new Audio('https://github.com/codex-cdx/sudo/raw/refs/heads/main/%D0%9F%D0%BB%D0%B0%D0%BC%D0%B1.mp3');

    /* --- INITIALIZATION --- */
    document.addEventListener('DOMContentLoaded', async () => {
        // Init Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 1. Auth & User Logic
        try {
            await auth.signInAnonymously();
            
            // Telegram Data Integration
            if (window.Telegram?.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                // Set iOS Theme color
                tg.setHeaderColor('#000000');
                
                if (tg.initDataUnsafe?.user) {
                    const u = tg.initDataUnsafe.user;
                    state.user.id = String(u.id);
                    state.user.name = u.first_name; // + ' ' + u.last_name
                    state.user.avatar = u.photo_url || state.user.avatar;
                } else {
                    state.user.id = auth.currentUser.uid;
                }
            } else {
                state.user.id = auth.currentUser.uid;
            }

            // Load User Data from Firestore
            if (state.user.id) {
                const docRef = db.collection('users').doc(state.user.id);
                const docSnap = await docRef.get();
                if (docSnap.exists) {
                    const data = docSnap.data();
                    state.user.score = data.score || 0;
                } else {
                    await docRef.set({
                        username: state.user.name,
                        avatar: state.user.avatar,
                        score: 0
                    });
                }
            }
            updateProfileUI();

        } catch (e) {
            console.error("Auth failed", e);
        }

        // 2. Setup UI
        setupNumpad();
        setupGridListeners();
        setupControls();
        setupModals();
        
        // 3. Start Game
        startNewGame();
        
        // Hide Loader
        setTimeout(() => {
            UI.loader.style.opacity = '0';
            setTimeout(() => UI.loader.style.display = 'none', 500);
        }, 800);
    });

    /* --- GAME LOGIC --- */

    function startNewGame() {
        clearInterval(state.timerId);
        state.timer = 0;
        state.mistakes = 0;
        state.hints = 3;
        state.history = [];
        state.selected = null;
        state.mode = 'input';
        state.difficulty = document.getElementById('difficulty-select').value;
        state.isPlaying = true;

        generateSudoku(state.difficulty);
        renderGrid();
        updateStatsUI();
        startTimer();
        
        // Reset tool states
        document.querySelectorAll('.glass-btn').forEach(b => b.classList.remove('active'));
    }

    function generateSudoku(diff) {
        // Simple backtracking generator + remover
        // 1. Create full solution
        const base = Array(9).fill(0).map(() => Array(9).fill(0));
        solveSudoku(base); 
        state.solution = base.map(r => [...r]);

        // 2. Remove digits based on difficulty
        const removeCount = { 'easy': 30, 'medium': 45, 'hard': 54 }[diff] || 30;
        const puzzle = base.map(r => [...r]);
        
        let attempts = removeCount;
        while (attempts > 0) {
            let r = Math.floor(Math.random() * 9);
            let c = Math.floor(Math.random() * 9);
            if (puzzle[r][c] !== 0) {
                puzzle[r][c] = 0;
                attempts--;
            }
        }
        
        state.grid = puzzle;
        state.given = new Set();
        for(let r=0; r<9; r++){
            for(let c=0; c<9; c++){
                if(puzzle[r][c] !== 0) state.given.add(`${r},${c}`);
            }
        }
    }

    function solveSudoku(board) {
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                if (board[r][c] === 0) {
                    const nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                    for (let n of nums) {
                        if (isValid(board, r, c, n)) {
                            board[r][c] = n;
                            if (solveSudoku(board)) return true;
                            board[r][c] = 0;
                        }
                    }
                    return false;
                }
            }
        }
        return true;
    }

    function isValid(board, row, col, num) {
        for (let x = 0; x < 9; x++) {
            if (board[row][x] === num || board[x][col] === num || 
                board[3 * Math.floor(row/3) + Math.floor(x/3)][3 * Math.floor(col/3) + x%3] === num) {
                return false;
            }
        }
        return true;
    }

    /* --- UI RENDERING --- */
    function renderGrid() {
        UI.grid.innerHTML = '';
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.r = r;
                cell.dataset.c = c;
                
                const val = state.grid[r][c];
                if (val !== 0) {
                    cell.textContent = val;
                    if (state.given.has(`${r},${c}`)) cell.classList.add('given');
                    else cell.classList.add('user-input');
                }
                UI.grid.appendChild(cell);
            }
        }
    }

    function setupNumpad() {
        UI.numpad.innerHTML = '';
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'glass-btn num-btn';
            btn.innerHTML = `${i} <span class="count" id="count-${i}"></span>`;
            btn.onclick = () => handleInput(i);
            UI.numpad.appendChild(btn);
        }
        updateNumberCounts();
    }

    function updateNumberCounts() {
        const counts = Array(10).fill(0);
        state.grid.flat().forEach(n => counts[n]++);
        for(let i=1; i<=9; i++) {
            const el = document.getElementById(`count-${i}`);
            if(el) el.textContent = 9 - counts[i] > 0 ? 9 - counts[i] : '✓';
            const btn = el.parentElement;
            if(counts[i] >= 9) btn.disabled = true;
            else btn.disabled = false;
        }
    }

    /* --- INTERACTIONS --- */
    function setupGridListeners() {
        UI.grid.addEventListener('click', (e) => {
            const cell = e.target.closest('.cell');
            if (!cell) return;
            selectCell(parseInt(cell.dataset.r), parseInt(cell.dataset.c));
        });
    }

    function selectCell(r, c) {
        if (state.mode === 'erase' && !state.given.has(`${r},${c}`)) {
             handleInput(0, r, c);
             return;
        }

        playSound();
        state.selected = {r, c};
        
        // Visual updates
        document.querySelectorAll('.cell').forEach(el => {
            el.classList.remove('selected', 'area', 'highlight');
            const dr = parseInt(el.dataset.r);
            const dc = parseInt(el.dataset.c);
            
            // Highlight selected
            if (dr === r && dc === c) el.classList.add('selected');
            
            // Highlight Area (Row, Col, Box)
            const sameBox = Math.floor(dr/3) === Math.floor(r/3) && Math.floor(dc/3) === Math.floor(c/3);
            if (dr === r || dc === c || sameBox) el.classList.add('area');

            // Highlight Same Numbers
            const val = state.grid[r][c];
            if (val !== 0 && state.grid[dr][dc] === val) el.classList.add('highlight');
        });
    }

    function handleInput(num, forceR = null, forceC = null) {
        playSound();
        const r = forceR !== null ? forceR : (state.selected ? state.selected.r : null);
        const c = forceC !== null ? forceC : (state.selected ? state.selected.c : null);

        if (r === null || c === null) return;
        if (state.given.has(`${r},${c}`)) return; // Immutable

        const prevVal = state.grid[r][c];
        if (prevVal === num) return; // No change

        // Push to history
        state.history.push({r, c, prev: prevVal, curr: num});
        UI.undoBtn.disabled = false;

        // Update Data
        state.grid[r][c] = num;
        
        // Update UI
        const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
        cell.textContent = num === 0 ? '' : num;
        cell.classList.remove('error', 'user-input', 'hint-anim');
        if (num !== 0) cell.classList.add('user-input');

        // Logic check
        if (num !== 0) {
            if (num !== state.solution[r][c]) {
                cell.classList.add('error');
                state.mistakes++;
                updateStatsUI();
                checkLose();
            } else {
                checkWin();
            }
        }
        
        updateNumberCounts();
        
        // Re-highlight if cell is still selected
        if (state.selected && state.selected.r === r && state.selected.c === c) {
            selectCell(r, c);
        }
    }

    function checkWin() {
        // Simple check: no zeros and no errors
        const flat = state.grid.flat();
        if (!flat.includes(0) && document.querySelectorAll('.error').length === 0) {
            gameWon();
        }
    }

    function checkLose() {
        if (state.mistakes >= 3) {
            alert('Игра окончена! Слишком много ошибок.');
            startNewGame();
        }
    }

    async function gameWon() {
        state.isPlaying = false;
        clearInterval(state.timerId);
        
        // Calc Score
        const baseScore = { 'easy': 50, 'medium': 100, 'hard': 200 }[state.difficulty];
        const timeBonus = Math.max(0, 300 - state.timer);
        const points = baseScore + timeBonus - (state.mistakes * 20);
        
        // Save to Firebase
        state.user.score += points;
        updateProfileUI();
        
        if (state.user.id) {
            const db = firebase.firestore();
            db.collection('users').doc(state.user.id).update({ score: state.user.score });
        }

        // Show Modal
        document.getElementById('win-time').textContent = formatTime(state.timer);
        document.getElementById('win-score').textContent = `+${points}`;
        UI.modals.win.classList.add('open');
    }

    /* --- TOOLS --- */
    function undo() {
        if (!state.history.length) return;
        const action = state.history.pop();
        if (!state.history.length) UI.undoBtn.disabled = true;

        state.grid[action.r][action.c] = action.prev;
        
        const cell = document.querySelector(`.cell[data-r="${action.r}"][data-c="${action.c}"]`);
        cell.textContent = action.prev === 0 ? '' : action.prev;
        cell.classList.remove('error', 'user-input');
        if (action.prev !== 0) {
             cell.classList.add('user-input');
             // Re-check error status visually if undoing to a wrong number (unlikely but logic safe)
             if (action.prev !== state.solution[action.r][action.c]) cell.classList.add('error');
        }
        updateNumberCounts();
    }

    function giveHint() {
        if (state.hints <= 0 || !state.isPlaying) return;
        
        // Find empty cell
        const empties = [];
        for(let r=0; r<9; r++){
            for(let c=0; c<9; c++){
                if(state.grid[r][c] === 0) empties.push({r,c});
            }
        }
        if (empties.length === 0) return;

        const target = empties[Math.floor(Math.random() * empties.length)];
        const val = state.solution[target.r][target.c];
        
        state.hints--;
        handleInput(val, target.r, target.c);
        
        // Visual Hint animation
        const cell = document.querySelector(`.cell[data-r="${target.r}"][data-c="${target.c}"]`);
        cell.classList.add('hint-anim');
        updateStatsUI();
    }

    /* --- HELPERS & MODALS --- */
    function setupControls() {
        UI.eraseBtn.onclick = () => {
             // Toggle erase mode visually
             state.mode = state.mode === 'erase' ? 'input' : 'erase';
             UI.eraseBtn.classList.toggle('active', state.mode === 'erase');
        };
        UI.undoBtn.onclick = undo;
        UI.hintBtn.onclick = giveHint;
        document.getElementById('btn-new-game').onclick = startNewGame;
        document.getElementById('btn-settings').onclick = () => openModal('settings');
        document.getElementById('btn-leaderboard').onclick = showLeaderboard;
        document.getElementById('btn-win-close').onclick = () => { closeModal('win'); startNewGame(); };
        
        // Difficulty change
        document.getElementById('difficulty-select').onchange = startNewGame;

        // Theme Switch
        document.querySelectorAll('.theme-switch').forEach(btn => {
            btn.onclick = (e) => {
                const theme = e.target.dataset.setTheme;
                document.body.dataset.theme = theme;
                // Toggle active visuals
                e.target.parentNode.querySelectorAll('button').forEach(b => {
                    b.classList.remove('bg-black', 'text-white');
                    b.style.opacity = '0.5';
                });
                e.target.style.opacity = '1';
            }
        });

        // Sound Toggle
        document.getElementById('toggle-sound').onclick = (e) => {
            state.sound = !state.sound;
            const toggle = e.currentTarget.querySelector('div');
            e.currentTarget.classList.toggle('bg-green-500', state.sound);
            toggle.style.transform = state.sound ? 'translateX(24px)' : 'translateX(0)';
        }
    }

    function setupModals() {
        document.querySelectorAll('.modal-close').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
            };
        });
        
        // Close on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.onclick = (e) => {
                if(e.target === overlay) overlay.classList.remove('open');
            }
        });
    }

    function openModal(name) {
        UI.modals[name].classList.add('open');
    }
    
    function closeModal(name) {
        UI.modals[name].classList.remove('open');
    }

    async function showLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '<div class="text-center p-4">Загрузка...</div>';
        openModal('leaderboard');
        
        try {
            const db = firebase.firestore();
            const snapshot = await db.collection('users').orderBy('score', 'desc').limit(20).get();
            list.innerHTML = '';
            
            snapshot.forEach((doc, idx) => {
                const d = doc.data();
                const isMe = doc.id === state.user.id;
                const item = document.createElement('div');
                item.className = `glass-panel p-3 rounded-xl flex items-center gap-3 ${isMe ? 'border-blue-500 border' : ''}`;
                item.innerHTML = `
                    <div class="font-bold w-6 text-center text-muted">${idx+1}</div>
                    <img src="${d.avatar || 'https://t.me/i/userpic/320/default.jpg'}" class="w-8 h-8 rounded-full">
                    <div class="flex-1 font-medium truncate">${d.username}</div>
                    <div class="font-bold text-accent">${d.score}</div>
                `;
                list.appendChild(item);
            });
        } catch(e) {
            list.innerHTML = '<div class="text-red-400 text-center">Ошибка загрузки</div>';
        }
    }

    function startTimer() {
        state.timerId = setInterval(() => {
            state.timer++;
            UI.timer.textContent = formatTime(state.timer);
        }, 1000);
    }

    function formatTime(s) {
        const m = Math.floor(s / 60).toString().padStart(2, '0');
        const sec = (s % 60).toString().padStart(2, '0');
        return `${m}:${sec}`;
    }

    function updateStatsUI() {
        UI.mistakeCount.textContent = state.mistakes;
        UI.hintText.textContent = state.hints;
        if (state.hints === 0) UI.hintBtn.disabled = true;
        else UI.hintBtn.disabled = false;
    }

    function updateProfileUI() {
        document.getElementById('user-name').textContent = state.user.name;
        document.getElementById('user-score').textContent = state.user.score;
        document.getElementById('user-avatar').src = state.user.avatar || 'https://t.me/i/userpic/320/default.jpg';
    }

    function playSound() {
        if (state.sound) {
            clickSound.currentTime = 0;
            clickSound.play().catch(() => {});
        }
    }

  </script>
</body>
