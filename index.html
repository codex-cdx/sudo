<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Профессиональный Судоку с рейтингом и облачным сохранением">
  <title>Sudoku Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* =========================================
       CORE VARIABLES & THEMES
       ========================================= */
    :root {
      /* Базовые размеры и отступы */
      --header-height: 60px;
      --controls-height: 180px;
      --board-max-size: min(100vw - 20px, 60vh);
      
      /* Анимации */
      --transition-fast: 0.15s ease;
      --transition-medium: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    /* --- THEME: CYBER (Default) --- */
    body[data-theme="cyber"] {
      --bg-app: #0f172a;
      --bg-panel: rgba(30, 41, 59, 0.7);
      --bg-cell: #1e293b;
      --bg-cell-active: rgba(99, 102, 241, 0.2);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --color-primary: #6366f1; /* Indigo-500 */
      --color-primary-hover: #4f46e5;
      --color-accent: #38bdf8; /* Sky-400 */
      --grid-border: #334155;
      --grid-border-thick: #6366f1;
      --digit-given: #e2e8f0;
      --digit-user: #818cf8;
      --color-error: #ef4444;
      --color-success: #22c55e;
      --shadow-glow: 0 0 15px rgba(99, 102, 241, 0.3);
    }

    /* --- THEME: SUNSET (Orange/Warm) --- */
    body[data-theme="sunset"] {
      --bg-app: #1c1917;
      --bg-panel: rgba(41, 37, 36, 0.8);
      --bg-cell: #292524;
      --bg-cell-active: rgba(249, 115, 22, 0.15);
      --text-main: #fafaf9;
      --text-muted: #a8a29e;
      --color-primary: #f97316;
      --color-primary-hover: #ea580c;
      --color-accent: #fbbf24;
      --grid-border: #44403c;
      --grid-border-thick: #f97316;
      --digit-given: #fafaf9;
      --digit-user: #fb923c;
      --color-error: #ef4444;
      --color-success: #16a34a;
      --shadow-glow: 0 0 15px rgba(249, 115, 22, 0.2);
    }

    /* --- THEME: MONO (Black & White) --- */
    body[data-theme="mono"] {
      --bg-app: #ffffff;
      --bg-panel: rgba(243, 244, 246, 0.9);
      --bg-cell: #ffffff;
      --bg-cell-active: rgba(0, 0, 0, 0.1);
      --text-main: #111827;
      --text-muted: #6b7280;
      --color-primary: #111827;
      --color-primary-hover: #374151;
      --color-accent: #4b5563;
      --grid-border: #d1d5db;
      --grid-border-thick: #111827;
      --digit-given: #000000;
      --digit-user: #4b5563;
      --color-error: #dc2626;
      --color-success: #16a34a;
      --shadow-glow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    /* --- THEME: SAKURA (Pink/Soft) --- */
    body[data-theme="sakura"] {
      --bg-app: #2a2528;
      --bg-panel: rgba(60, 50, 55, 0.7);
      --bg-cell: #352f32;
      --bg-cell-active: rgba(244, 114, 182, 0.15);
      --text-main: #fce7f3;
      --text-muted: #dbb4c5;
      --color-primary: #f472b6;
      --color-primary-hover: #db2777;
      --color-accent: #fbcfe8;
      --grid-border: #503d46;
      --grid-border-thick: #f472b6;
      --digit-given: #ffffff;
      --digit-user: #f9a8d4;
      --color-error: #fb7185;
      --color-success: #4ade80;
      --shadow-glow: 0 0 15px rgba(244, 114, 182, 0.25);
    }

    /* =========================================
       GLOBAL STYLES
       ========================================= */
    body {
      background-color: var(--bg-app);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden; /* Предотвращаем скролл всей страницы */
      touch-action: manipulation;
      transition: background-color var(--transition-medium), color var(--transition-medium);
      -webkit-font-smoothing: antialiased;
      height: 100dvh; /* Dynamic Viewport Height */
      width: 100vw;
      display: flex;
      flex-direction: column;
    }

    /* Скроллбар для модальных окон */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--grid-border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-primary); }

    /* =========================================
       COMPONENT: LOADING SCREEN
       ========================================= */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-app);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }

    .loader-ring {
      width: 64px;
      height: 64px;
      border: 4px solid var(--bg-cell);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* =========================================
       LAYOUT CONTAINERS
       ========================================= */
    .app-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 10px;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
    }

    /* Header Section */
    .header-section {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      margin-bottom: 10px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      background: var(--bg-panel);
      backdrop-filter: blur(10px);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--grid-border);
      gap: 10px;
    }
    
    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--color-primary);
    }

    /* =========================================
       COMPONENT: SUDOKU GRID
       ========================================= */
    .game-board-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      /* Адаптивный размер доски: ширина экрана или 60% высоты */
      aspect-ratio: 1;
      max-height: 60vh;
      max-width: 60vh;
    }

    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      width: 100%;
      height: 100%;
      background-color: var(--grid-border);
      gap: 1px;
      border: 2px solid var(--grid-border-thick);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow-glow);
    }

    .cell {
      background-color: var(--bg-cell);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(14px, 5vw, 28px);
      cursor: pointer;
      user-select: none;
      position: relative;
      transition: background-color 0.1s, color 0.1s;
    }

    /* Borders for 3x3 Blocks */
    .cell:nth-child(3n) { border-right: 2px solid var(--grid-border-thick); margin-right: -1px; z-index: 1; }
    .cell:nth-child(9n) { border-right: none; margin-right: 0; }
    .cell:nth-child(n+19):nth-child(-n+27),
    .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--grid-border-thick); margin-bottom: -1px; z-index: 1; }

    /* Cell States */
    .cell.given { color: var(--digit-given); font-weight: 800; }
    .cell.user-input { color: var(--digit-user); font-weight: 500; }
    
    .cell.selected { background-color: var(--color-primary) !important; color: #fff !important; }
    .cell.highlighted { background-color: var(--bg-cell-active); }
    .cell.same-number { background-color: rgba(99, 102, 241, 0.4) !important; color: #fff; font-weight: bold;}
    
    .cell.error {
      color: var(--color-error) !important;
      animation: shake 0.4s ease-in-out;
    }
    
    .cell.hint-anim {
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background-color: var(--color-success);
    }

    @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-4px);} 75% {transform: translateX(4px);} }
    @keyframes popIn { 0% {transform: scale(0); opacity: 0;} 100% {transform: scale(1); opacity: 1;} }

    /* =========================================
       COMPONENT: CONTROLS
       ========================================= */
    .controls-area {
      width: 100%;
      margin-top: auto; /* Push to bottom */
      padding-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 0 10px;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(5, 1fr); /* 2 rows of 5 */
      gap: 8px;
    }
    
    .numpad-btn {
      aspect-ratio: 1.5; /* Rectangular-ish */
      background: var(--bg-panel);
      border: 1px solid var(--grid-border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-fast);
      position: relative;
    }
    
    .numpad-btn:active { transform: scale(0.92); }
    .numpad-btn.active-tool { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
    .numpad-btn.exhausted { opacity: 0.3; pointer-events: none; }
    
    /* Action Buttons (Undo, Erase, Hint, Note) */
    .actions-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    
    .action-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      background: var(--bg-panel);
      border: 1px solid var(--grid-border);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      gap: 4px;
      transition: background var(--transition-fast);
    }
    
    .action-btn svg { width: 24px; height: 24px; }
    .action-btn:hover { background: var(--grid-border); }
    
    /* Badge for hint count */
    .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--color-primary);
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
    }

    /* =========================================
       COMPONENT: MODALS (Glassmorphism)
       ========================================= */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    
    .modal-card {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 90%;
      max-width: 400px;
      max-height: 85vh;
      border-radius: 24px;
      padding: 24px;
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      color: var(--text-main);
    }
    
    .modal-overlay.open .modal-card { transform: translateY(0); }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 1.5rem; font-weight: 700; color: var(--color-primary); }
    .close-btn { background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }
    
    .btn-primary {
      background: var(--color-primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      margin-top: 10px;
      transition: background var(--transition-fast);
    }
    .btn-primary:hover { background: var(--color-primary-hover); }

    /* Theme Select Grid */
    .theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .theme-option {
      padding: 15px;
      border-radius: 12px;
      border: 2px solid transparent;
      background: rgba(0,0,0,0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .theme-option.active { border-color: var(--color-primary); background: rgba(99, 102, 241, 0.1); }
    .color-dot { width: 20px; height: 20px; border-radius: 50%; }

    /* Leaderboard Styles */
    .leaderboard-list { overflow-y: auto; max-height: 300px; padding-right: 5px; }
    .rank-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid var(--grid-border); gap: 10px; }
    .rank-num { font-weight: bold; width: 25px; color: var(--color-accent); }
    .rank-score { margin-left: auto; font-family: monospace; font-weight: bold; }

  </style>
</head>

    /* =========================================
       CLASS: NETWORK MANAGER (Firebase)
       ========================================= */
    class NetworkManager {
      constructor() {
        this.db = null;
        this.auth = null;
        this.user = { id: null, name: 'Гость', avatar: 'https://t.me/i/userpic/320/default.jpg', score: 0 };
        this.initFirebase();
      }

      initFirebase() {
        try {
          firebase.initializeApp(CONFIG.firebase);
          this.db = firebase.firestore();
          this.auth = firebase.auth();
          this.authenticate();
        } catch (e) {
          console.error("Firebase Init Error:", e);
        }
      }

      async authenticate() {
        try {
          // Попытка получить данные Telegram
          if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
            const tgUser = window.Telegram.WebApp.initDataUnsafe.user;
            this.user.id = String(tgUser.id);
            this.user.name = tgUser.username || tgUser.first_name || 'Player';
            if (tgUser.photo_url) this.user.avatar = tgUser.photo_url;
            
            // Нужно войти анонимно для прав доступа, но используем ID телеграма как ключ дока
            await this.auth.signInAnonymously();
          } else {
            // Фолбек на анонимную авторизацию
            const userCred = await this.auth.signInAnonymously();
            this.user.id = userCred.user.uid;
          }
          
          this.syncUserData();
        } catch (e) {
          console.warn("Auth failed, playing offline mode");
        }
      }

      async syncUserData() {
        if (!this.db || !this.user.id) return;
        
        const userRef = this.db.collection('users').doc(this.user.id);
        const doc = await userRef.get();
        
        if (doc.exists) {
          const data = doc.data();
          this.user.score = data.score || 0;
        } else {
          await userRef.set({
            username: this.user.name,
            avatar: this.user.avatar,
            score: 0,
            createdAt: new Date().toISOString()
          });
        }
        
        document.dispatchEvent(new CustomEvent('userDataUpdated', { detail: this.user }));
      }

      async updateScore(points) {
        if (!this.db || !this.user.id) {
          this.user.score += points; // Offline update
          return;
        }
        
        this.user.score += points;
        document.dispatchEvent(new CustomEvent('userDataUpdated', { detail: this.user }));
        
        try {
          await this.db.collection('users').doc(this.user.id).update({
            score: firebase.firestore.FieldValue.increment(points)
          });
        } catch (e) { console.error("Score sync failed", e); }
      }

      async getLeaderboard() {
        if (!this.db) return [];
        try {
          const snap = await this.db.collection('users').orderBy('score', 'desc').limit(20).get();
          return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        } catch (e) { return []; }
      }
    }

    /* =========================================
       CLASS: SUDOKU LOGIC (Engine)
       ========================================= */
    class SudokuEngine {
      constructor() {
        this.grid = [];
        this.solution = [];
      }

      // Генерация полной сетки
      generateSolution() {
        this.solution = Array(9).fill().map(() => Array(9).fill(0));
        this.fillGrid(this.solution);
      }

      fillGrid(grid) {
        for (let r = 0; r < 9; r++) {
          for (let c = 0; c < 9; c++) {
            if (grid[r][c] === 0) {
              const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
              for (let num of nums) {
                if (this.isValid(grid, r, c, num)) {
                  grid[r][c] = num;
                  if (this.fillGrid(grid)) return true;
                  grid[r][c] = 0;
                }
              }
              return false;
            }
          }
        }
        return true;
      }

      isValid(grid, row, col, num) {
        for (let i = 0; i < 9; i++) {
          if (grid[row][i] === num && i !== col) return false;
          if (grid[i][col] === num && i !== row) return false;
          const boxR = 3 * Math.floor(row / 3) + Math.floor(i / 3);
          const boxC = 3 * Math.floor(col / 3) + i % 3;
          if (grid[boxR][boxC] === num && (boxR !== row || boxC !== col)) return false;
        }
        return true;
      }

      // Создание задачи путем удаления цифр
      createPuzzle(difficulty) {
        this.generateSolution();
        this.grid = this.solution.map(row => row.slice()); // Deep copy
        
        let attempts = CONFIG.difficulties[difficulty].remove;
        while (attempts > 0) {
          let r = Math.floor(Math.random() * 9);
          let c = Math.floor(Math.random() * 9);
          if (this.grid[r][c] !== 0) {
            this.grid[r][c] = 0;
            attempts--;
          }
        }
        return { initial: this.grid, solution: this.solution };
      }
    }

    /* =========================================
       CLASS: UI MANAGER
       ========================================= */
    class UIManager {
      constructor(gameInstance) {
        this.game = gameInstance;
        this.elements = {
          grid: document.getElementById('grid'),
          numpad: document.getElementById('numpad'),
          timer: document.getElementById('timer'),
          difficulty: document.getElementById('difficulty-select'),
          hintBadge: document.getElementById('hint-badge'),
          username: document.getElementById('username'),
          avatar: document.getElementById('user-avatar'),
          score: document.getElementById('score-display'),
          soundBtn: document.getElementById('toggle-sound')
        };
        
        this.audio = new Audio(CONFIG.sounds.click);
        this.soundEnabled = localStorage.getItem('sound') !== 'false';
        
        this.initTheme();
        this.bindEvents();
      }

      initTheme() {
        const savedTheme = localStorage.getItem('theme') || 'cyber';
        document.body.dataset.theme = savedTheme;
        document.querySelectorAll('.theme-option').forEach(el => {
          el.classList.toggle('active', el.dataset.setTheme === savedTheme);
        });
        this.updateSoundBtn();
      }

      bindEvents() {
        // Theme switcher
        document.querySelectorAll('.theme-option').forEach(opt => {
          opt.addEventListener('click', () => {
            const theme = opt.dataset.setTheme;
            document.body.dataset.theme = theme;
            localStorage.setItem('theme', theme);
            document.querySelectorAll('.theme-option').forEach(el => el.classList.remove('active'));
            opt.classList.add('active');
            this.playSound();
          });
        });

        // Sound toggle
        this.elements.soundBtn.addEventListener('click', () => {
          this.soundEnabled = !this.soundEnabled;
          localStorage.setItem('sound', this.soundEnabled);
          this.updateSoundBtn();
        });

        // Modals
        document.querySelectorAll('[data-close]').forEach(btn => {
          btn.addEventListener('click', () => {
            document.getElementById(btn.dataset.close).classList.remove('open');
          });
        });

        document.getElementById('btn-settings').addEventListener('click', () => {
          document.getElementById('modal-settings').classList.add('open');
        });

        document.getElementById('btn-rating').addEventListener('click', async () => {
          document.getElementById('modal-rating').classList.add('open');
          await this.renderLeaderboard();
        });
        
        // Game Controls
        document.getElementById('difficulty-select').addEventListener('change', (e) => this.game.startNewGame(e.target.value));
        document.getElementById('btn-new-game').addEventListener('click', () => this.game.startNewGame());
        document.getElementById('btn-erase').addEventListener('click', () => this.game.actionErase());
        document.getElementById('btn-undo').addEventListener('click', () => this.game.actionUndo());
        document.getElementById('btn-hint').addEventListener('click', () => this.game.actionHint());
        document.getElementById('btn-victory-close').addEventListener('click', () => {
           document.getElementById('modal-victory').classList.remove('open');
           this.game.startNewGame();
        });
      }

      playSound() {
        if (this.soundEnabled) {
          this.audio.currentTime = 0;
          this.audio.play().catch(() => {});
        }
      }
      
      updateSoundBtn() {
        this.elements.soundBtn.textContent = this.soundEnabled ? 'ВКЛ' : 'ВЫКЛ';
      }

      renderGrid(gridState, initialGrid) {
        this.elements.grid.innerHTML = '';
        gridState.forEach((row, r) => {
          row.forEach((val, c) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.r = r;
            cell.dataset.c = c;
            
            if (initialGrid[r][c] !== 0) {
              cell.textContent = initialGrid[r][c];
              cell.classList.add('given');
            } else if (val !== 0) {
              cell.textContent = val;
              cell.classList.add('user-input');
            }

            cell.addEventListener('click', () => this.game.selectCell(r, c));
            this.elements.grid.appendChild(cell);
          });
        });
      }

      updateCell(r, c, val, isError = false) {
        const cell = this.elements.grid.children[r * 9 + c];
        cell.textContent = val === 0 ? '' : val;
        cell.className = 'cell'; // Reset classes
        if (val !== 0) cell.classList.add('user-input');
        
        // Re-apply selection if active
        if (this.game.selectedCell?.r === r && this.game.selectedCell?.c === c) {
           cell.classList.add('selected');
        }
        
        if (isError) {
          cell.classList.add('error');
          setTimeout(() => cell.classList.remove('error'), 500);
        }
      }

      highlightCells(row, col, value) {
        const cells = Array.from(this.elements.grid.children);
        cells.forEach(c => c.classList.remove('selected', 'highlighted', 'same-number'));
        
        if (row === null) return;

        const idx = row * 9 + col;
        cells[idx].classList.add('selected');

        // Highlight Row, Col, Box
        for (let i = 0; i < 81; i++) {
          const r = Math.floor(i / 9);
          const c = i % 9;
          const boxR = Math.floor(r / 3);
          const boxC = Math.floor(c / 3);
          const targetBoxR = Math.floor(row / 3);
          const targetBoxC = Math.floor(col / 3);

          if (r === row || c === col || (boxR === targetBoxR && boxC === targetBoxC)) {
            if (i !== idx) cells[i].classList.add('highlighted');
          }
          
          // Highlight same numbers
          if (value !== 0 && cells[i].textContent == value) {
             cells[i].classList.add('same-number');
          }
        }
      }
      
      renderNumpad(counts) {
        this.elements.numpad.innerHTML = '';
        for (let i = 1; i <= 9; i++) {
          const btn = document.createElement('div');
          btn.className = 'numpad-btn';
          btn.textContent = i;
          
          // Проверка завершенности цифры (если их уже 9 на доске)
          if (counts[i] >= 9) btn.classList.add('exhausted');
          
          btn.addEventListener('click', () => {
             this.playSound();
             this.game.inputNumber(i);
          });
          this.elements.numpad.appendChild(btn);
        }
      }

      updateTimer(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        this.elements.timer.textContent = `${m}:${s}`;
      }
      
      updateHints(count) {
        this.elements.hintBadge.textContent = count;
        if(count === 0) this.elements.hintBadge.style.display = 'none';
      }
      
      updateUserInfo(user) {
        this.elements.username.textContent = user.name;
        this.elements.avatar.src = user.avatar;
        this.elements.score.textContent = user.score;
      }
      
      showVictory(stats) {
        document.getElementById('vic-diff').textContent = stats.difficulty;
        document.getElementById('vic-time').textContent = stats.time;
        document.getElementById('vic-score').textContent = `+${stats.points}`;
        document.getElementById('modal-victory').classList.add('open');
      }
      
      async renderLeaderboard() {
        const list = document.getElementById('rating-list');
        list.innerHTML = '<p class="text-center text-[var(--text-muted)]">Загрузка...</p>';
        
        const data = await this.game.network.getLeaderboard();
        list.innerHTML = '';
        
        if (data.length === 0) {
          list.innerHTML = '<p class="text-center p-4">Рейтинг пока пуст</p>';
          return;
        }

        data.forEach((u, index) => {
          const item = document.createElement('div');
          item.className = 'rank-item';
          // Highlight current user
          if (u.id === this.game.network.user.id) item.style.backgroundColor = 'var(--bg-cell-active)';
          
          item.innerHTML = `
            <span class="rank-num">${index + 1}</span>
            <img src="${u.avatar}" class="w-8 h-8 rounded-full border border-[var(--grid-border)]">
            <span class="font-bold text-sm truncate w-32">${u.username}</span>
            <span class="rank-score">${u.score}</span>
          `;
          list.appendChild(item);
        });
      }
    }

    /* =========================================
       CLASS: MAIN GAME CONTROLLER
       ========================================= */
    class SudokuGame {
      constructor() {
        this.engine = new SudokuEngine();
        this.network = new NetworkManager();
        this.ui = new UIManager(this);
        
        this.state = {
          grid: [], // Текущее состояние
          initial: [], // Изначальные цифры
          solution: [], // Ответ
          history: [], // Undo stack
          difficulty: 'easy',
          timer: 0,
          intervalId: null,
          selectedCell: null,
          hints: 3,
          isOver: false
        };
        
        document.addEventListener('userDataUpdated', (e) => this.ui.updateUserInfo(e.detail));
        
        // Hide loading screen
        setTimeout(() => {
          document.getElementById('loading-screen').style.opacity = '0';
          setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        }, 1500);

        this.startNewGame('easy');
      }

      startNewGame(difficulty = this.state.difficulty) {
        clearInterval(this.state.intervalId);
        
        this.state.difficulty = difficulty;
        this.state.hints = 3;
        this.state.history = [];
        this.state.timer = 0;
        this.state.isOver = false;
        this.state.selectedCell = null;
        
        const puzzle = this.engine.createPuzzle(difficulty);
        this.state.initial = puzzle.initial.map(row => row.slice());
        this.state.grid = puzzle.initial.map(row => row.slice());
        this.state.solution = puzzle.solution;
        
        this.ui.renderGrid(this.state.grid, this.state.initial);
        this.ui.updateHints(this.state.hints);
        this.updateNumpadState();
        
        // Start Timer
        this.state.intervalId = setInterval(() => {
          this.state.timer++;
          this.ui.updateTimer(this.state.timer);
        }, 1000);
      }

      selectCell(r, c) {
        if (this.state.isOver) return;
        this.state.selectedCell = { r, c };
        const val = this.state.grid[r][c];
        this.ui.highlightCells(r, c, val);
        this.ui.playSound();
      }

      inputNumber(num) {
        if (this.state.isOver || !this.state.selectedCell) return;
        const { r, c } = this.state.selectedCell;
        
        // Нельзя менять изначальные цифры
        if (this.state.initial[r][c] !== 0) return;
        
        const prev = this.state.grid[r][c];
        if (prev === num) return; // No change

        // Save history
        this.state.history.push({ r, c, val: prev });
        
        // Set value
        this.state.grid[r][c] = num;
        
        // Check correctness immediate visual feedback
        const isCorrect = this.state.solution[r][c] === num;
        
        if (!isCorrect) {
          this.ui.updateCell(r, c, num, true); // Show error
          // В строгом режиме можно штрафовать или не давать ставить, 
          // но в стандартном просто показываем, что поставил (валидация при победе)
        } else {
          this.ui.updateCell(r, c, num);
        }
        
        this.ui.highlightCells(r, c, num); // Refresh highlights
        this.updateNumpadState();
        this.checkWinCondition();
      }

      actionErase() {
        if (!this.state.selectedCell) return;
        this.inputNumber(0);
      }

      actionUndo() {
        if (this.state.history.length === 0 || this.state.isOver) return;
        const last = this.state.history.pop();
        this.state.grid[last.r][last.c] = last.val;
        this.ui.updateCell(last.r, last.c, last.val);
        this.ui.playSound();
        this.updateNumpadState();
      }

      actionHint() {
        if (this.state.isOver || this.state.hints <= 0) return;
        
        // Найти пустую клетку
        let empty = [];
        for(let r=0; r<9; r++) {
          for(let c=0; c<9; c++) {
            if (this.state.grid[r][c] === 0) empty.push({r,c});
          }
        }
        
        if (empty.length === 0) return;
        
        const target = empty[Math.floor(Math.random() * empty.length)];
        const correctVal = this.state.solution[target.r][target.c];
        
        this.state.grid[target.r][target.c] = correctVal;
        this.state.initial[target.r][target.c] = correctVal; // Lock it as given
        
        // UI Update
        const cell = this.ui.elements.grid.children[target.r*9 + target.c];
        cell.textContent = correctVal;
        cell.classList.add('given', 'hint-anim');
        
        this.state.hints--;
        this.ui.updateHints(this.state.hints);
        this.updateNumpadState();
        this.checkWinCondition();
      }

      updateNumpadState() {
        const counts = Array(10).fill(0);
        this.state.grid.forEach(row => row.forEach(n => counts[n]++));
        this.ui.renderNumpad(counts);
      }

      checkWinCondition() {
        // Проверяем, заполнена ли сетка
        let isFull = true;
        let isCorrect = true;
        
        for(let r=0; r<9; r++) {
          for(let c=0; c<9; c++) {
            if (this.state.grid[r][c] === 0) {
              isFull = false;
              break;
            }
            if (this.state.grid[r][c] !== this.state.solution[r][c]) {
              isCorrect = false;
            }
          }
        }

        if (isFull && isCorrect) {
          this.gameWon();
        }
      }

      gameWon() {
        this.state.isOver = true;
        clearInterval(this.state.intervalId);
        
        const diffConfig = CONFIG.difficulties[this.state.difficulty];
        // Бонус за скорость: макс 50% от очков, убывает со временем
        const timeBonus = Math.max(0, Math.floor(200 - this.state.timer / 5)); 
        const totalPoints = diffConfig.points + timeBonus;
        
        this.network.updateScore(totalPoints);
        
        this.ui.showVictory({
          difficulty: this.ui.elements.difficulty.options[this.ui.elements.difficulty.selectedIndex].text,
          time: this.ui.elements.timer.textContent,
          points: totalPoints
        });
        
        // Confetti effect (simple CSS fallback or can add library)
      }
    }

    // Init App
    window.addEventListener('DOMContentLoaded', () => {
      window.game = new SudokuGame();
    });

  </script>
