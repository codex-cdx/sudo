<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sudoku Premium Sky</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@100;200;300;400;500;600&display=swap"
    rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* --- БАЗОВЫЕ НАСТРОЙКИ --- */
    :root {
      --font-stack: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);

      /* Цветовая палитра */
      --glass-base: rgba(18, 20, 40, 0.65);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-highlight: rgba(255, 255, 255, 0.05);
      --primary-glow: rgba(56, 189, 248, 0.6);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --accent-color: #38bdf8;
      /* Sky Blue */

      --cell-border: rgba(255, 255, 255, 0.08);
      --cell-active-bg: rgba(56, 189, 248, 0.25);
      --easing: cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: var(--font-stack);
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* Чтобы фон не скроллился */
      background-color: #0f172a;
      color: var(--text-main);
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Beautiful B&W Sky Background */
    .bg-sky {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background-color: #1e293b;
      /* Fallback color */
      background-image: url('./photo-1536514498073-50e69d39c6cf.avif');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      filter: grayscale(100%) contrast(1.1) brightness(1.1);
    }

    /* Затемняющий слой поверх фото для читаемости */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.4) 0%, rgba(15, 23, 42, 0.8) 100%);
      z-index: -1;
      backdrop-filter: blur(2px);
    }

    /* --- PREMIUM GLASS UTILS --- */
    .glass-panel {
      background: var(--glass-base);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      border-radius: 24px;
      /* Тонкий блик сверху */
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .glass-button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .glass-button:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.15);
    }

    .accent-button {
      background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
      color: white;
      border: none;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
      font-weight: 700;
    }

    .accent-button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
    }

    /* --- LAYOUT --- */
    #app-container {
      width: 100%;
      height: 100dvh;
      display: grid;
      grid-template-columns: 100%;
      grid-template-rows: auto auto 1fr auto auto auto;
      grid-template-areas:
        "header"
        "controls"
        "grid"
        "keypad"
        "actions"
        "message";
      /* Учитываем верхнюю планку Telegram */
      padding: max(44px, var(--safe-area-top)) 20px max(12px, var(--safe-area-bottom)) 20px;
      position: relative;
      z-index: 1;
      margin: 0 auto;
      gap: 12px;
      /* Allow expanding on wide screens while staying centered and square */
      max-width: min(95vw, 75vh);
      box-sizing: border-box;
    }

    .header-bar {
      grid-area: header;
      margin-bottom: 0 !important;
    }

    .controls-bar {
      grid-area: controls;
      margin-bottom: 0 !important;
    }

    .grid-wrapper {
      grid-area: grid;
      margin-bottom: 0 !important;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .keypad-container {
      grid-area: keypad;
      margin-bottom: 0 !important;
    }

    .actions-bar {
      grid-area: actions;
      margin-top: 0 !important;
    }

    #message {
      grid-area: message;
      margin-top: 0 !important;
    }

    /* For wider screens, make keypad 10 columns */
    @media (min-width: 450px) {
      .keypad-container {
        grid-template-columns: repeat(10, 1fr) !important;
      }
    }

    /* Header */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--accent-color);
      box-shadow: 0 0 15px var(--primary-glow);
      object-fit: cover;
    }

    .user-info div {
      line-height: 1.2;
    }

    #username {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    .stats-text {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-align: right;
      line-height: 1.5;
    }

    /* Controls */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      gap: 8px;
    }

    .select-wrapper {
      position: relative;
    }

    .select-styled {
      appearance: none;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 8px 32px 8px 16px;
      border-radius: 12px;
      font-family: var(--font-stack);
      font-weight: 600;
      font-size: 14px;
    }

    .timer-badge {
      font-family: 'Outfit', monospace;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 20px;
      color: #fff;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
    }

    /* --- GRID (Центральный элемент) --- */
    .grid-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      min-height: 0;
      /* Important for flex shrinking */
      margin-bottom: 12px;
      width: 100%;
    }

    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      background-color: rgba(0, 0, 0, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      overflow: hidden;
      /* Square grid - expands dynamically */
      width: 100%;
      height: auto;
      aspect-ratio: 1/1;
      max-height: 100%;
      max-width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      margin: 0 auto;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(14px, 4.5vmin, 28px);
      position: relative;
      cursor: pointer;
      border-right: 1px solid var(--cell-border);
      border-bottom: 1px solid var(--cell-border);
      transition: background 0.15s ease;
      min-height: 0;
      overflow: hidden;
    }

    /* Убираем внешние границы ячеек */
    .cell:nth-child(9n) {
      border-right: none;
    }

    .cell:nth-child(n+73) {
      border-bottom: none;
    }

    /* Жирные линии 3x3 (Светящиеся) */
    .cell:nth-child(3n) {
      border-right: 1px solid rgba(255, 255, 255, 0.3);
    }

    .cell:nth-child(9n) {
      border-right: none;
    }

    .cell:nth-child(n+19):nth-child(-n+27),
    .cell:nth-child(n+46):nth-child(-n+54) {
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* Состояния ячеек */
    .cell-content {
      z-index: 2;
      pointer-events: none;
    }

    .cell.given {
      color: #fff;
      font-weight: 800;
    }

    .cell.user-input {
      color: #7dd3fc;
      font-weight: 500;
      text-shadow: 0 0 8px rgba(125, 211, 252, 0.6);
    }

    .cell.error {
      color: #fb7185 !important;
      background: rgba(251, 113, 133, 0.15);
      animation: shake 0.4s;
    }

    .cell.highlight {
      background-color: rgba(56, 189, 248, 0.15);
    }

    .cell.area-highlight {
      background-color: rgba(255, 255, 255, 0.03);
    }

    .cell.active-cell {
      background-color: var(--cell-active-bg);
      box-shadow: inset 0 0 0 2px var(--accent-color);
    }

    .cell.hinted {
      background-color: rgba(255, 215, 0, 0.25);
      animation: flash 0.6s;
    }

    /* --- KEYPAD --- */
    .keypad-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      width: 100%;
      margin-bottom: auto;
    }

    @media (min-width: 380px) {
      .keypad-container {
        grid-template-columns: repeat(10, 1fr);
        gap: 8px;
      }
    }

    .num-btn {
      aspect-ratio: 1/1;
      border-radius: 14px;
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.03);
    }

    .num-btn.selected {
      background: var(--accent-color);
      color: #000;
      box-shadow: 0 0 15px var(--primary-glow);
      border-color: transparent;
    }

    .num-btn.disabled {
      opacity: 0.15;
      pointer-events: none;
    }

    /* --- BOTTOM ACTIONS --- */
    .actions-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
    }

    .action-btn {
      flex: 1;
      height: 56px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* --- MODALS & OVERLAYS --- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: rgba(10, 10, 12, 0.98);
      width: 90%;
      max-width: 400px;
      border-radius: 32px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 255, 255, 0.02);
      transform: scale(0.9) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-overlay.active .modal-card {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 26px;
      font-weight: 800;
      color: white;
    }

    .close-btn {
      font-size: 32px;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 0.8;
      transition: color 0.2s;
    }

    .close-btn:hover {
      color: white;
    }

    /* --- LEADERBOARD FIX --- */
    .rank-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .rank-row:last-child {
      border-bottom: none;
    }

    .rank-cell {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Medals */
    .rank-1 {
      background: linear-gradient(135deg, #FFD700 0%, #FDB931 100%);
      color: #4a3b00;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
      font-size: 16px;
    }

    .rank-2 {
      background: linear-gradient(135deg, #E0E0E0 0%, #BDBDBD 100%);
      color: #3d3d3d;
      box-shadow: 0 0 10px rgba(192, 192, 192, 0.4);
      font-size: 16px;
    }

    .rank-3 {
      background: linear-gradient(135deg, #CD7F32 0%, #A0522D 100%);
      color: #3d220b;
      box-shadow: 0 0 10px rgba(205, 127, 50, 0.4);
      font-size: 16px;
    }

    .player-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .player-name {
      font-weight: 600;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-date {
      font-size: 11px;
      color: var(--text-muted);
    }

    .player-score {
      font-weight: 800;
      color: var(--accent-color);
      font-feature-settings: 'tnum';
    }

    /* --- NEW LOADING SCREEN STYLES --- */
    .noise-overlay {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 5;
      mix-blend-mode: overlay;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.5;
      animation: float 15s infinite ease-in-out;
      will-change: transform;
    }

    .orb-1 {
      top: -20%;
      left: -10%;
      width: 80vw;
      height: 80vw;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, transparent 60%);
      animation-duration: 20s;
    }

    .orb-2 {
      bottom: -30%;
      right: -20%;
      width: 90vw;
      height: 90vw;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, transparent 60%);
      animation-duration: 25s;
      animation-delay: -5s;
    }

    .orb-3 {
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
      animation-duration: 18s;
      animation-delay: -10s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(30px, -50px) scale(1.05);
      }

      66% {
        transform: translate(-20px, 20px) scale(0.95);
      }
    }

    .loading-glass-panel {
      background: rgba(10, 10, 10, 0.4);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.5),
        0 20px 60px -10px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      transform-style: preserve-3d;
    }

    .logo-container {
      perspective: 2000px;
      transform-style: preserve-3d;
    }

    .logo-inner {
      transform-style: preserve-3d;
      transition: transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .sudoku-loading-cell {
      position: relative;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0.005) 100%);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.3);
      transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      transform-style: preserve-3d;
    }

    .sudoku-loading-cell::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 4px;
      border: 1px dashed rgba(255, 255, 255, 0.05);
      opacity: 0.5;
      transition: all 0.3s;
    }

    .sudoku-loading-cell.active {
      background: var(--accent-color);
      color: #000;
      border-color: var(--accent-color);
      box-shadow:
        0 0 40px rgba(56, 189, 248, 0.5),
        0 0 10px rgba(56, 189, 248, 0.8);
      transform: scale(1.05) translateZ(10px);
      z-index: 10;
    }

    .sudoku-loading-cell.active::before {
      border-style: solid;
      border-color: rgba(0, 0, 0, 0.1);
      inset: 2px;
    }

    .text-glow {
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
    }

    .shimmer-text {
      background: linear-gradient(90deg, #666 0%, #fff 50%, #666 100%);
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: textShimmer 4s linear infinite;
    }

    @keyframes textShimmer {
      to {
        background-position: 200% center;
      }
    }

    .loader-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
      height: 4px;
    }

    .loader-bar {
      background: var(--accent-color);
      border-radius: 999px;
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
      transition: width 0.1s linear;
    }

    .fade-in-up {
      animation: fadeInUp 1s var(--easing) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .spotlight-btn {
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      transition: transform 0.2s var(--easing);
    }

    .spotlight-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 255, 255, 0.15), transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .spotlight-btn:hover::before {
      opacity: 1;
    }

    .spotlight-btn:active {
      transform: scale(0.96);
    }

    .particle {
      position: absolute;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      animation: floatParticle 2s ease-out forwards;
    }

    @keyframes floatParticle {
      0% {
        transform: translate(0, 0) scale(0);
        opacity: 0;
      }

      20% {
        opacity: 0.6;
      }

      100% {
        transform: translate(var(--mx), var(--my)) scale(0);
        opacity: 0;
      }
    }

    /* Transitioning loader screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100dvh;
      background-color: #0f172a;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1);
      overflow: hidden;
    }

    .flash-overlay {
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      z-index: 100;
      pointer-events: none;
    }

    .flash-active {
      animation: flash-animation 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes flash-animation {
      0% {
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);

    function animateLoadingGrid() {
      const cells = document.querySelectorAll('.sudoku-loading-cell');
      let sequenceIndex = 0;
      const path = [0, 3, 6, 1, 4, 7, 2, 5, 8];
      gridAnimationInterval = setInterval(() => {
        const cellIdx = path[sequenceIndex];
        const cell = cells[cellIdx];
        if (cell) {
          activateLoadingCell(cell, sequenceIndex + 1);
        }
        sequenceIndex = (sequenceIndex + 1) % path.length;
      }, 150);

    function activateLoadingCell(cell, number) {
      cell.classList.add('active');

    function spawnParticle(element) {
      const rect = element.getBoundingClientRect();
      const particle = document.createElement('div');
      const size = Math.random() * 2 + 1;

      particle.style.height = size + 'px';
      particle.className = 'particle';
      const startX = rect.left + rect.width / 2;
      const startY = rect.top + rect.height / 2;
      particle.style.left = startX + 'px';
      particle.style.top = startY + 'px';
      const angle = Math.random() * Math.PI * 2;

    // --- WAVEFORM & TRIMMING ---
    async function showTrimEditor(blob) {
      if (previewSource) { try { previewSource.stop(); } catch (e) { } previewSource = null; }
      const arrayBuffer = await blob.arrayBuffer();
      originalAudioBuffer = await audioContext.decodeAudioData(arrayBuffer);

      el('trim-editor').classList.remove('hidden');
      el('trim-start').value = 0;
      el('trim-end').value = 1000;
      drawWaveform(originalAudioBuffer);
    }

    function updateTrimDuration() {
      if (!originalAudioBuffer) return;
      const s = parseInt(el('trim-start').value) / 1000;
      const e = parseInt(el('trim-end').value) / 1000;
      const dur = (e - s) * originalAudioBuffer.duration;
      el('trim-duration').textContent = dur.toFixed(2) + ' сек';
    }

    function drawWaveform(buffer) {
      if (!buffer) return;
      const canvas = el('waveform');
      const ctx = canvas.getContext('2d');
      const data = buffer.getChannelData(0);
      const step = Math.ceil(data.length / canvas.width);
      const amp = canvas.height / 2;

      const sPct = parseInt(el('trim-start').value) / 10;
      const ePct = parseInt(el('trim-end').value) / 10;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      updateTrimDuration();

      for (let i = 0; i < canvas.width; i++) {
        const curPct = (i / canvas.width) * 100;
        const isActive = curPct >= sPct && curPct <= ePct;

        ctx.fillStyle = isActive ? '#ffffff' : 'rgba(255, 255, 255, 0.2)';

        let min = 1.0, max = -1.0;
        for (let j = 0; j < step; j++) {
          const idx = (i * step) + j;
          if (idx >= data.length) break;
          const datum = data[idx];
          if (datum < min) min = datum;
          if (datum > max) max = datum;
        }
        ctx.fillRect(i, (1 + min) * amp, 1, Math.max(1, (max - min) * amp));
      }
    }

    async function saveTrimmedAudio() {
      if (previewSource) { try { previewSource.stop(); } catch (e) { } previewSource = null; }
      if (!originalAudioBuffer) return;

      const startPct = parseInt(el('trim-start').value) / 1000;
      const endPct = parseInt(el('trim-end').value) / 1000;

      const startOffset = Math.floor(startPct * originalAudioBuffer.length);
      const endOffset = Math.floor(endPct * originalAudioBuffer.length);
      const frameCount = Math.max(1, endOffset - startOffset);

      const trimmedBuffer = audioContext.createBuffer(
        originalAudioBuffer.numberOfChannels,
        frameCount,
        originalAudioBuffer.sampleRate
      );

      for (let i = 0; i < originalAudioBuffer.numberOfChannels; i++) {
        const data = originalAudioBuffer.getChannelData(i).slice(startOffset, endOffset);
        trimmedBuffer.copyToChannel(data, i);
      }

      const wavBlob = audioBufferToWav(trimmedBuffer);
      const reader = new FileReader();
      reader.onloadend = () => {
        const result = reader.result;
        localStorage.setItem('sudoku_custom_sound', result);
        clickSound.src = result;
        clickSound.load();
        el('trim-editor').classList.add('hidden');
        el('clear-sound-btn').classList.remove('hidden');
        el('test-sound-btn').classList.remove('hidden');
        el('recording-status').textContent = '✓ Звук сохранен!';
        el('recording-status').style.color = '#22c55e';
      };
      reader.readAsDataURL(wavBlob);
    }

    function audioBufferToWav(buffer) {
      const numOfChan = buffer.numberOfChannels,
        length = buffer.length * numOfChan * 2 + 44,
        bufferArr = new ArrayBuffer(length),
        view = new DataView(bufferArr);
      let channels = [], i, sample, offset = 0, pos = 0;

      function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
      function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

      setUint32(0x46464952); // "RIFF"
      setUint32(length - 8); // file length - 8
      setUint32(0x45564157); // "WAVE"
      setUint32(0x20746d66); // "fmt " chunk
      setUint32(16); // length = 16
      setUint16(1); // PCM (uncompressed)
      setUint16(numOfChan);
      setUint32(buffer.sampleRate);
      setUint32(buffer.sampleRate * 2 * numOfChan); // avg. bytes/sec
      setUint16(numOfChan * 2); // block-align
      setUint16(16); // 16-bit
      setUint32(0x61746164); // "data" - chunk
      setUint32(length - pos - 4); // chunk length

      for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

      while (pos < length) {
        for (i = 0; i < numOfChan; i++) {
          sample = Math.max(-1, Math.min(1, channels[i][offset]));
          sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
          view.setInt16(pos, sample, true);
          pos += 2;
        }
        offset++;
      }
      return new Blob([bufferArr], { type: 'audio/wav' });
    }

    function handleCellClick(r, c) {
      playSound();

      if (activeTool) {
        if (givenCells.has(`${r},${c}`)) return;

    function selectCell(r, c) {
      if (isGameFinished) return;
      clearHighlights();
      activeCell = [r, c];
      const cells = document.querySelectorAll('.cell');

      cells.forEach((cell, idx) => {
        const cr = Math.floor(idx / 9), cc = idx % 9;
        const sameRow = cr === r;
        const sameCol = cc === c;
        const sameBox = Math.floor(cr / 3) === Math.floor(r / 3) && Math.floor(cc / 3) === Math.floor(c / 3);
        if (sameRow || sameCol || sameBox) cell.classList.add('area-highlight');
      });

      cells[r * 9 + c].classList.add('active-cell');
      const val = grid[r][c];
      if (val !== 0 && highlightEnabled) highlightSimilar(val);
    }

    function selectTool(val) {
      if (isGameFinished) return;
      if (activeTool === val) activeTool = null;
      else activeTool = val;

      document.querySelectorAll('.num-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.val == activeTool);
      });

      activeCell = null;
      clearHighlights();
      if (activeTool && activeTool !== 'erase' && highlightEnabled) highlightSimilar(activeTool);
    }

    function highlightSimilar(val) {
      document.querySelectorAll('.cell').forEach((c, idx) => {
        const r = Math.floor(idx / 9), col = idx % 9;
        if (grid[r][col] === val) c.classList.add('highlight');
      });
    }

    function clearHighlights() {
      document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-cell', 'area-highlight', 'highlight'));
    }

    function performAction(val, r, c) {
      const prev = grid[r][c];
      if (prev === val) return;

      undoStack.push({ r, c, prev, val });
      grid[r][c] = val;

      const cell = document.querySelectorAll('.cell')[r * 9 + c];
      cell.querySelector('.cell-content').textContent = val === 0 ? '' : val;
      cell.classList.remove('error', 'hinted');
      cell.classList.toggle('user-input', val !== 0);

      updateUI();
      if (highlightEnabled) { clearHighlights(); if (val !== 0) highlightSimilar(val); }
    }

    function updateUI() {
      elements.undoBtn.disabled = undoStack.length === 0;
      el('hint-count-display').textContent = `${3 - hintCount}/3`;
      el('hint-button').disabled = hintCount >= 3;

      const counts = Array(10).fill(0);
      grid.flat().forEach(v => counts[v]++);
      document.querySelectorAll('.num-btn').forEach(btn => {
        const val = parseInt(btn.dataset.val);
        if (val && counts[val] >= 9) {
          btn.classList.add('disabled');
          if (activeTool === val) selectTool(null);
        } else {
          btn.classList.remove('disabled');
        }
      });
    }

    function undo() {
      playSound();
      if (!undoStack.length) return;
      const last = undoStack.pop();
      grid[last.r][last.c] = last.prev;
      const cell = document.querySelectorAll('.cell')[last.r * 9 + last.c];
      cell.querySelector('.cell-content').textContent = last.prev || '';
      cell.classList.remove('error');
      cell.classList.toggle('user-input', last.prev !== 0);
      updateUI();
      selectCell(last.r, last.c);
    }

    // --- GAME LOGIC ---
    function generatePuzzle(diff) {
      // Simple solver/generator for demo
      function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]] } }
      function solve(b) {
        for (let i = 0; i < 81; i++) {
          if (b[Math.floor(i / 9)][i % 9] === 0) {
            for (let n = 1; n <= 9; n++) {
              if (isValid(b, Math.floor(i / 9), i % 9, n)) {
                b[Math.floor(i / 9)][i % 9] = n;
                if (solve(b)) return true;
                b[Math.floor(i / 9)][i % 9] = 0;
              }
            }
            return false;
          }
        }
        return true;
      }
      function isValid(b, r, c, n) {
        for (let i = 0; i < 9; i++) if (b[r][i] === n || b[i][c] === n || b[3 * Math.floor(r / 3) + Math.floor(i / 3)][3 * Math.floor(c / 3) + i % 3] === n) return false;
        return true;
      }

      const base = Array(9).fill().map(() => Array(9).fill(0));
      const firstRow = [1, 2, 3, 4, 5, 6, 7, 8, 9]; shuffle(firstRow);
      base[0] = firstRow;
      solve(base);
      solution = base.map(r => [...r]);

      grid = base.map(r => [...r]);
      const attempts = { easy: 30, medium: 45, hard: 55 }[diff] || 30; // removed cells
      let removed = 0;
      while (removed < attempts) {
        let r = Math.floor(Math.random() * 9), c = Math.floor(Math.random() * 9);
        if (grid[r][c] !== 0) { grid[r][c] = 0; removed++; }
      }

      const cells = document.querySelectorAll('.cell');
      givenCells.clear();
      for (let i = 0; i < 81; i++) {
        const val = grid[Math.floor(i / 9)][i % 9];
        const cell = cells[i];
        cell.className = 'cell';
        cell.querySelector('.cell-content').textContent = val || '';
        if (val !== 0) {
          givenCells.add(`${Math.floor(i / 9)},${i % 9}`);
          cell.classList.add('given');
        }
      }
      updateUI();
    }

    function startGame() {
      isGameFinished = false;
      undoStack = [];
      hintCount = 0;
      clearInterval(timerInterval);
      startTime = Date.now();
      timerInterval = setInterval(() => {
        elements.timer.textContent = formatTime(Math.floor((Date.now() - startTime) / 1000));
      }, 1000);

      elements.checkBtn.disabled = false;
      elements.checkBtn.textContent = 'Готово';
      elements.message.textContent = '';

      createGrid();
      createKeypad();
      generatePuzzle(elements.difficulty.value);
      toggleModal('settings-modal', false);
    }

    function checkGame() {
      playSound();
      if (isGameFinished) return;

      let error = false;
      let full = true;

      const cells = document.querySelectorAll('.cell');
      cells.forEach((c, idx) => {
        const r = Math.floor(idx / 9), col = idx % 9;
        const val = grid[r][col];
        if (val === 0) full = false;
        else if (val !== solution[r][col]) {
          c.classList.add('error');
          error = true;
        }
      });

      if (error) elements.message.textContent = "Упс! Найдены ошибки.";
      else if (!full) elements.message.textContent = "Поле заполнено не полностью.";
      else {
        isGameFinished = true;
        clearInterval(timerInterval);
        const time = Math.floor((Date.now() - startTime) / 1000);
        const pts = calculatePoints(time, hintCount);
        saveWin(time, pts);
      }
    }

    function getHint() {
      playSound();
      if (hintCount >= 3 || isGameFinished) return;

      const candidates = [];
      for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) {
        if (!givenCells.has(`${r},${c}`) && grid[r][c] !== solution[r][c]) candidates.push([r, c]);
      }
      if (!candidates.length) return;

      hintCount++;
      const [r, c] = candidates[Math.floor(Math.random() * candidates.length)];
      performAction(solution[r][c], r, c);
      const cell = document.querySelectorAll('.cell')[r * 9 + c];
      cell.classList.add('hinted');
      updateUI();
    }

    function calculatePoints(time, hints) {
      const base = { easy: 100, medium: 250, hard: 500 }[elements.difficulty.value];
      return Math.max(10, base - (time / 2) - (hints * 50));
    }

    async function saveWin(time, pts) {
      currentUser.score += pts;
      elements.userScore.textContent = Math.floor(currentUser.score);
      const diff = elements.difficulty.value;

      let newRecord = false;
      if (!currentUser.bestTimes[diff] || time < currentUser.bestTimes[diff]) {
        currentUser.bestTimes[diff] = time;
        newRecord = true;
      }

      updateRecordDisplay();

      if (currentUser.id) {
        usersCollection.doc(currentUser.id).set({
          score: currentUser.score,
          bestTimes: currentUser.bestTimes,
          username: currentUser.username,
          avatar: currentUser.avatar
        }, { merge: true });

        recordsCollection.add({
          userId: currentUser.id,
          username: currentUser.username,
          avatar: currentUser.avatar,
          difficulty: diff,
          time: time,
          date: new Date().toISOString()
        });
      }

      el('win-modal-message').innerHTML = `Сложность: <b style="color:white">${getDiffName(diff)}</b><br>Время: <span style="font-feature-settings: 'tnum';">${formatTime(time)}</span><br>Счет: <span style="color:var(--accent-color)">+${Math.floor(pts)}</span>${newRecord ? '<br><br>🏆 <b>Новый рекорд!</b>' : ''}`;
      toggleModal('win-modal', true);
    }

    function updateRecordDisplay() {
      el('easy-record').textContent = formatTime(currentUser.bestTimes.easy);
      el('medium-record').textContent = formatTime(currentUser.bestTimes.medium);
      el('hard-record').textContent = formatTime(currentUser.bestTimes.hard);
    }

    // --- LEADERBOARD FIX ---
    async function loadLeaderboard() {
      const list = el('rating-list');
      list.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.6;">Загрузка...</div>';

      let query;
      if (currentRatingType === 'score') {
        query = usersCollection.orderBy('score', 'desc').limit(20);
      } else {
        query = recordsCollection.where('difficulty', '==', currentRatingDifficulty).orderBy('time', 'asc').limit(20);
      }

      try {
        const snap = await query.get();
        list.innerHTML = '';
        if (snap.empty) {
          list.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.6;">Нет записей</div>';
          return;
        }

        let rankCounter = 1;
        snap.forEach((doc) => {
          const d = doc.data();
          const username = d.username || 'Неизвестно';

          // Filter out guest and unknown users
          if (!username || username.toLowerCase() === 'guest' || username.toLowerCase() === 'гость' || username.toLowerCase() === 'unknown' || username.toLowerCase() === 'неизвестно') {
            return;
          }

          const rank = rankCounter++;
          if (rank > 20) return; // Limit to 20 actual users

          let rankClass = "rank-cell";
          let rankContent = rank;
          if (rank === 1) { rankClass += " rank-1"; }
          if (rank === 2) { rankClass += " rank-2"; }
          if (rank === 3) { rankClass += " rank-3"; }

          const row = document.createElement('div');
          row.className = 'rank-row';

          row.innerHTML = `
            <div class="${rankClass}">${rankContent}</div>
            <img src="${d.avatar || 'https://cdn-icons-png.flaticon.com/512/847/847969.png'}" style="width:36px; height:36px; border-radius:50%; border:1px solid rgba(255,255,255,0.2);">
            <div class="player-info">
              <div class="player-name">${username}</div>
            </div>
            <div class="player-score">${currentRatingType === 'score' ? Math.floor(d.score) : formatTime(d.time)}</div>
          `;
          list.appendChild(row);
        });
      } catch (e) { list.textContent = "Ошибка загрузки данных"; console.error(e); }
    }

    // --- INIT ---
    document.addEventListener('DOMContentLoaded', () => {
      elements.newGameBtn.onclick = startGame;
      elements.checkBtn.onclick = checkGame;
      elements.hintBtn.onclick = getHint;
      elements.undoBtn.onclick = undo;
      el('settings-button').onclick = () => toggleModal('settings-modal', true);
      el('rating-button').onclick = () => { toggleModal('rating-modal', true); loadLeaderboard(); };
      el('win-modal-close-btn').onclick = () => toggleModal('win-modal', false);

      document.querySelectorAll('.close-btn').forEach(b => {
        b.onclick = () => toggleModal(b.dataset.target, false);
      });
      document.querySelectorAll('.modal-overlay').forEach(o => {
        o.onclick = (e) => { if (e.target === o) toggleModal(o.id, false); };
      });

      el('sound-toggle').onclick = (e) => {
        isSoundEnabled = !isSoundEnabled;
        e.target.textContent = isSoundEnabled ? "ВКЛ" : "ВЫКЛ";
      };
      el('highlightToggle').onclick = (e) => {
        highlightEnabled = !highlightEnabled;
        e.target.textContent = highlightEnabled ? "ВКЛ" : "ВЫКЛ";
        if (!highlightEnabled) clearHighlights();
      };

      // Custom sound recording handlers
      el('record-sound-btn').onclick = startRecording;
      el('upload-sound-btn').onclick = () => el('audio-upload').click();
      el('audio-upload').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          showTrimEditor(file);
          el('recording-status').textContent = 'Файл загружен. Обрежьте его ниже:';

          // Auto-enable sound if off
          if (!isSoundEnabled) {
            isSoundEnabled = true;
            el('sound-toggle').textContent = "ВКЛ";
          }
        }
      };
      el('clear-sound-btn').onclick = clearCustomSound;
      el('save-trim-btn').onclick = saveTrimmedAudio;

      const sSlider = el('trim-start');
      const eSlider = el('trim-end');
      sSlider.oninput = () => {
        if (parseInt(sSlider.value) >= parseInt(eSlider.value)) sSlider.value = eSlider.value - 1;
        drawWaveform(originalAudioBuffer);
      };
      eSlider.oninput = () => {
        if (parseInt(eSlider.value) <= parseInt(sSlider.value)) eSlider.value = parseInt(sSlider.value) + 1;
        drawWaveform(originalAudioBuffer);
      };

      el('cancel-trim-btn').onclick = () => {
        if (previewSource) { try { previewSource.stop(); } catch (e) { } previewSource = null; }
        el('trim-editor').classList.add('hidden');
        el('recording-status').textContent = 'Обрезка отменена.';
      };
      el('test-sound-btn').onclick = () => {
        clickSound.currentTime = 0;
        clickSound.play().catch(() => { });
      };

      el('preview-trim-btn').onclick = () => {
        if (!originalAudioBuffer) return;

        if (previewSource) {
          try { previewSource.stop(); } catch (e) { }
        }

        const startPct = parseInt(el('trim-start').value) / 1000;
        const endPct = parseInt(el('trim-end').value) / 1000;
        const duration = originalAudioBuffer.duration;

        previewSource = audioContext.createBufferSource();
        previewSource.buffer = originalAudioBuffer;
        previewSource.connect(audioContext.destination);
        previewSource.start(0, startPct * duration, (endPct - startPct) * duration);
        previewSource.onended = () => { previewSource = null; };
      };

      // Load custom sound on startup
      loadCustomSound();

      document.querySelectorAll('.rating-tab').forEach(t => {
        t.onclick = () => {
          currentRatingType = t.dataset.type;
          document.querySelectorAll('.rating-tab').forEach(x => { x.classList.remove('active'); x.style.background = 'transparent'; x.style.color = 'var(--text-muted)'; });
          t.classList.add('active');
          t.style.background = 'rgba(255,255,255,0.1)';
          t.style.color = 'white';
          el('difficulty-tabs').classList.toggle('hidden', currentRatingType !== 'time');
          loadLeaderboard();
        }
      });
      document.querySelectorAll('.diff-tab').forEach(t => {
        t.onclick = () => {
          currentRatingDifficulty = t.dataset.d;
          document.querySelectorAll('.diff-tab').forEach(x => { x.classList.remove('active'); x.style.background = 'rgba(255,255,255,0.05)'; });
          t.classList.add('active');
          t.style.background = 'var(--accent-color)';
          loadLeaderboard();
        }
      });

      // Default active tab styles
      document.querySelector('.rating-tab.active').style.background = 'rgba(255,255,255,0.1)';
      document.querySelector('.rating-tab.active').style.color = 'white';

      initUser();
      // Game starts after login button click
    });
  </script>
</body>

</html>
