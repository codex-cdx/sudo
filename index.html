<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sudoku Premium Sky</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    /* --- Шрифты и База --- */
    :root {
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);
    }

    body {
      font-family: var(--font-stack);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background-color: #0f172a;
      color: #fff;
      transition: background 0.5s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- ЖИВОЕ НЕБО (Анимация) --- */
    @keyframes skyAnim {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Базовая тема (Dark Sky) */
    body[data-theme="darkGlass"] {
      /* Глубокий градиент неба */
      background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #243b55);
      background-size: 400% 400%;
      animation: skyAnim 20s ease infinite;

      --glass-bg: rgba(20, 30, 40, 0.55);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shine: rgba(255, 255, 255, 0.03);
      
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      
      --primary-accent: #38bdf8; /* Sky Blue */
      --primary-hover: #0ea5e9;
      
      --cell-bg: rgba(255, 255, 255, 0.03);
      --grid-line: rgba(255, 255, 255, 0.12);
      
      --highlight-bg: rgba(56, 189, 248, 0.2);
      --highlight-text: #ffffff;
      --active-cell-bg: rgba(56, 189, 248, 0.35);
      
      --error-text: #fb7185;
      --given-text: #ffffff;
      --user-text: #7dd3fc;
      
      --area-highlight: rgba(255, 255, 255, 0.05);
      --modal-bg: rgba(15, 23, 42, 0.9);
    }

    /* Light Sky */
    body[data-theme="lightGlass"] {
      background: linear-gradient(-45deg, #e0c3fc, #8ec5fc, #e0c3fc);
      background-size: 400% 400%;
      animation: skyAnim 15s ease infinite;

      --glass-bg: rgba(255, 255, 255, 0.45);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shine: rgba(255, 255, 255, 0.4);

      --text-main: #1e293b;
      --text-muted: #64748b;
      
      --primary-accent: #2563eb;
      --primary-hover: #1d4ed8;
      
      --cell-bg: rgba(255, 255, 255, 0.3);
      --grid-line: rgba(0, 0, 0, 0.08);
      
      --highlight-bg: rgba(37, 99, 235, 0.15);
      --highlight-text: #0f172a;
      --active-cell-bg: rgba(37, 99, 235, 0.25);
      
      --error-text: #ef4444;
      --given-text: #0f172a;
      --user-text: #2563eb;
      
      --area-highlight: rgba(0, 0, 0, 0.03);
      --modal-bg: rgba(248, 250, 252, 0.9);
    }

    /* Midnight (Deep Purple) */
    body[data-theme="midnight"] {
      background: linear-gradient(-45deg, #240b36, #c31432, #240b36);
      background-size: 400% 400%;
      animation: skyAnim 25s ease infinite;

      --glass-bg: rgba(20, 5, 30, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shine: rgba(255, 255, 255, 0.05);

      --text-main: #f8fafc;
      --text-muted: #cbd5e1;
      
      --primary-accent: #f472b6;
      --primary-hover: #ec4899;
      
      --cell-bg: rgba(0, 0, 0, 0.2);
      --grid-line: rgba(255, 255, 255, 0.15);
      
      --highlight-bg: rgba(244, 114, 182, 0.2);
      --highlight-text: #ffffff;
      --active-cell-bg: rgba(244, 114, 182, 0.4);
      
      --error-text: #fb7185;
      --given-text: #ffffff;
      --user-text: #fbcfe8;
      
      --area-highlight: rgba(255, 255, 255, 0.05);
      --modal-bg: rgba(30, 10, 40, 0.95);
    }

    /* --- PREMIUM GLASS UTILS --- */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
      /* Внутреннее свечение для объема */
      background-image: linear-gradient(145deg, var(--glass-shine) 0%, transparent 100%);
    }

    .glass-button {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }
    
    /* Эффект блика при нажатии */
    .glass-button::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .glass-button:active {
      transform: scale(0.96);
      background: rgba(255, 255, 255, 0.15);
    }
    .glass-button:active::after { opacity: 1; }

    .accent-button {
      background: var(--primary-accent);
      color: white; /* Всегда белый на акценте */
      border: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2), 0 0 20px var(--primary-accent); /* Glow */
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .accent-button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    /* --- LAYOUT --- */
    #app-container {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: max(12px, var(--safe-area-top)) 20px max(20px, var(--safe-area-bottom)) 20px;
      box-sizing: border-box;
      position: relative;
    }

    /* Header */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px 16px;
      border-radius: 20px;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .avatar-img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--primary-accent);
      object-fit: cover;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* Controls Bar */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 10px;
    }

    .select-styled {
      appearance: none;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      color: var(--text-main);
      border: 1px solid var(--glass-border);
      padding: 8px 16px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      outline: none;
      text-align: center;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      cursor: pointer;
    }

    .timer-badge {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 18px;
      color: var(--text-main);
      padding: 8px 16px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      min-width: 80px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    /* --- GRID --- */
    .grid-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
      flex-shrink: 0; 
    }

    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 0; /* Remove gap, handle borders via CSS */
      background-color: transparent;
      border: 2px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      aspect-ratio: 1 / 1; 
      max-height: 55vh;
      max-width: 55vh;
      box-shadow: 0 20px 50px -12px rgba(0,0,0,0.3); /* Big shadow */
      position: relative;
    }

    .cell {
      background-color: var(--cell-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(18px, 5.5vw, 26px);
      position: relative;
      cursor: pointer;
      border-right: 1px solid var(--grid-line);
      border-bottom: 1px solid var(--grid-line);
      transition: background 0.1s;
      /* Prevent text selection */
      -webkit-touch-callout: none;
    }

    /* Remove outer borders of cells */
    .cell:nth-child(9n) { border-right: none; }
    .cell:nth-child(n+73) { border-bottom: none; }

    /* Толстые линии для 3x3 блоков */
    .cell:nth-child(3n) { border-right: 1px solid rgba(255,255,255,0.3); } 
    .cell:nth-child(9n) { border-right: none; }
    .cell:nth-child(n+19):nth-child(-n+27),
    .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 1px solid rgba(255,255,255,0.3); }

    /* Override colors for Light Theme grid lines */
    body[data-theme="lightGlass"] .cell:nth-child(3n) { border-right: 1px solid rgba(0,0,0,0.2); }
    body[data-theme="lightGlass"] .cell:nth-child(9n) { border-right: none; }
    body[data-theme="lightGlass"] .cell:nth-child(n+19):nth-child(-n+27),
    body[data-theme="lightGlass"] .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 1px solid rgba(0,0,0,0.2); }

    /* Cell States */
    .cell-content { font-weight: 500; z-index: 2; pointer-events: none; }
    .cell.given { color: var(--given-text); font-weight: 700; }
    .cell.user-input { color: var(--user-text); text-shadow: 0 0 10px var(--primary-accent); }
    .cell.error { color: var(--error-text) !important; animation: shake 0.4s; }
    .cell.highlight { background-color: var(--highlight-bg); }
    .cell.area-highlight { background-color: var(--area-highlight); }
    .cell.active-cell { 
      background-color: var(--active-cell-bg); 
      box-shadow: inset 0 0 0 2px var(--primary-accent);
    }
    .cell.hinted { animation: flash 0.5s; background-color: rgba(255, 215, 0, 0.3); }

    /* --- KEYPAD --- */
    .keypad-container {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 8px;
      width: 100%;
      margin-bottom: 12px;
    }
    
    @media (max-width: 380px) {
      .keypad-container { grid-template-columns: repeat(5, 1fr); gap: 10px; }
    }

    .num-btn {
      aspect-ratio: 1/1;
      border-radius: 12px;
      font-size: 22px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .num-btn.selected {
      background: var(--primary-accent);
      color: white;
      border-color: transparent;
      box-shadow: 0 0 15px var(--primary-accent);
    }
    
    .num-btn.disabled { opacity: 0.2; pointer-events: none; }

    /* --- ACTIONS --- */
    .actions-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
      padding-top: 10px;
    }
    
    .action-btn {
      flex: 1;
      height: 52px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* --- MODALS --- */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px); /* Сильный блюр фона */
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    
    .modal-card {
      background: var(--modal-bg);
      width: 90%;
      max-width: 400px;
      border-radius: 30px;
      padding: 24px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      transform: scale(0.95) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-height: 85vh;
      overflow-y: auto;
      color: var(--text-main);
    }
    .modal-overlay.active .modal-card { transform: scale(1) translateY(0); }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .close-btn { font-size: 28px; cursor: pointer; color: var(--text-muted); line-height: 1; }

    /* Leaderboard Fix Styling */
    .rank-cell { width: 30px; text-align: center; font-weight: bold; }
    .rank-1 { color: #FFD700; font-size: 1.2em; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    .rank-2 { color: #C0C0C0; font-size: 1.1em; }
    .rank-3 { color: #CD7F32; font-size: 1.1em; }
    .rank-row { 
      display: flex; align-items: center; gap: 12px; padding: 12px 0; 
      border-bottom: 1px solid var(--grid-line); 
    }
    
    /* Animations */
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    @keyframes flash { 0% { background: var(--primary-accent); } 100% { background: transparent; } }

    /* Loader */
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0f172a;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.6s ease;
    }
    .loader {
      width: 50px; height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: var(--primary-accent);
      border-radius: 50%;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Helper Classes */
    .hidden { display: none !important; }
    
    /* Theme Options */
    .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .theme-option { 
      height: 45px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; 
      display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .theme-option.active-theme { border-color: var(--primary-accent); transform: scale(1.05); }

  </style>
</head>
<body data-theme="darkGlass">

  <div id="loading-screen">
    <div class="loader"></div>
    <div style="margin-top: 24px; font-weight: 600; font-size: 18px; color: white; letter-spacing: 0.5px;">SUDOKU PREMIUM</div>
  </div>

  <div id="app-container">
    
    <div class="header-bar glass-panel">
      <div class="user-pill">
        <img id="user-avatar" src="" class="avatar-img" alt="Avatar">
        <div>
          <div id="username" style="font-weight: 800; font-size: 15px; letter-spacing: -0.3px;">Guest</div>
          <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">Score: <span id="user-score" style="color: var(--primary-accent); font-weight: 700;">0</span></div>
        </div>
      </div>
      <div style="text-align: right; font-size: 11px; color: var(--text-muted); font-weight: 500; line-height: 1.4;">
        <div>Easy: <span id="easy-record" style="color:var(--text-main)">--:--</span></div>
        <div>Med: <span id="medium-record" style="color:var(--text-main)">--:--</span></div>
        <div>Hard: <span id="hard-record" style="color:var(--text-main)">--:--</span></div>
      </div>
    </div>

    <div class="controls-bar">
      <select id="difficulty" class="select-styled">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>

      <div class="timer-badge" id="timer">00:00</div>
      
      <div style="display:flex; gap: 8px;">
        <button id="settings-button" class="icon-btn glass-button"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
        <button id="rating-button" class="icon-btn glass-button"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg></button>
      </div>
    </div>

    <div class="grid-wrapper">
      <div id="grid" class="sudoku-grid glass-panel"></div>
    </div>

    <div id="number-row" class="keypad-container">
      </div>

    <div class="actions-bar">
      <button id="undo-button" class="action-btn glass-button" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14L4 9l5-5"/><path d="M4 9h10c4.418 0 8 3.582 8 8"/></svg>
        Undo
      </button>
      <button id="hint-button" class="action-btn glass-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/><path d="M9 21h6"/></svg>
        <span id="hint-count-display">3/3</span>
      </button>
      <button id="check" class="action-btn accent-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Done
      </button>
    </div>
    
    <div id="message" style="text-align: center; height: 24px; font-size: 15px; margin-top: 10px; font-weight: 600; color: var(--error-text);"></div>

  </div>

  <div id="settings-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">Settings</div>
        <div class="close-btn" data-target="settings-modal">&times;</div>
      </div>
      
      <div style="margin-bottom: 24px;">
        <p style="margin-bottom: 12px; font-weight: 700; color: var(--text-muted); font-size: 13px; text-transform: uppercase;">Appearance</p>
        <div class="theme-grid">
          <div class="theme-option glass-button" data-theme="darkGlass" style="background: linear-gradient(135deg, #1e293b, #0f172a); color:white;">Sky Dark</div>
          <div class="theme-option glass-button" data-theme="lightGlass" style="background: linear-gradient(135deg, #f8fafc, #e2e8f0); color:#0f172a;">Sky Light</div>
          <div class="theme-option glass-button" data-theme="midnight" style="background: linear-gradient(135deg, #3b0764, #240b36); color:#f0abfc;">Midnight</div>
        </div>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-top: 1px solid var(--grid-line);">
        <span style="font-weight: 500;">Sound Effects</span>
        <button id="sound-toggle" class="glass-button" style="padding: 6px 18px; border-radius: 20px; font-size: 12px; font-weight: 700;">ON</button>
      </div>
      
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-top: 1px solid var(--grid-line); border-bottom: 1px solid var(--grid-line); margin-bottom: 24px;">
        <span style="font-weight: 500;">Highlight Digits</span>
        <button id="highlightToggle" class="glass-button" style="padding: 6px 18px; border-radius: 20px; font-size: 12px; font-weight: 700;">ON</button>
      </div>

      <div style="display: flex; flex-direction: column; gap: 12px;">
         <button id="tutorial-button" class="glass-button" style="width:100%; padding: 14px; border-radius: 14px; font-weight: 600;">How to Play</button>
         <button id="recent-games-button" class="glass-button" style="width:100%; padding: 14px; border-radius: 14px; font-weight: 600;">History</button>
         <button id="newGame" class="accent-button" style="width:100%; padding: 16px; border-radius: 16px; margin-top: 8px; font-weight: 700; font-size: 16px;">New Game</button>
      </div>
    </div>
  </div>

  <div id="rating-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">Leaderboard</div>
        <div class="close-btn" data-target="rating-modal">&times;</div>
      </div>
      <div style="display: flex; gap: 8px; margin-bottom: 20px; padding: 4px; background: rgba(0,0,0,0.2); border-radius: 14px;">
        <button class="glass-button rating-tab active" data-type="score" style="flex:1; border-radius:10px; padding: 8px; border:none; background:transparent;">Score</button>
        <button class="glass-button rating-tab" data-type="time" style="flex:1; border-radius:10px; padding: 8px; border:none; background:transparent;">Time</button>
      </div>
      <div id="difficulty-tabs" class="hidden" style="display: flex; gap: 8px; margin-bottom: 15px;">
        <button class="glass-button diff-tab active" data-d="easy" style="flex:1; font-size: 12px; padding: 6px; border-radius: 8px;">Easy</button>
        <button class="glass-button diff-tab" data-d="medium" style="flex:1; font-size: 12px; padding: 6px; border-radius: 8px;">Med</button>
        <button class="glass-button diff-tab" data-d="hard" style="flex:1; font-size: 12px; padding: 6px; border-radius: 8px;">Hard</button>
      </div>
      <div id="rating-list" style="max-height: 400px; overflow-y: auto; font-size: 15px;"></div>
    </div>
  </div>
  
  <div id="recent-games-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header"><div class="modal-title">History</div><div class="close-btn" data-target="recent-games-modal">&times;</div></div>
      <div id="recent-games-list" style="text-align: center; color: var(--text-muted);">No recent games found.</div>
    </div>
  </div>

  <div id="tutorial-modal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header"><div class="modal-title" id="tutorial-title">Basics</div><div class="close-btn" data-target="tutorial-modal">&times;</div></div>
      <div id="tutorial-grid" class="sudoku-grid" style="width: 200px; margin: 0 auto; pointer-events: none; transform: scale(0.8);"></div>
      <p id="tutorial-text" style="text-align: center; margin: 20px 0; min-height: 40px; line-height: 1.5;"></p>
      <div style="display:flex; justify-content: space-between;">
        <button id="tutorial-prev" class="glass-button" style="padding: 10px 20px; border-radius: 12px;">Back</button>
        <span id="tutorial-step-indicator" style="font-size: 12px; opacity: 0.7; align-self: center;"></span>
        <button id="tutorial-next" class="accent-button" style="padding: 10px 20px; border-radius: 12px;">Next</button>
      </div>
    </div>
  </div>

  <div id="win-modal" class="modal-overlay">
    <div class="modal-card" style="text-align: center; padding-top: 40px;">
      <div style="font-size: 60px; margin-bottom: 10px;">🏆</div>
      <h2 style="color: var(--primary-accent); font-size: 32px; margin: 0 0 10px 0; font-weight: 800;">Victory!</h2>
      <p id="win-modal-message" style="margin-bottom: 30px; line-height: 1.6; font-size: 16px; color: var(--text-muted);"></p>
      <button id="win-modal-close-btn" class="accent-button" style="width: 100%; padding: 16px; border-radius: 16px; font-size: 18px; font-weight: 700;">Awesome!</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

  <script>
    /* --- LOGIC --- */
    const firebaseConfig = { apiKey: "AIzaSyBkYQ7tRMrZ-mghBnkJ_EvuzHpjs_p8hOY", authDomain: "sudo-9fbfc.firebaseapp.com", projectId: "sudo-9fbfc", storageBucket: "sudo-9fbfc.appspot.com", messagingSenderId: "927814106972", appId: "1:927814106972:web:71e0773453f9d16f598b99" };
    
    try { firebase.initializeApp(firebaseConfig); } catch(e){ console.error(e); }
    const db = firebase.firestore();
    const auth = firebase.auth();
    const usersCollection = db.collection('users');
    const recordsCollection = db.collection('timeRecords');

    let grid = [], solution = [], givenCells = new Set(), timerInterval, startTime=0;
    let activeCell = null, activeTool = null, highlightEnabled = true, undoStack = [];
    let hintCount = 0, isGameFinished = false, isSoundEnabled = true;
    let currentUser = { id: null, username: 'Guest', avatar: 'https://t.me/i/userpic/320/default.jpg', score: 0, bestTimes: { easy: null, medium: null, hard: null } };
    let currentRatingType = 'score', currentRatingDifficulty = 'easy';

    const el = (id) => document.getElementById(id);
    const elements = {
      grid: el('grid'), numberRow: el('number-row'), difficulty: el('difficulty'),
      newGameBtn: el('newGame'), checkBtn: el('check'), undoBtn: el('undo-button'),
      hintBtn: el('hint-button'), timer: el('timer'), message: el('message'),
      userAvatar: el('user-avatar'), username: el('username'), userScore: el('user-score'),
      loadingScreen: el('loading-screen'), winModal: el('win-modal'),
      settingsModal: el('settings-modal'), ratingModal: el('rating-modal'),
      recentModal: el('recent-games-modal'), tutorialModal: el('tutorial-modal')
    };

    const clickSound = new Audio('https://github.com/codex-cdx/sudo/raw/refs/heads/main/%D0%9F%D0%BB%D0%B0%D0%BC%D0%B1.mp3');
    function playSound() { if(isSoundEnabled) { clickSound.currentTime = 0; clickSound.play().catch(()=>{}); } }

    function formatTime(s) { if(s==null) return '--:--'; return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
    
    function toggleModal(modalId, show) { 
      const m = el(modalId); 
      if(show) { m.classList.remove('hidden'); requestAnimationFrame(()=>m.classList.add('active')); }
      else { m.classList.remove('active'); setTimeout(()=>m.classList.add('hidden'), 300); }
    }

    // --- GRID ---
    function createGrid() {
      // CSS handles grid lines now, no need for extra divs
      elements.grid.innerHTML = '';
      grid = Array(9).fill().map(()=>Array(9).fill(0));
      givenCells.clear();
      for(let i=0; i<81; i++) {
        const d = document.createElement('div');
        d.className = 'cell';
        d.dataset.idx = i;
        const span = document.createElement('span');
        span.className = 'cell-content';
        d.appendChild(span);
        d.addEventListener('click', (e) => { e.stopPropagation(); handleCellClick(Math.floor(i/9), i%9); });
        elements.grid.appendChild(d);
      }
    }

    function createKeypad() {
      elements.numberRow.innerHTML = '';
      for(let i=1; i<=9; i++) {
        const btn = document.createElement('button');
        btn.className = 'num-btn glass-button';
        btn.textContent = i;
        btn.dataset.val = i;
        btn.onclick = () => { playSound(); selectTool(i); };
        elements.numberRow.appendChild(btn);
      }
      const eraseBtn = document.createElement('button');
      eraseBtn.className = 'num-btn glass-button';
      eraseBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13v-16z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>';
      eraseBtn.dataset.val = 'erase';
      eraseBtn.onclick = () => { playSound(); selectTool('erase'); };
      elements.numberRow.appendChild(eraseBtn);
    }

    // --- GAMEPLAY ---
    function handleCellClick(r, c) {
      playSound();
      if(isGameFinished) return;
      if(activeTool) {
        const cellVal = grid[r][c];
        if(givenCells.has(`${r},${c}`)) return; 
        if(activeTool === 'erase') performAction(0, r, c);
        else performAction(activeTool, r, c);
      } else {
        selectCell(r, c);
      }
    }

    function selectCell(r, c) {
      if(isGameFinished) return;
      clearHighlights();
      activeCell = [r, c];
      const cells = document.querySelectorAll('.cell');
      
      cells.forEach((cell, idx) => {
        const cr = Math.floor(idx/9), cc = idx%9;
        const sameRow = cr === r;
        const sameCol = cc === c;
        const sameBox = Math.floor(cr/3) === Math.floor(r/3) && Math.floor(cc/3) === Math.floor(c/3);
        if(sameRow || sameCol || sameBox) cell.classList.add('area-highlight');
      });

      const target = cells[r*9+c];
      target.classList.add('active-cell');

      const val = grid[r][c];
      if(val !== 0 && highlightEnabled) highlightSimilar(val);
    }

    function selectTool(val) {
      if(isGameFinished) return;
      if(activeTool === val) activeTool = null; 
      else activeTool = val;
      
      document.querySelectorAll('.num-btn').forEach(b => {
        b.classList.toggle('selected', b.dataset.val == activeTool);
      });

      activeCell = null;
      clearHighlights();
      if(activeTool && activeTool !== 'erase' && highlightEnabled) highlightSimilar(activeTool);
    }

    function highlightSimilar(val) {
      document.querySelectorAll('.cell').forEach((c, idx) => {
        const r = Math.floor(idx/9), col = idx%9;
        if(grid[r][col] === val) c.classList.add('highlight');
      });
    }

    function clearHighlights() {
      document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-cell', 'area-highlight', 'highlight'));
    }

    function performAction(val, r, c) {
      const prev = grid[r][c];
      if(prev === val) return;
      
      undoStack.push({r, c, prev, val});
      grid[r][c] = val;
      
      const cell = document.querySelectorAll('.cell')[r*9+c];
      cell.querySelector('.cell-content').textContent = val === 0 ? '' : val;
      cell.classList.remove('error', 'hinted');
      cell.classList.toggle('user-input', val !== 0);
      
      updateUI();
      if(highlightEnabled) { clearHighlights(); if(val!==0) highlightSimilar(val); }
    }

    function updateUI() {
      elements.undoBtn.disabled = undoStack.length === 0;
      el('hint-count-display').textContent = `${3-hintCount}/3`;
      el('hint-button').disabled = hintCount >= 3;
      
      const counts = Array(10).fill(0);
      grid.flat().forEach(v => counts[v]++);
      document.querySelectorAll('.num-btn').forEach(btn => {
         const val = parseInt(btn.dataset.val);
         if(val && counts[val] >= 9) {
             btn.classList.add('disabled');
             if(activeTool === val) selectTool(null);
         } else {
             btn.classList.remove('disabled');
         }
      });
    }

    function undo() {
      playSound();
      if(!undoStack.length) return;
      const last = undoStack.pop();
      grid[last.r][last.c] = last.prev;
      const cell = document.querySelectorAll('.cell')[last.r*9+last.c];
      cell.querySelector('.cell-content').textContent = last.prev || '';
      cell.classList.remove('error');
      cell.classList.toggle('user-input', last.prev !== 0);
      updateUI();
      selectCell(last.r, last.c);
    }

    // --- GENERATOR ---
    function generatePuzzle(diff) {
      function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} }
      function solve(b) {
        for(let i=0;i<81;i++){
          if(b[Math.floor(i/9)][i%9]===0){
             for(let n=1;n<=9;n++){
               if(isValid(b,Math.floor(i/9),i%9,n)){
                 b[Math.floor(i/9)][i%9]=n;
                 if(solve(b))return true;
                 b[Math.floor(i/9)][i%9]=0;
               }
             }
             return false;
          }
        }
        return true;
      }
      function isValid(b,r,c,n){
        for(let i=0;i<9;i++) if(b[r][i]===n||b[i][c]===n||b[3*Math.floor(r/3)+Math.floor(i/3)][3*Math.floor(c/3)+i%3]===n)return false;
        return true;
      }
      
      const base = Array(9).fill().map(()=>Array(9).fill(0));
      const firstRow = [1,2,3,4,5,6,7,8,9]; shuffle(firstRow);
      base[0] = firstRow;
      solve(base);
      solution = base.map(r=>[...r]);

      grid = base.map(r=>[...r]);
      const attempts = {easy:40, medium:50, hard:60}[diff] || 40;
      let removed = 0;
      while(removed < attempts) {
        let r=Math.floor(Math.random()*9), c=Math.floor(Math.random()*9);
        if(grid[r][c]!==0) { grid[r][c]=0; removed++; }
      }
      
      const cells = document.querySelectorAll('.cell');
      givenCells.clear();
      for(let i=0; i<81; i++) {
        const val = grid[Math.floor(i/9)][i%9];
        const cell = cells[i];
        cell.className = 'cell';
        cell.querySelector('.cell-content').textContent = val || '';
        if(val!==0) {
          givenCells.add(`${Math.floor(i/9)},${i%9}`);
          cell.classList.add('given');
        }
      }
      updateUI();
    }

    // --- CTRL ---
    function startGame() {
      isGameFinished = false;
      undoStack = [];
      hintCount = 0;
      clearInterval(timerInterval);
      startTime = Date.now();
      timerInterval = setInterval(() => {
        elements.timer.textContent = formatTime(Math.floor((Date.now()-startTime)/1000));
      }, 1000);
      
      elements.checkBtn.disabled = false;
      elements.checkBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Done';
      elements.message.textContent = '';
      
      createGrid();
      createKeypad();
      generatePuzzle(elements.difficulty.value);
      toggleModal('settings-modal', false);
    }

    function checkGame() {
      playSound();
      if(isGameFinished) return;
      
      let error = false;
      let full = true;
      
      const cells = document.querySelectorAll('.cell');
      cells.forEach((c, idx) => {
        const r = Math.floor(idx/9), col = idx%9;
        const val = grid[r][col];
        if(val === 0) full = false;
        else if(val !== solution[r][col]) {
           c.classList.add('error');
           error = true;
        }
      });

      if(error) elements.message.textContent = "Oops! Mistakes found.";
      else if(!full) elements.message.textContent = "Board not full.";
      else {
        isGameFinished = true;
        clearInterval(timerInterval);
        const time = Math.floor((Date.now()-startTime)/1000);
        const pts = calculatePoints(time, hintCount);
        saveWin(time, pts);
      }
    }

    function getHint() {
      playSound();
      if(hintCount >= 3 || isGameFinished) return;
      
      const candidates = [];
      for(let r=0;r<9;r++) for(let c=0;c<9;c++) {
        if(!givenCells.has(`${r},${c}`) && grid[r][c] !== solution[r][c]) candidates.push([r,c]);
      }
      if(!candidates.length) return;
      
      hintCount++;
      const [r,c] = candidates[Math.floor(Math.random()*candidates.length)];
      performAction(solution[r][c], r, c);
      const cell = document.querySelectorAll('.cell')[r*9+c];
      cell.classList.add('hinted');
      updateUI();
    }

    function calculatePoints(time, hints) {
      const base = {easy:100, medium:250, hard:500}[elements.difficulty.value];
      return Math.max(10, base - (time/2) - (hints*50));
    }

    // --- DB & USER ---
    async function initUser() {
      try {
        await auth.signInAnonymously();
        let uid = auth.currentUser.uid;
        let userData = { username: 'Guest', avatar: 'https://cdn-icons-png.flaticon.com/512/847/847969.png' };
        
        if(window.Telegram?.WebApp?.initDataUnsafe?.user) {
          const tgUser = window.Telegram.WebApp.initDataUnsafe.user;
          uid = String(tgUser.id);
          userData.username = tgUser.username || tgUser.first_name;
          if(tgUser.photo_url) userData.avatar = tgUser.photo_url;
        }
        
        currentUser.id = uid;
        currentUser.username = userData.username;
        currentUser.avatar = userData.avatar;
        
        elements.username.textContent = currentUser.username;
        elements.userAvatar.src = currentUser.avatar;

        const doc = await usersCollection.doc(uid).get();
        if(doc.exists) {
          const data = doc.data();
          currentUser.score = data.score || 0;
          currentUser.bestTimes = data.bestTimes || {easy:null, medium:null, hard:null};
        } else {
          await usersCollection.doc(uid).set({ ...userData, score:0, bestTimes: {} });
        }
        
        elements.userScore.textContent = Math.floor(currentUser.score);
        updateRecordDisplay();
      } catch(e) { console.error("Auth error", e); }
      
      setTimeout(() => {
        elements.loadingScreen.style.opacity = '0';
        setTimeout(()=> elements.loadingScreen.style.display='none', 600);
      }, 1000);
    }

    async function saveWin(time, pts) {
      currentUser.score += pts;
      elements.userScore.textContent = Math.floor(currentUser.score);
      const diff = elements.difficulty.value;
      
      let newRecord = false;
      if(!currentUser.bestTimes[diff] || time < currentUser.bestTimes[diff]) {
        currentUser.bestTimes[diff] = time;
        newRecord = true;
      }
      
      updateRecordDisplay();
      
      if(currentUser.id) {
        usersCollection.doc(currentUser.id).set({
          score: currentUser.score,
          bestTimes: currentUser.bestTimes,
          username: currentUser.username,
          avatar: currentUser.avatar
        }, {merge:true});
        
        recordsCollection.add({
          userId: currentUser.id,
          username: currentUser.username,
          avatar: currentUser.avatar,
          difficulty: diff,
          time: time,
          date: new Date().toISOString()
        });
      }
      
      el('win-modal-message').innerHTML = `Difficulty: <b style="color:var(--text-main)">${diff}</b><br>Time: <span style="font-feature-settings: 'tnum';">${formatTime(time)}</span><br>Score: <span style="color:var(--primary-accent)">+${Math.floor(pts)}</span>${newRecord ? '<br><br>🏆 <b>New Record!</b>' : ''}`;
      toggleModal('win-modal', true);
    }

    function updateRecordDisplay() {
      el('easy-record').textContent = formatTime(currentUser.bestTimes.easy);
      el('medium-record').textContent = formatTime(currentUser.bestTimes.medium);
      el('hard-record').textContent = formatTime(currentUser.bestTimes.hard);
    }
    
    // --- LEADERBOARD LOGIC FIXED ---
    async function loadLeaderboard() {
      const list = el('rating-list');
      list.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.6;">Loading...</div>';
      
      let query;
      if(currentRatingType === 'score') {
        query = usersCollection.orderBy('score', 'desc').limit(20);
      } else {
        query = recordsCollection.where('difficulty', '==', currentRatingDifficulty).orderBy('time', 'asc').limit(20);
      }
      
      try {
        const snap = await query.get();
        list.innerHTML = '';
        snap.forEach((doc, idx) => {
          const d = doc.data();
          
          // Logic for Medals
          let rankHTML = `<span class="rank-cell">${idx + 1}</span>`;
          if(idx === 0) rankHTML = `<span class="rank-cell rank-1">🥇</span>`;
          if(idx === 1) rankHTML = `<span class="rank-cell rank-2">🥈</span>`;
          if(idx === 2) rankHTML = `<span class="rank-cell rank-3">🥉</span>`;

          const row = document.createElement('div');
          row.className = 'rank-row';
          row.innerHTML = `
            ${rankHTML}
            <img src="${d.avatar}" style="width:34px; height:34px; border-radius:50%; border:1px solid var(--glass-border);">
            <div style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500;">${d.username}</div>
            <div style="font-weight:700; font-feature-settings: 'tnum';">${currentRatingType === 'score' ? Math.floor(d.score) : formatTime(d.time)}</div>
          `;
          list.appendChild(row);
        });
        if(snap.empty) list.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.6;">No records yet</div>';
      } catch(e) { list.textContent = "Error loading data"; console.error(e); }
    }

    // --- INIT ---
    document.addEventListener('DOMContentLoaded', () => {
      elements.newGameBtn.onclick = startGame;
      elements.checkBtn.onclick = checkGame;
      elements.hintBtn.onclick = getHint;
      elements.undoBtn.onclick = undo;
      el('settings-button').onclick = () => toggleModal('settings-modal', true);
      el('rating-button').onclick = () => { toggleModal('rating-modal', true); loadLeaderboard(); };
      el('recent-games-button').onclick = () => { toggleModal('recent-games-modal', true); };
      el('tutorial-button').onclick = () => { toggleModal('tutorial-modal', true); };
      el('win-modal-close-btn').onclick = () => toggleModal('win-modal', false);
      
      document.querySelectorAll('.close-btn').forEach(b => {
        b.onclick = () => toggleModal(b.dataset.target, false);
      });
      document.querySelectorAll('.modal-overlay').forEach(o => {
        o.onclick = (e) => { if(e.target === o) toggleModal(o.id, false); };
      });

      el('sound-toggle').onclick = (e) => { 
        isSoundEnabled = !isSoundEnabled; 
        e.target.textContent = isSoundEnabled ? "ON" : "OFF"; 
      };
      el('highlightToggle').onclick = (e) => { 
        highlightEnabled = !highlightEnabled; 
        e.target.textContent = highlightEnabled ? "ON" : "OFF"; 
        if(!highlightEnabled) clearHighlights();
      };
      
      document.querySelectorAll('.theme-option').forEach(opt => {
        opt.onclick = () => {
          document.body.dataset.theme = opt.dataset.theme;
          document.querySelectorAll('.theme-option').forEach(t=>t.classList.remove('active-theme'));
          opt.classList.add('active-theme');
          localStorage.setItem('sudo-theme', opt.dataset.theme);
        };
      });
      
      document.querySelectorAll('.rating-tab').forEach(t => {
         t.onclick = () => {
           currentRatingType = t.dataset.type;
           document.querySelectorAll('.rating-tab').forEach(x => { x.classList.remove('active'); x.style.background='transparent'; });
           t.classList.add('active');
           t.style.background = 'var(--glass-bg)';
           el('difficulty-tabs').classList.toggle('hidden', currentRatingType !== 'time');
           loadLeaderboard();
         }
      });
      document.querySelectorAll('.diff-tab').forEach(t => {
         t.onclick = () => {
           currentRatingDifficulty = t.dataset.d;
           document.querySelectorAll('.diff-tab').forEach(x => x.classList.remove('active'));
           t.classList.add('active');
           loadLeaderboard();
         }
      });

      const savedTheme = localStorage.getItem('sudo-theme') || 'darkGlass';
      document.body.dataset.theme = savedTheme;
      document.querySelector(`[data-theme="${savedTheme}"]`)?.classList.add('active-theme');

      initUser();
      startGame();
    });
  </script>
</body>
